name: CI

on:
  push:
    branches: ['main']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.editorconfig'
  pull_request:
    branches: ['main']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.editorconfig'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SYSTEM_ENV: ci
  DEBUG: 'True'
  MEILI_HOST: 127.0.0.1
  UV_VERSION: '0.11.6'
  FORCE_COLOR: 1

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/*requirements*.txt
            **/pyproject.toml
            **/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: 'format --check'

  testing:
    name: Testing
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      db:
        image: postgres:17
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: --mount type=tmpfs,destination=/var/lib/postgresql/data --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:8-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      meilisearch:
        image: getmeili/meilisearch:v1.22.3
        ports:
          - 7700:7700
        env:
          MEILI_HTTP_ADDR: meilisearch:7700
          MEILI_LOG_LEVEL: INFO
          MEILI_MASTER_KEY: ${{ secrets.MEILI_MASTER_KEY }}
          MEILI_ENV: production

    env:
      DB: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      MEILI_HTTP_ADDR: meilisearch:7700
      MEILI_LOG_LEVEL: INFO
      MEILI_MASTER_KEY: ${{ secrets.MEILI_MASTER_KEY }}
      MEILI_ENV: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/*requirements*.txt
            **/pyproject.toml
            **/uv.lock

      - name: Install psycopg prerequisites
        run: sudo apt-get install -y --no-install-recommends libpq-dev

      - name: Install Dependencies
        run: uv sync --locked --all-extras --dev

      - name: Check for missing migrations
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Run migrations
        run: uv run python manage.py migrate

      - name: Run Tests
        run: uv run pytest --cov=. --cov-report=term --cov-report=html --cov-config=pyproject.toml -n auto --dist worksteal
        timeout-minutes: 10
        env:
          HYPOTHESIS_PROFILE: ci

  release:
    needs: [quality, testing]
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency: release
    environment: release
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/*requirements*.txt
            **/pyproject.toml
            **/uv.lock

      - name: Clear dist_build directory
        run: rm -rf dist_build/

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.DJANGO_TOKEN }}

      - name: Install pypa/build
        run: uv add build

      - name: Build a binary wheel and a source tarball
        run: uv run -m build --sdist --outdir dist_build/ --installer uv

      - name: Remove non-distribution files
        run: find dist_build/ -type f ! -name '*.whl' ! -name '*.tar.gz' -delete

      - uses: actions/upload-artifact@v7
        with:
          name: dist_build
          path: dist_build/

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist_build/
          skip-existing: true
          verbose: true
          attestations: false
        if: steps.release.outputs.released == 'true'

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist_build/
          attestations: false
        if: steps.release.outputs.released == 'true'
