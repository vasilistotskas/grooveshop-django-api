name: CI

on:
  push:
    branches: ['main']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.editorconfig'
  pull_request:
    branches: ['main']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.editorconfig'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SYSTEM_ENV: ci
  DEBUG: 'True'
  MEILI_HOST: 127.0.0.1
  UV_VERSION: '0.11.16'
  FORCE_COLOR: 1

jobs:
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: sarif
          output: trivy-results.sarif
          skip-dirs: .venv,node_modules,dist,.output
          limit-severities-for-sarif: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/*requirements*.txt
            **/pyproject.toml
            **/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Ruff format check
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          args: 'format --check'

      - name: Ruff lint check
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          args: 'check .'

      - name: Type check (ty)
        run: uv run ty check

      - name: OpenAPI schema validate
        # spectacular --validate runs the OpenAPI spec through
        # openapi-spec-validator and exits non-zero on any error.
        # ``--fail-on-warn`` is intentionally NOT set: drf-spectacular
        # emits informational warnings for cross-app operationId
        # collisions (e.g. multiple ViewSets named ``listPayWay``) which
        # it auto-resolves with numeric suffixes. Those warnings are
        # noise, not errors. Real schema errors still fail this step.
        # This step only needs the Django app registry — no live DB
        # required because spectacular uses the ORM class definitions,
        # not live data.
        run: >
          uv run python manage.py spectacular
          --validate
          --file /tmp/_schema_check.yml
        env:
          DJANGO_SETTINGS_MODULE: settings

  testing:
    name: Testing
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      db:
        image: postgres:17
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: --mount type=tmpfs,destination=/var/lib/postgresql/data --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:8-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      meilisearch:
        image: getmeili/meilisearch:v1.42.1
        ports:
          - 7700:7700
        env:
          MEILI_HTTP_ADDR: meilisearch:7700
          MEILI_LOG_LEVEL: INFO
          MEILI_MASTER_KEY: ${{ secrets.MEILI_MASTER_KEY }}
          MEILI_ENV: production

    env:
      DB: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      MEILI_HTTP_ADDR: meilisearch:7700
      MEILI_LOG_LEVEL: INFO
      MEILI_MASTER_KEY: ${{ secrets.MEILI_MASTER_KEY }}
      MEILI_ENV: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/*requirements*.txt
            **/pyproject.toml
            **/uv.lock

      - name: Install psycopg prerequisites
        run: sudo apt-get install -y --no-install-recommends libpq-dev

      - name: Install Dependencies
        run: uv sync --locked --all-extras --dev

      - name: Check for missing migrations
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Run migrations
        run: uv run python manage.py migrate

      - name: Run Tests
        # ``--dist loadfile`` is mandatory for stability per
        # ``project_test_suite_stability.md`` — interleaving tests
        # from different files on the same xdist worker (the
        # ``worksteal`` default) leaks module-level singletons (the
        # ``translation_reload`` middleware version, ``extra_settings``
        # cache, factory random state) and produces 1-3 random flakes
        # per CI run. ``-n auto`` and ``--dist loadfile`` are also set
        # in ``pyproject.toml::addopts`` — keeping them explicit here
        # so a careless edit can't silently flip the project off the
        # supported configuration.
        # The 15-min timeout absorbs coverage overhead (~2-3× the no-cov
        # runtime) on the 2-vCPU GitHub runner; the previous 10-min cap
        # ran out at ~99% of the suite.
        run: uv run pytest --cov=. --cov-report=term --cov-report=html --cov-config=pyproject.toml -n auto --dist loadfile
        timeout-minutes: 15
        env:
          HYPOTHESIS_PROFILE: ci

  release:
    needs: [quality, testing, security-scan]
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency: release
    environment: release
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/*requirements*.txt
            **/pyproject.toml
            **/uv.lock

      - name: Clear dist_build directory
        run: rm -rf dist_build/

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.DJANGO_TOKEN }}

      - name: Sync uv.lock to released version
        # ``python-semantic-release`` only bumps ``pyproject.toml``;
        # ``uv.lock`` keeps the previous version in its
        # ``[[package]]`` entry for the project itself, so subsequent
        # ``uv sync --locked`` runs on the next push fail with
        # "lockfile needs to be updated". Refresh the lockfile and
        # commit it back so main stays consistent.
        if: steps.release.outputs.released == 'true'
        run: |
          uv lock
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet uv.lock; then
            git add uv.lock
            git commit -m "chore(deps): sync uv.lock to ${{ steps.release.outputs.version }} [skip ci]"
            git push
          fi

      - name: Install pypa/build
        run: uv add build

      - name: Build a binary wheel and a source tarball
        run: uv run -m build --sdist --outdir dist_build/ --installer uv

      - name: Remove non-distribution files
        run: find dist_build/ -type f ! -name '*.whl' ! -name '*.tar.gz' -delete

      - uses: actions/upload-artifact@v7
        with:
          name: dist_build
          path: dist_build/

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist_build/
          skip-existing: true
          verbose: true
          attestations: false
        if: steps.release.outputs.released == 'true'

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist_build/
          attestations: false
        if: steps.release.outputs.released == 'true'
