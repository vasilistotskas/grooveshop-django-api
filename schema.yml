        * `pending_creation` - Εκκρεμής δημιουργία
        * `new` - Νέο
        * `in_depot` - Σε αποθήκη
        * `final_destination` - Στο locker
        * `delivered` - Παραδόθηκε
        * `returned` - Επιστράφηκε
        * `expired` - Έληξε
        * `canceled` - Ακυρώθηκε
        * `accepted_for_return` - Αποδεκτό για επιστροφή
        * `accepted_to_locker` - Αποδεκτό σε locker
        * `missing` - Λείπει
