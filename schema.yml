  /api/v1/shipping/acs/stations/nearest:
    get:
      operationId: findNearestAcsStations
      description: Returns active locker rows whose ``postal_code`` matches the supplied
        postcode prefix, ordered by exact match first then alphabetic. Falls back
        to a city-name ILIKE match when no postcode hits are found. The row cap is
        configurable via ``ShippingProvider.metadata.nearest_limit`` on the ``acs``
        row (default 20). Designed for the checkout locker picker — no GPS or geo
        math, the Nuxt UI does the visual ordering.
      summary: Find nearest ACS Smartpoint lockers to a postcode
      parameters:
      - in: query
        name: city
        schema:
          type: string
        description: Optional city-name fallback.
      - in: query
        name: countryCode
        schema:
          type: string
        description: Optional ISO-2 country code; narrows the default kind filter
          to that country's locker catalogue.
      - in: query
        name: postalCode
        schema:
          type: string
        description: Greek postcode (5-digit), required.
        required: true
      - in: query
        name: shopKind
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+$
          - type: integer
        description: Optional override. Default is the union of locker kinds across
          configured countries (see ShippingProvider.metadata.shop_kinds_by_country).
      tags:
      - ACS stations
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AcsStation'
          description: Bare array of matching ACS station objects — not paginated.
  /api/v1/shipping/boxnow/lockers:
    get:
      operationId: listBoxNowLocker
      description: 'Ανάκτηση λίστας Lockers BoxNow με δυνατότητες φιλτραρίσματος και
        αναζήτησης. Υποστηρίζει πολλαπλές στρατηγικές σελιδοποίησης: pageNumber (προεπιλογή),
        cursor και limitOffset.'
      summary: Λίστα Lockers BoxNow
      parameters:
      - in: query
        name: cursor
        schema:
          type: string
        description: Δείκτης (cursor) για σελιδοποίηση
      - in: query
        name: languageCode
        schema:
          type: string
          enum:
          - de
          - el
          - en
          default: el
        description: Κωδικός γλώσσας για μεταφράσεις (el, en, de)
      - name: ordering
        in: query
        required: false
        description: 'Which field(s) to use when ordering the results. Multiple fields
          can be combined with commas (e.g. ``-isMain,-createdAt``). Available fields:
          externalId, -externalId, postalCode, -postalCode, lastSyncedAt, -lastSyncedAt,
          createdAt, -createdAt'
        schema:
          type: string
          pattern: ^(?:externalId|\-externalId|postalCode|\-postalCode|lastSyncedAt|\-lastSyncedAt|createdAt|\-createdAt)(?:,(?:externalId|\-externalId|postalCode|\-postalCode|lastSyncedAt|\-lastSyncedAt|createdAt|\-createdAt))*$
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+$
          - type: integer
      - in: query
        name: pageSize
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+$
          - type: integer
        description: Αριθμός αποτελεσμάτων ανά σελίδα
      - in: query
        name: pagination
        schema:
          type: string
          enum:
          - 'false'
          - 'true'
          default: 'true'
        description: Ενεργοποίηση/απενεργοποίηση σελιδοποίησης
      - in: query
        name: paginationType
        schema:
          type: string
          enum:
          - cursor
          - limitOffset
          - pageNumber
          default: pageNumber
        description: Τύπος στρατηγικής σελιδοποίησης
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
