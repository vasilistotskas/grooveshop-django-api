    OrderCreateFromCartRequest:
      type: object
      description: |-
        Serializer for creating orders from cart (dual-flow payment architecture).

        This serializer supports two payment flows:
        1. Online payments (is_online_payment=True): Requires payment_intent_id
        2. Offline payments (is_online_payment=False): No payment_intent_id required

        The order is created from an existing cart identified via X-Cart-Id header.
        Cart is NOT sent in request body - it's retrieved from the header using CartService.
      properties:
        payWayId:
          type: integer
          description: ID μεθόδου πληρωμής
        paymentIntentId:
          type: string
          nullable: true
          description: ID payment intent από τον πάροχο πληρωμών (υποχρεωτικό για
            online πληρωμές)
        firstName:
          type: string
          minLength: 1
          description: Όνομα πελάτη
          maxLength: 150
        lastName:
          type: string
          minLength: 1
          description: Επώνυμο πελάτη
          maxLength: 150
        email:
          type: string
          format: email
          minLength: 1
          description: Email πελάτη
        street:
          type: string
          minLength: 1
          description: Όνομα οδού
          maxLength: 255
        streetNumber:
          type: string
          description: Αριθμός οδού
          maxLength: 50
        city:
          type: string
          minLength: 1
          description: Όνομα πόλης
          maxLength: 100
        zipcode:
          type: string
          minLength: 1
          description: Ταχυδρομικός κώδικας
          maxLength: 20
        countryId:
          type: string
          minLength: 1
          description: Κωδικός χώρας alpha-2 (π.χ. 'GR', 'US')
        regionId:
          type: string
          nullable: true
          description: Αλφαριθμητικός κωδικός περιφέρειας
        phone:
          type: string
          minLength: 1
          description: Τηλέφωνο πελάτη
        customerNotes:
          type: string
          description: Σημειώσεις πελάτη ή ειδικές οδηγίες
          maxLength: 500
        floor:
          type: string
          description: Αριθμός ή ένδειξη ορόφου (π.χ. FIRST_FLOOR)
          maxLength: 50
        locationType:
          type: string
          description: Τύπος τοποθεσίας, π.χ. HOME ή OFFICE (προαιρετικό)
          maxLength: 100
        billingVatId:
          type: string
          description: ΑΦΜ αγοραστή. Υποχρεωτικό όταν το ``document_type`` είναι INVOICE·
            9 ψηφία για ελληνικό ΑΦΜ, το αρχικό πρόθεμα EL/GR αφαιρείται αυτόματα.
          maxLength: 12
        billingCountry:
          type: string
          description: Κωδικός χώρας ISO 3166-1 alpha-2 για τη φορολογική ταυτότητα
            του αγοραστή. Προεπιλογή η χώρα της παραγγελίας όταν είναι κενό.
          maxLength: 2
        documentType:
          allOf:
          - $ref: '#/components/schemas/OrderCreateDocumentType'
          default: RECEIPT
          description: |-
            RECEIPT (Α.Λ.Π., Tier A — λιανική) ή INVOICE (Τιμολόγιο Πώλησης, Tier B — B2B). Η επιλογή INVOICE απαιτεί έγκυρο ``billing_vat_id``.

            * `RECEIPT` - Απόδειξη
            * `INVOICE` - Τιμολόγιο
        loyaltyPointsToRedeem:
          type: integer
          minimum: 0
          nullable: true
          description: Αριθμός πόντων πιστότητας προς εξαργύρωση για έκπτωση σε αυτή
            την παραγγελία
        boxnowLockerId:
          type: string
          description: ID locker APM BoxNow από το widget
          maxLength: 64
        boxnowCompartmentSize:
          type: integer
          maximum: 3
          minimum: 1
          default: 1
          description: 'Μέγεθος θυρίδας BoxNow: 1=Μικρό, 2=Μεσαίο, 3=Μεγάλο'
        shippingProviderCode:
          description: Κωδικός μεταφορέα από /api/v1/shipping/options (π.χ. 'acs').
          oneOf:
          - type: string
            maxLength: 32
            pattern: ^[-a-zA-Z0-9_]+$
          - type: string
            maxLength: 0
        shippingKind:
          allOf:
          - $ref: '#/components/schemas/ShippingKind'
          description: |-
            Γενικός τύπος εκπλήρωσης, ανεξάρτητος από τον πάροχο.

            * `home_delivery` - Κατ' οίκον παράδοση
            * `pickup_point` - Σημείο παραλαβής / locker
        acsStationExternalId:
          type: string
          description: Εξωτερικό ID καταστήματος/Smartpoint ACS (ροή σημείου παραλαβής
            Φάσης 2).
          maxLength: 32
        acsStationBranch:
          type: string
          description: Τιμή ACS_Station_Branch_Destination.
          maxLength: 32
        acsChargeType:
          allOf:
          - $ref: '#/components/schemas/AcsChargeType'
          description: |-
            Προαιρετική παράκαμψη του ACS Charge_Type ανά παραγγελία. Αφήστε το κενό για χρήση της προεπιλογής σε επίπεδο μεταφορέα (COD σε σύμβαση μόνο-COD). Ο ορισμός εδώ έχει νόημα μόνο αν η εμπορική σύμβαση με την ACS επιτρέπει την επιλεγμένη τιμή — μη έγκυροι συνδυασμοί απορρίπτονται από το ACS_Create_Voucher.

            * `1` - Προπληρωμένο
            * `2` - Αντικαταβολή
        acsItemQuantity:
          type: integer
          maximum: 20
          minimum: 1
          description: Προαιρετική παράκαμψη ανά παραγγελία για το ACS Item_Quantity
            (αριθμός φυσικών δεμάτων στην αποστολή). Προεπιλογή 1. ΔΕΝ πρέπει να οριστεί
            για παραλαβή Smartpoint — η ACS απορρίπτει vouchers πολλαπλών δεμάτων
            σε lockers.
        meta:
          type: object
          additionalProperties: {}
          writeOnly: true
          nullable: true
          description: 'Πλαίσιο Meta Pixel: κλειδιά ``fbp``, ``fbc``, ``client_user_agent``,
            ``client_ip_address``, ``event_ids`` (dict με {purchase, initiate_checkout,
            add_payment_info}), ``consent`` (dict με boolean ``ads``). Κενό dict /
            null όταν ο πελάτης αρνήθηκε τα cookies μάρκετινγκ· ο αποστολέας CAPI
            τότε παραλείπει την αποστολή.'
      required:
      - city
      - countryId
      - email
      - firstName
      - lastName
      - payWayId
      - phone
      - street
      - zipcode
