  /api/v1/order:
    get:
      operationId: listOrder
      description: 'Ανάκτηση λίστας Παραγγελίες με δυνατότητες φιλτραρίσματος και
        αναζήτησης. Υποστηρίζει πολλαπλές στρατηγικές σελιδοποίησης: pageNumber (προεπιλογή),
        cursor και limitOffset.'
      summary: Λίστα Παραγγελίες
      parameters:
      - in: query
        name: activeOrders
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο ενεργών παραγγελιών (εκκρεμείς, σε επεξεργασία, απεσταλμένες,
          παραδομένες)
      - in: query
        name: canBeCanceled
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο παραγγελιών που μπορούν να ακυρωθούν
      - in: query
        name: city
        schema:
          type: string
        description: Φίλτρο ανά πόλη (χωρίς πεζά/κεφαλαία)
      - in: query
        name: city_Icontains
        schema:
          type: string
      - in: query
        name: country
        schema:
          type: string
        description: Φίλτρο ανά κωδικό χώρας
      - in: query
        name: country_Alpha2
        schema:
          type: string
        description: Φίλτρο ανά alpha-2 κωδικό χώρας
      - in: query
        name: country_Name
        schema:
          type: string
        description: Φίλτρο ανά όνομα χώρας (χωρίς διάκριση πεζών/κεφαλαίων)
      - in: query
        name: countryIds
        schema:
          type: string
        description: Φίλτρο ανά πολλαπλά ID χωρών (διαχωρισμένα με κόμμα)
      - in: query
        name: createdAfter
        schema:
          type: string
          format: date-time
        description: Filter items created after this date
      - in: query
        name: createdAt_Date
        schema:
          type: string
          format: date
      - in: query
        name: createdAt_Gte
        schema:
          type: string
          format: date-time
      - in: query
        name: createdAt_Lte
        schema:
          type: string
          format: date-time
      - in: query
        name: createdBefore
        schema:
          type: string
          format: date-time
        description: Filter items created before this date
      - in: query
        name: cursor
        schema:
          type: string
        description: Δείκτης (cursor) για σελιδοποίηση
      - in: query
        name: customerNotes
        schema:
          type: string
      - in: query
        name: customerNotes_Icontains
        schema:
          type: string
      - in: query
        name: documentType
        schema:
          type: string
        description: Φίλτρο ανά τύπο εγγράφου
      - in: query
        name: email
        schema:
          type: string
        description: Φίλτρο ανά email πελάτη (χωρίς διάκριση πεζών/κεφαλαίων)
      - in: query
        name: email_Icontains
        schema:
          type: string
      - in: query
        name: finalOrders
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο οριστικών παραγγελιών (ολοκληρωμένες, ακυρωμένες, με επιστροφή
          χρημάτων)
      - in: query
        name: firstName
        schema:
          type: string
        description: Φίλτρο ανά όνομα πελάτη (χωρίς διάκριση πεζών/κεφαλαίων)
      - in: query
        name: firstName_Icontains
        schema:
          type: string
      - in: query
        name: floor
        schema:
          type: string
        description: Φίλτρο ανά όροφο
      - in: query
        name: hasCustomerNotes
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο παραγγελιών με/χωρίς σημειώσεις πελάτη
      - in: query
        name: hasPaymentId
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο παραγγελιών με/χωρίς ID πληρωμής
      - in: query
        name: hasStatusUpdatedAt
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο παραγγελιών με χρονοσήμανση ενημέρωσης κατάστασης
      - in: query
        name: hasTracking
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο παραγγελιών με/χωρίς αριθμό παρακολούθησης
      - in: query
        name: hasUser
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο παραγγελιών με/χωρίς χρήστη
      - in: query
        name: id
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+$
          - type: integer
      - in: query
        name: id_In
        schema:
          oneOf:
          - type: string
            description: Τιμές διαχωρισμένες με κόμμα
          - type: array
            items:
              type: integer
        description: Οι πολλαπλές τιμές πρέπει να διαχωρίζονται με κόμμα.
        explode: false
        style: form
      - in: query
        name: isCanceled
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο ακυρωμένων παραγγελιών
      - in: query
        name: isCompleted
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο ολοκληρωμένων παραγγελιών
      - in: query
        name: isPaid
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο πληρωμένων/μη πληρωμένων παραγγελιών
      - in: query
        name: languageCode
        schema:
          type: string
          enum:
          - de
          - el
          - en
          default: el
        description: Κωδικός γλώσσας για μεταφράσεις (el, en, de)
      - in: query
        name: lastName
        schema:
          type: string
        description: Φίλτρο ανά επώνυμο πελάτη (χωρίς διάκριση πεζών/κεφαλαίων)
      - in: query
        name: lastName_Icontains
        schema:
          type: string
      - in: query
        name: locationType
        schema:
          type: string
        description: Φίλτρο ανά τύπο τοποθεσίας
      - in: query
        name: needsProcessing
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο παραγγελιών που χρειάζονται επεξεργασία
      - name: ordering
        in: query
        required: false
        description: 'Which field(s) to use when ordering the results. Multiple fields
          can be combined with commas (e.g. ``-isMain,-createdAt``). Available fields:
          id, -id, createdAt, -createdAt, updatedAt, -updatedAt, status, -status,
          statusUpdatedAt, -statusUpdatedAt, paidAmount, -paidAmount, shippingPrice,
          -shippingPrice, paymentStatus, -paymentStatus, user_FirstName, -user_FirstName,
          user_LastName, -user_LastName'
        schema:
          type: string
          pattern: ^(?:id|\-id|createdAt|\-createdAt|updatedAt|\-updatedAt|status|\-status|statusUpdatedAt|\-statusUpdatedAt|paidAmount|\-paidAmount|shippingPrice|\-shippingPrice|paymentStatus|\-paymentStatus|user_FirstName|\-user_FirstName|user_LastName|\-user_LastName)(?:,(?:id|\-id|createdAt|\-createdAt|updatedAt|\-updatedAt|status|\-status|statusUpdatedAt|\-statusUpdatedAt|paidAmount|\-paidAmount|shippingPrice|\-shippingPrice|paymentStatus|\-paymentStatus|user_FirstName|\-user_FirstName|user_LastName|\-user_LastName))*$
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+$
          - type: integer
      - in: query
        name: pageSize
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+$
          - type: integer
        description: Αριθμός αποτελεσμάτων ανά σελίδα
      - in: query
        name: pagination
        schema:
          type: string
          enum:
          - 'false'
          - 'true'
          default: 'true'
        description: Ενεργοποίηση/απενεργοποίηση σελιδοποίησης
      - in: query
        name: paginationType
        schema:
          type: string
          enum:
          - cursor
          - limitOffset
          - pageNumber
          default: pageNumber
        description: Τύπος στρατηγικής σελιδοποίησης
      - in: query
        name: paidAmount_Gte
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
      - in: query
        name: paidAmount_Lte
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
      - in: query
        name: paidAmountMax
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
        description: Φίλτρο ανά μέγιστο πληρωμένο ποσό
      - in: query
        name: paidAmountMin
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
        description: Φίλτρο ανά ελάχιστο πληρωμένο ποσό
      - in: query
        name: payWay
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+$
          - type: integer
        description: Φίλτρο ανά ID μεθόδου πληρωμής
      - in: query
        name: payWay_IsOnlinePayment
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο ανά online μεθόδους πληρωμής
      - in: query
        name: payWay_Name
        schema:
          type: string
        description: Φίλτρο ανά όνομα μεθόδου πληρωμής (χωρίς διάκριση πεζών/κεφαλαίων)
      - in: query
        name: paymentId
        schema:
          type: string
        description: Φίλτρο ανά ID πληρωμής
      - in: query
        name: paymentId_Icontains
        schema:
          type: string
      - in: query
        name: paymentMethod
        schema:
          type: string
        description: Φίλτρο ανά μέθοδο πληρωμής
      - in: query
        name: paymentMethod_Icontains
        schema:
          type: string
      - in: query
        name: paymentStatus
        schema:
          type: string
          title: Κατάσταση πληρωμής
          enum:
          - CANCELED
          - COMPLETED
          - FAILED
          - PARTIALLY_REFUNDED
          - PENDING
          - PROCESSING
          - REFUNDED
        description: |-
          Φίλτρο ανά κατάσταση πληρωμής

          * `PENDING` - Εκκρεμεί
          * `PROCESSING` - Σε επεξεργασία
          * `COMPLETED` - Ολοκληρώθηκε
          * `FAILED` - Απέτυχε
          * `REFUNDED` - Επιστροφή Χρημάτων
          * `PARTIALLY_REFUNDED` - Μερική επιστροφή
          * `CANCELED` - Ακυρώθηκε
      - in: query
        name: paymentStatus_In
        schema:
          oneOf:
          - type: string
            description: Τιμές διαχωρισμένες με κόμμα
          - type: array
            items:
              type: string
        description: Οι πολλαπλές τιμές πρέπει να διαχωρίζονται με κόμμα.
        explode: false
        style: form
      - in: query
        name: phone
        schema:
          type: string
        description: Φίλτρο ανά αριθμό τηλεφώνου
      - in: query
        name: phone_Icontains
        schema:
          type: string
      - in: query
        name: place
        schema:
          type: string
        description: Φίλτρο ανά τοποθεσία (χωρίς διάκριση πεζών/κεφαλαίων)
      - in: query
        name: place_Icontains
        schema:
          type: string
      - in: query
        name: recentOrders
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο παραγγελιών των τελευταίων 30 ημερών
      - in: query
        name: region
        schema:
          type: string
        description: Φίλτρο ανά κωδικό περιφέρειας
      - in: query
        name: region_Name
        schema:
          type: string
        description: Φίλτρο ανά όνομα περιφέρειας (χωρίς διάκριση πεζών/κεφαλαίων)
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: shippingCarrier
        schema:
          type: string
        description: Φίλτρο ανά εταιρεία μεταφοράς
      - in: query
