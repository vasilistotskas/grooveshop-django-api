          type: string
        description: Δείκτης (cursor) για σελιδοποίηση
      - in: query
        name: description
        schema:
          type: string
        description: Φίλτρο ανά περιγραφή (μερική αντιστοίχιση)
      - in: query
        name: freeThreshold_Gte
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
      - in: query
        name: freeThreshold_Lte
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
      - in: query
        name: freeThresholdMax
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
        description: Φίλτρο ανά μέγιστο όριο δωρεάν
      - in: query
        name: freeThresholdMin
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
        description: Φίλτρο ανά ελάχιστο όριο δωρεάν
      - in: query
        name: hasConfiguration
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο μεθόδων πληρωμής με/χωρίς διαμόρφωση
      - in: query
        name: hasIcon
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο μεθόδων πληρωμής με/χωρίς εικονίδιο
      - in: query
        name: id
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+$
          - type: integer
        description: Φίλτρο ανά ID μεθόδου πληρωμής
      - in: query
        name: isOnlinePayment
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο ανά κατάσταση online πληρωμής
      - in: query
        name: languageCode
        schema:
          type: string
          enum:
          - de
          - el
          - en
          default: el
        description: Κωδικός γλώσσας για μεταφράσεις (el, en, de)
      - in: query
        name: name
        schema:
          type: string
        description: Φίλτρο ανά όνομα (μερική αντιστοίχιση)
      - name: ordering
        in: query
        required: false
        description: 'Which field(s) to use when ordering the results. Multiple fields
          can be combined with commas (e.g. ``-isMain,-createdAt``). Available fields:
          id, -id, createdAt, -createdAt, updatedAt, -updatedAt, cost, -cost, freeThreshold,
          -freeThreshold, providerCode, -providerCode, isOnlinePayment, -isOnlinePayment,
          requiresConfirmation, -requiresConfirmation, sortOrder, -sortOrder'
        schema:
          type: string
          pattern: ^(?:id|\-id|createdAt|\-createdAt|updatedAt|\-updatedAt|cost|\-cost|freeThreshold|\-freeThreshold|providerCode|\-providerCode|isOnlinePayment|\-isOnlinePayment|requiresConfirmation|\-requiresConfirmation|sortOrder|\-sortOrder)(?:,(?:id|\-id|createdAt|\-createdAt|updatedAt|\-updatedAt|cost|\-cost|freeThreshold|\-freeThreshold|providerCode|\-providerCode|isOnlinePayment|\-isOnlinePayment|requiresConfirmation|\-requiresConfirmation|sortOrder|\-sortOrder))*$
      - name: page
