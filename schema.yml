        schema:
          type: string
        description: Συνδυάστε με το ``shippingProviderCode`` για να φιλτράρετε τις
          μεθόδους πληρωμής βάσει των κανόνων συμβατότητας του μεταφορέα για αυτόν
          τον τύπο.
      - in: query
        name: shippingProviderCode
        schema:
          type: string
        description: Φίλτρο μεθόδων πληρωμής συμβατών με τον δεδομένο μεταφορέα αποστολής.
          Κάθε μεταφορέας διαθέτει τους δικούς του κανόνες συμβατότητας — το BoxNow
          (``boxnow``) υποστηρίζει αντικαταβολή σε lockers μέσω PAY ON THE GO και
          έτσι περνά κανονικά· η ACS περνά αμετάβλητη. Συνδυάστε με το ``shippingKind``.
      - in: query
