          Φίλτρο ανά κατάσταση παραγγελίας

          * `PENDING` - Εκκρεμεί
          * `PROCESSING` - Σε επεξεργασία
          * `SHIPPED` - Απεστάλη
          * `DELIVERED` - Παραδόθηκε
          * `COMPLETED` - Ολοκληρώθηκε
          * `CANCELED` - Ακυρώθηκε
          * `RETURNED` - Επιστράφηκε
          * `REFUNDED` - Επιστροφή Χρημάτων
      - in: query
        name: status_In
        schema:
          oneOf:
          - type: string
            description: Τιμές διαχωρισμένες με κόμμα
          - type: array
