            pattern: ^-?\d+$
          - type: integer
      - in: query
        name: sortOrder_Lte
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+$
          - type: integer
      - in: query
        name: uuid
        schema:
          type: string
          format: uuid
      tags:
