      - in: query
        name: priceMax
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
        description: Φίλτρο μέγιστης τιμής (final_price <= value)
      - in: query
        name: priceMin
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
        description: Φίλτρο ελάχιστης τιμής (final_price >= value)
      - in: query
        name: query
        schema:
          type: string
        description: Ερώτημα αναζήτησης πλήρους κειμένου (κενό για χωρίς φίλτρο αναζήτησης)
