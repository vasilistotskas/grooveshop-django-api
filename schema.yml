      - orderNumber
      - parcelId
      - parcelState
      - time
    BoxNowWebhookEnvelopeRequest:
      type: object
      description: |-
        Top-level CloudEvent envelope for BoxNow webhook POST requests.

        Used for OpenAPI documentation only — the webhook view reads
        raw bytes before parsing in order to verify the HMAC-SHA256
        ``datasignature`` against the unmodified ``data`` JSON substring.
        DRF validation is not applied to the incoming request directly.
      properties:
        specversion:
          type: string
          minLength: 1
          description: 'Έκδοση προδιαγραφής CloudEvents (αναμενόμενη: ''1.0'')'
        type:
          type: string
          minLength: 1
          description: 'Τύπος συμβάντος (αναμενόμενος: ''gr.boxnow.parcel_event_change'')'
        source:
          type: string
          format: uri
          minLength: 1
          description: URL προέλευσης πηγής συμβάντος
        subject:
          type: string
          minLength: 1
          description: Θέμα του συμβάντος (συνήθως το ID δέματος)
        id:
          type: string
          minLength: 1
          description: Μοναδικό ID CloudEvents· χρησιμοποιείται ως κλειδί ιδεμποτεντίας
            (αποθηκεύεται ως webhook_message_id)
        time:
          type: string
          format: date-time
          description: Χρονοσήμανση δημιουργίας του φακέλου
        datacontenttype:
          type: string
          minLength: 1
          description: 'Τύπος MIME του πεδίου data (αναμενόμενος: ''application/json'')'
        datasignature:
          type: string
          minLength: 1
          description: Δεκαεξαδικό digest HMAC-SHA256 του ακατέργαστου JSON αντικειμένου
            'data'· χρησιμοποιείται για επαλήθευση υπογραφής
        data:
          allOf:
          - $ref: '#/components/schemas/BoxNowWebhookDataRequest'
          description: Payload συμβάντος δέματος
      required:
      - data
      - datacontenttype
      - datasignature
      - id
      - source
      - specversion
      - subject
      - time
      - type
