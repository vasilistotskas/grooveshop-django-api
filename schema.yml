            BoxNow
        eventTime:
          type: string
          format: date-time
          readOnly: true
          title: Ώρα συμβάντος
          description: Χρονοσήμανση από το 'data.time' στο payload του webhook
        displayName:
          type: string
          readOnly: true
          title: Εμφανιζόμενο όνομα
          description: data.eventLocation.displayName
        postalCode:
          type: string
          readOnly: true
          title: Ταχ. Κώδικας
          description: data.eventLocation.postalCode
        additionalInformation:
          type: string
          readOnly: true
          title: Πρόσθετες Πληροφορίες
        receivedAt:
          type: string
          format: date-time
          readOnly: true
          title: Παραλήφθηκε στις
          description: Χρονοσήμανση λήψης του webhook από το GrooveShop (διαφορετική
            από το event_time)
        createdAt:
          type: string
          format: date-time
          readOnly: true
          title: Δημιουργήθηκε στις
      required:
      - additionalInformation
      - createdAt
      - displayName
      - eventTime
      - eventType
      - eventTypeDisplay
      - id
      - parcelState
      - postalCode
      - receivedAt
      - webhookMessageId
    BoxNowParcelState:
      enum:
