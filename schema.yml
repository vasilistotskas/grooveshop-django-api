    BoxNowWebhookDataRequest:
      type: object
      description: |-
        ``data`` field of a BoxNow CloudEvent webhook envelope.

        Reflects the payload shape described in the BoxNow webhook PDF.
        ``camelCase`` field names are preserved because
        ``djangorestframework-camel-case`` is already applied
        project-wide at the middleware level; no manual aliasing needed.
      properties:
        parcelId:
          type: string
          minLength: 1
          description: 10ψήφιος αριθμός voucher/δέματος BoxNow
        parcelState:
          type: string
          minLength: 1
          description: Λεξιλόγιο κατάστασης δέματος BoxNow (data.parcelState)
        parcelReferenceNumber:
          type: string
          description: Προαιρετικός αριθμός αναφοράς εμπόρου
        parcelName:
          type: string
          description: Προαιρετικό όνομα δέματος
        orderNumber:
          type: string
          minLength: 1
          description: Αριθμός παραγγελίας εμπόρου που αποστέλλεται κατά τη δημιουργία
            αιτήματος παράδοσης
        event:
          type: string
          minLength: 1
          description: Συμβολοσειρά τύπου συμβάντος BoxNow (π.χ. 'in-depot', 'final-destination',
            'delivered')
        eventLocation:
          allOf:
          - $ref: '#/components/schemas/BoxNowEventLocationRequest'
          description: Πλαίσιο τοποθεσίας συμβάντος
        customer:
          allOf:
          - $ref: '#/components/schemas/BoxNowCustomerRequest'
          description: Στοιχεία πελάτη που σχετίζονται με το δέμα
        additionalInformation:
          type: string
          description: Ελεύθερο κείμενο με επιπλέον πληροφορίες από το BoxNow
        time:
          type: string
          format: date-time
          description: Χρονοσήμανση όταν συνέβη το συμβάν στο BoxNow
      required:
