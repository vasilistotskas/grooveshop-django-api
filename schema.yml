    BoxNowShipmentDetail:
      type: object
      description: |-
        Detail serializer for a single BoxNow shipment.

        Extends the list serializer with:
        - nested ``locker`` object (``BoxNowLockerSerializer``)
        - ``events`` — last 20 ``BoxNowParcelEvent`` records ordered by
          ``event_time`` descending
        - ``label_url`` — relative URL for downloading the parcel label PDF
          via the Django proxy route; ``None`` when ``parcel_id`` is blank

        Imports of ``BoxNowLockerSerializer`` and
        ``BoxNowParcelEventSerializer`` are deferred to method bodies to
        prevent circular import chains between the serializer modules.
      properties:
        id:
          type: integer
          readOnly: true
        uuid:
          type: string
          format: uuid
          readOnly: true
        deliveryRequestId:
          type: string
          readOnly: true
          nullable: true
          title: Αναγνωριστικό αιτήματος παράδοσης
          description: ID αιτήματος παράδοσης BoxNow που επιστρέφεται από το POST
            /api/v1/delivery-requests
        parcelId:
          type: string
          readOnly: true
          nullable: true
          title: ID δέματος
          description: 10ψήφιος αριθμός BoxNow voucher
        lockerExternalId:
          type: string
          readOnly: true
          title: Εξωτερικό ID locker
          description: Μη κανονικοποιημένο ID APM BoxNow — διατηρείται ακόμη κι αν
            διαγραφεί η εγγραφή BoxNowLocker
        parcelState:
          allOf:
          - $ref: '#/components/schemas/BoxNowParcelState'
          readOnly: true
          title: Κατάσταση Δέματος
        parcelStateDisplay:
          type: string
          readOnly: true
          description: Ετικέτα σε αναγνώσιμη μορφή για την τιμή parcel_state
        compartmentSize:
          allOf:
          - $ref: '#/components/schemas/CompartmentSizeEnum'
          readOnly: true
          title: Μέγεθος θυρίδας
        paymentMode:
          allOf:
          - $ref: '#/components/schemas/PaymentModeEnum'
          readOnly: true
          title: Τρόπος πληρωμής
        lastEventAt:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          title: Τελευταίο συμβάν
        createdAt:
          type: string
          format: date-time
          readOnly: true
          title: Δημιουργήθηκε στις
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          title: Ενημερώθηκε στις
        locker:
          allOf:
          - $ref: '#/components/schemas/BoxNowLocker'
          nullable: true
          readOnly: true
          description: Ενσωματωμένα στοιχεία locker BoxNow
        events:
          type: array
          items:
            $ref: '#/components/schemas/BoxNowParcelEvent'
          readOnly: true
          description: Τελευταία 20 συμβάντα δέματος ταξινομημένα κατά event_time
            φθίνουσα
        labelUrl:
          type: string
          nullable: true
          description: Σχετικό URL για λήψη του PDF ετικέτας δέματος μέσω του endpoint
            proxy Django
          readOnly: true
        weightGrams:
          type: integer
          readOnly: true
          title: Βάρος (γραμμάρια)
        amountToBeCollected:
          type: number
          format: double
          maximum: 1000000000
          minimum: -1000000000
          exclusiveMaximum: true
          exclusiveMinimum: true
          readOnly: true
          title: Ποσό προς Είσπραξη
          description: Ποσό που εισπράττεται κατά την παράδοση (PoG / COD). Πάντα
            0 στη Φάση 1.
        allowReturn:
          type: boolean
          readOnly: true
          title: Επιτρέπεται επιστροφή
        cancelRequestedAt:
          type: string
          format: date-time
          readOnly: true
