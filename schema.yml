openapi: 3.0.3
info:
  title: Grooveshop API
  version: 1.0.0
  description: Grooveshop API description
paths:
  /api/v1/blog/author:
    get:
      operationId: listBlogAuthor
      description: 'Ανάκτηση λίστας Συντάκτες Blog με δυνατότητες φιλτραρίσματος και
        αναζήτησης. Υποστηρίζει πολλαπλές στρατηγικές σελιδοποίησης: pageNumber (προεπιλογή),
        cursor και limitOffset.'
      summary: Λίστα Συντάκτες Blog
      parameters:
      - in: query
        name: cursor
        schema:
          type: string
        description: Δείκτης (cursor) για σελιδοποίηση
      - in: query
        name: languageCode
        schema:
          type: string
          enum:
          - de
          - el
          - en
          default: el
        description: Κωδικός γλώσσας για μεταφράσεις (el, en, de)
      - name: ordering
        in: query
        required: false
        description: 'Which field(s) to use when ordering the results. Multiple fields
          can be combined with commas (e.g. ``-isMain,-createdAt``). Available fields:
          id, -id, createdAt, -createdAt, updatedAt, -updatedAt, user_FirstName, -user_FirstName,
          user_LastName, -user_LastName, user_Email, -user_Email, user_CreatedAt,
          -user_CreatedAt, website, -website'
        schema:
          type: string
          pattern: ^(?:id|\-id|createdAt|\-createdAt|updatedAt|\-updatedAt|user_FirstName|\-user_FirstName|user_LastName|\-user_LastName|user_Email|\-user_Email|user_CreatedAt|\-user_CreatedAt|website|\-website)(?:,(?:id|\-id|createdAt|\-createdAt|updatedAt|\-updatedAt|user_FirstName|\-user_FirstName|user_LastName|\-user_LastName|user_Email|\-user_Email|user_CreatedAt|\-user_CreatedAt|website|\-website))*$
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+$
          - type: integer
      - in: query
        name: pageSize
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+$
          - type: integer
        description: Αριθμός αποτελεσμάτων ανά σελίδα
      - in: query
        name: pagination
        schema:
          type: string
          enum:
          - 'false'
          - 'true'
          default: 'true'
        description: Ενεργοποίηση/απενεργοποίηση σελιδοποίησης
      - in: query
        name: paginationType
        schema:
          type: string
          enum:
          - cursor
          - limitOffset
          - pageNumber
          default: pageNumber
        description: Τύπος στρατηγικής σελιδοποίησης
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Blog Authors
      security:
      - cookieAuth: []
      - {}
      responses:
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBlogAuthorList'
          description: ''
    post:
      operationId: createBlogAuthor
      description: Δημιουργία νέου Συντάκτης Blog. Απαιτεί ταυτοποίηση.
      summary: Δημιουργία Συντάκτης Blog
      parameters:
      - in: query
        name: languageCode
        schema:
          type: string
          enum:
          - de
          - el
          - en
          default: el
        description: Κωδικός γλώσσας για μεταφράσεις (el, en, de)
      tags:
      - Blog Authors
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BlogAuthorWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BlogAuthorWriteRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/BlogAuthorWriteRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlogAuthorDetail'
          description: ''
