        * `pickup_point` - Σημείο παραλαβής / locker
    ShippingOption:
      type: object
      description: |-
        One row in the checkout shipping-method radio.

        Returned by :class:`shipping.views.ShippingOptionsView`.  The
        frontend renders one card per row; the ``kind`` value tells it
        whether to show a locker picker, and ``provider_code`` tells it
        which picker variant (BoxNow widget vs ACS server-side list).
      properties:
        providerCode:
          type: string
        providerName:
          type: string
        kind:
          $ref: '#/components/schemas/ShippingKind'
        price:
          type: number
          format: double
          maximum: 1000000000
          minimum: -1000000000
          exclusiveMaximum: true
          exclusiveMinimum: true
          nullable: true
          description: Null όταν ο πάροχος παραπέμπει στη γενική πάγια χρέωση.
        currency:
          type: string
          maxLength: 3
        liveMode:
          type: boolean
        priority:
          type: integer
        logoUrl:
          type: string
          format: uri
          nullable: true
          description: Απόλυτο URL για το λογότυπο μάρκας που ανέβασε ο χειριστής,
            υπολογισμένο ανά (πάροχο, τύπο) ώστε η γραμμή κατ' οίκον παράδοσης και
            η γραμμή σημείου παραλαβής του ίδιου μεταφορέα να μπορούν να εμφανίζουν
            διαφορετικές εικόνες. Null όταν δεν έχει μεταφορτωθεί λογότυπο — το κατάστημα
            τότε επιστρέφει στην ενσωματωμένη προεπιλογή του. Το ``settings.MEDIA_URL``
            είναι απόλυτο σε κάθε περιβάλλον, οπότε αυτό είναι πάντα πλήρες URL όταν
            υπάρχει.
        metadata:
          type: object
          additionalProperties: {}
      required:
      - currency
      - kind
      - liveMode
      - metadata
      - price
      - priority
      - providerCode
      - providerName
    ShippingProvider:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          readOnly: true
          title: Κωδικός
          description: Σταθερό αναγνωριστικό που αντιστοιχεί στον καταχωρημένο προσαρμογέα
            μεταφορέα (π.χ. 'acs', 'boxnow').
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          readOnly: true
          title: Όνομα
          description: Όνομα εμφάνισης προς τους πελάτες (π.χ. 'ACS Courier').
        isActive:
          type: boolean
          readOnly: true
          title: Ενεργό
          description: Κύριος διακόπτης — όταν είναι False, ο πάροχος αποκρύπτεται
            από το checkout ανεξάρτητα από τις σημαίες δυνατοτήτων.
        supportsHomeDelivery:
          type: boolean
          readOnly: true
          title: Υποστηρίζει Κατ' Οίκον Παράδοση
        supportsPickupPoint:
          type: boolean
          readOnly: true
          title: Υποστηρίζει σημείο παραλαβής
        liveMode:
          type: boolean
          readOnly: true
          description: False = διαπιστευτήρια sandbox / δοκιμής. Χρησιμοποιείται από
            το UI διαχείρισης για να προειδοποιεί τους χειριστές ότι τα vouchers δεν
            θα αποσταλούν πραγματικά.
        priority:
          type: integer
          readOnly: true
          title: Προτεραιότητα
          description: Σειρά ταξινόμησης στο checkout — οι μικρότεροι αριθμοί εμφανίζονται
            πρώτοι.
        logo:
          type: string
          format: uri
          nullable: true
          readOnly: true
          description: Absolute URL for the operator-uploaded primary brand logo (home-delivery
            rows + fallback for pickup_point when no pickup-specific variant is set).
            ``null`` when no upload — the storefront falls back to its bundled default.
        logoPickupPoint:
          type: string
          format: uri
          nullable: true
          readOnly: true
          description: Absolute URL for the optional pickup-point-specific logo (e.g.
            a locker illustration distinct from the carrier's home-delivery brand
            mark). Surfaced on the pickup_point row's ``logoUrl`` when uploaded; otherwise
            the row falls back to ``logo``.
        mainImagePath:
          type: string
          readOnly: true
          description: Relative ``media/uploads/shipping/<filename>`` path for the
            primary logo; empty string when no logo is uploaded. Mirrors the PayWay.icon
            contract.
        logoFilename:
          type: string
          readOnly: true
          description: Filename of the primary uploaded logo (or empty).
        logoPickupPointFilename:
          type: string
          readOnly: true
          description: Filename of the pickup-point logo (or empty).
        metadata:
          readOnly: true
          title: Μεταδεδομένα
          description: Διαμόρφωση ειδική για τον πάροχο (υποστηριζόμενες χώρες, σημαίες
            λειτουργιών, υποδείξεις branding).
        createdAt:
          type: string
          format: date-time
          readOnly: true
          title: Δημιουργήθηκε στις
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          title: Ενημερώθηκε στις
      required:
      - code
      - createdAt
      - id
      - isActive
      - liveMode
      - logo
      - logoFilename
      - logoPickupPoint
      - logoPickupPointFilename
      - mainImagePath
      - metadata
      - name
      - priority
      - supportsHomeDelivery
      - supportsPickupPoint
      - updatedAt
