  /api/v1/blog/comment:
    get:
      operationId: listBlogComment
      description: 'Ανάκτηση λίστας Σχόλια Blog με δυνατότητες φιλτραρίσματος και
        αναζήτησης. Υποστηρίζει πολλαπλές στρατηγικές σελιδοποίησης: pageNumber (προεπιλογή),
        cursor και limitOffset.'
      summary: Λίστα Σχόλια Blog
      parameters:
      - in: query
        name: ancestorOf
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
        description: Φίλτρο σχολίων που είναι πρόγονοι του δεδομένου σχολίου
      - in: query
        name: approved
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο ανά κατάσταση έγκρισης
      - in: query
        name: content
        schema:
          type: string
        description: Φίλτρο ανά περιεχόμενο σχολίου (χωρίς διάκριση πεζών/κεφαλαίων)
      - in: query
        name: contentLength
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
        description: Φίλτρο ανά ακριβές μήκος περιεχομένου
      - in: query
        name: createdAfter
        schema:
          type: string
          format: date-time
        description: Filter items created after this date
      - in: query
        name: createdAt_Date
        schema:
          type: string
          format: date
      - in: query
        name: createdAt_Gte
        schema:
          type: string
          format: date-time
      - in: query
        name: createdAt_Lte
        schema:
          type: string
          format: date-time
      - in: query
        name: createdBefore
        schema:
          type: string
          format: date-time
        description: Filter items created before this date
      - in: query
        name: cursor
        schema:
          type: string
        description: Δείκτης (cursor) για σελιδοποίηση
      - in: query
        name: descendantOf
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
        description: Φίλτρο σχολίων που είναι απόγονοι του δεδομένου σχολίου
      - in: query
        name: hasContent
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο σχολίων με περιεχόμενο (true) ή κενών (false)
      - in: query
        name: hasLikes
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο σχολίων με επισημάνσεις (true) ή χωρίς επισημάνσεις (false)
      - in: query
        name: hasReplies
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο σχολίων με εγκεκριμένες απαντήσεις (true) ή χωρίς απαντήσεις
          (false)
      - in: query
        name: id
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+$
          - type: integer
      - in: query
        name: id_In
        schema:
          oneOf:
          - type: string
            description: Τιμές διαχωρισμένες με κόμμα
          - type: array
            items:
              type: integer
        description: Οι πολλαπλές τιμές πρέπει να διαχωρίζονται με κόμμα.
        explode: false
        style: form
      - in: query
        name: isAnonymous
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο ανώνυμων σχολίων (χωρίς χρήστη)
      - in: query
        name: isLeaf
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο τελικών σχολίων (χωρίς εγκεκριμένες απαντήσεις)
      - in: query
        name: languageCode
        schema:
          type: string
          enum:
          - de
          - el
          - en
          default: el
        description: Κωδικός γλώσσας για μεταφράσεις (el, en, de)
      - in: query
