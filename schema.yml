  /boxnow/webhook/:
    post:
      operationId: boxnowWebhook
      description: Public endpoint for BoxNow's machine-to-machine parcel-event notifications.
        Authenticated by HMAC-SHA256 datasignature verification — no Knox or session
        auth required. Always returns 200 once the signature is valid (even on duplicate
        events) to prevent BoxNow retry storms.
      summary: Receive a BoxNow parcel-event webhook
      tags:
      - BoxNow webhook
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BoxNowWebhookEnvelopeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BoxNowWebhookEnvelopeRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/BoxNowWebhookEnvelopeRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          description: No response body
        '400':
          description: No response body
        '401':
          description: No response body
        '503':
          description: No response body
components:
  schemas:
    AcsAddressValidationRequestRequest:
      type: object
      description: Free-text address payload — ACS does its own parsing.
      properties:
        address:
          type: string
          minLength: 1
          description: Street + number + optional zip + city, e.g. 'Pireos 25 17778'.
          maxLength: 500
        addressId:
          type: string
          description: Optional re-validation key from a previous response.
          maxLength: 64
        language:
          type: string
          default: GR
          maxLength: 2
      required:
      - address
    AcsAddressValidationResponse:
      type: object
      description: A single resolved address — the first ACSObjectOutput row.
      properties:
        geoId:
          type: integer
          nullable: true
        resolvedStreet:
          type: string
        resolvedStreetNum:
          type: string
        resolvedZip:
          type: string
        resolvedArea:
          type: string
        resolvedLong:
          type: number
          format: double
          nullable: true
        resolvedLat:
          type: number
          format: double
          nullable: true
        resolvedStationId:
          type: string
        resolvedBranchId:
          type: integer
          nullable: true
        resolvedProvidence:
          type: string
        addressId:
          type: string
      required:
      - addressId
      - resolvedArea
      - resolvedProvidence
      - resolvedStationId
      - resolvedStreet
      - resolvedStreetNum
      - resolvedZip
    AcsChargeType:
      enum:
      - 1
      - 2
      type: integer
      description: |-
        * `1` - Προπληρωμένο
        * `2` - Αντικαταβολή
    AcsPickupList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        pickupListNo:
          type: string
          readOnly: true
          title: Αριθμός λίστας παραλαβής
          description: PickupList_No που επιστρέφεται από το ACS_Issue_Pickup_List.
        issuedAt:
          type: string
          format: date-time
          readOnly: true
          title: Εκδόθηκε στις
        issuedBy:
          type: integer
          readOnly: true
          nullable: true
          title: Εκδόθηκε από
          description: Διαχειριστής που ενεργοποίησε τη χειροκίνητη έκδοση. Null όταν
            η λίστα εκδόθηκε από την καθημερινή εργασία Celery beat.
        issuedByUsername:
          type: string
          nullable: true
          readOnly: true
        billingCode:
          type: string
          readOnly: true
          title: Κωδικός χρέωσης
          description: Billing_Code που καταγράφεται τη στιγμή της έκδοσης, ώστε τα
            ιστορικά manifest να παραμένουν επανεκτυπώσιμα ακόμη κι αν αλλάξει η μεταβλητή
            περιβάλλοντος.
        voucherCount:
          type: integer
          readOnly: true
          title: Πλήθος vouchers
        createdAt:
          type: string
          format: date-time
          readOnly: true
          title: Δημιουργήθηκε στις
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          title: Ενημερώθηκε στις
      required:
      - billingCode
      - createdAt
      - id
      - issuedAt
      - issuedBy
      - issuedByUsername
      - pickupListNo
      - updatedAt
      - voucherCount
    AcsShipmentDetail:
      type: object
      description: Detail serializer used on the order-detail endpoint.
      properties:
        id:
          type: integer
          readOnly: true
        uuid:
          type: string
          format: uuid
          readOnly: true
        voucherNo:
          type: string
          readOnly: true
          nullable: true
          title: Αριθμός voucher
          description: 10ψήφιο voucher ACS (Voucher_No από το ACS_Create_Voucher).
        shipmentState:
          allOf:
          - $ref: '#/components/schemas/ShipmentStateEnum'
          readOnly: true
          title: Κατάσταση αποστολής
        shipmentStateDisplay:
          type: string
          readOnly: true
          description: Ετικέτα σε αναγνώσιμη μορφή για την τιμή shipment_state
        deliveryKind:
          allOf:
          - $ref: '#/components/schemas/ShippingKind'
          readOnly: true
          title: Τρόπος παράδοσης
        weightGrams:
          type: integer
          readOnly: true
          title: Βάρος (γραμμάρια)
          description: Εσωτερικά γραμμάρια· μετατρέπονται σε κιλά (>= 0,5) κατά την
            κλήση API σύμφωνα με τις απαιτήσεις βάρους της ACS.
        itemQuantity:
          type: integer
          readOnly: true
          title: Ποσότητα ειδών
        chargeType:
          allOf:
          - $ref: '#/components/schemas/AcsChargeType'
          readOnly: true
          title: Τύπος χρέωσης
        deliveryProducts:
          type: string
          readOnly: true
          title: Προϊόντα παράδοσης
          description: Κωδικοί Acs_Delivery_Products διαχωρισμένοι με κόμμα (COD,
            REC, SAT, RDO …).
        lastEventAt:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          title: Τελευταίο συμβάν
        lastPolledAt:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          title: Τελευταία ανάκτηση
          description: Χρησιμοποιείται από το poll_acs_tracking_batch για κατανομή
            φορτίου και παράλειψη αποστολών που ελέγχθηκαν τα τελευταία 15 λεπτά.
        deliveryDate:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          title: Ημερομηνία παράδοσης
        createdAt:
          type: string
          format: date-time
          readOnly: true
          title: Δημιουργήθηκε στις
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          title: Ενημερώθηκε στις
        stationDestinationExternalId:
          type: string
          readOnly: true
          title: Εξωτερικό ID καταστήματος προορισμού
          description: Μη κανονικοποιημένο ACS_SHOP_STATION_ID — διατηρείται ακόμη
            κι αν διαγραφεί η εγγραφή AcsStation.
        stationBranchDestination:
          type: string
          readOnly: true
          title: Υποκατάστημα προορισμού
          description: Τιμή Acs_Station_Branch_Destination.
        station:
          allOf:
          - $ref: '#/components/schemas/AcsStation'
          nullable: true
          readOnly: true
          description: Στοιχεία καταστήματος προορισμού ACS (παραλαβές Smartpoint).
        events:
          type: array
          items:
            $ref: '#/components/schemas/AcsTrackingEvent'
          readOnly: true
          description: Τελευταία 50 συμβάντα παρακολούθησης ταξινομημένα κατά event_time
            φθίνουσα.
        labelUrl:
          type: string
          nullable: true
          description: Σχετικό URL για λήψη του PDF voucher μέσω του proxy Django.
          readOnly: true
        cancelRequestedAt:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          title: Αίτημα ακύρωσης στις
      required:
      - cancelRequestedAt
      - chargeType
      - createdAt
      - deliveryDate
      - deliveryKind
      - deliveryProducts
      - events
      - id
      - itemQuantity
      - labelUrl
      - lastEventAt
      - lastPolledAt
      - shipmentState
      - shipmentStateDisplay
      - station
      - stationBranchDestination
      - stationDestinationExternalId
      - updatedAt
      - uuid
      - voucherNo
      - weightGrams
    AcsStation:
      type: object
      description: |-
        List serializer for ACS stations / Smartpoints.

        Includes ``working_hours`` so the checkout picker can render
        opening hours inline without requiring a per-row detail fetch.
      properties:
        id:
          type: integer
          readOnly: true
        uuid:
          type: string
          format: uuid
          readOnly: true
        externalId:
          type: string
          readOnly: true
          title: Εξωτερικό ID
          description: ACS_SHOP_STATION_ID — χρησιμοποιείται ως Acs_Station_Destination.
        branchCode:
          type: string
          readOnly: true
          title: Κωδικός υποκαταστήματος
          description: ACS_SHOP_BRANCH_ID — συνδυάζεται με το external_id κατά τη
            δημιουργία vouchers (Acs_Station_Branch_Destination).
