          minimum: -1000000000
          exclusiveMaximum: true
          exclusiveMinimum: true
          readOnly: true
        paymentMethodFee:
          type: number
          format: double
          maximum: 1000000000
          minimum: -1000000000
          exclusiveMaximum: true
          exclusiveMinimum: true
          readOnly: true
        documentType:
          allOf:
          - $ref: '#/components/schemas/OrderDocumentType'
          title: Τύπος Εγγράφου
        createdAt:
          type: string
          format: date-time
          readOnly: true
          title: Δημιουργήθηκε στις
        updatedAt:
          type: string
          format: date-time
          readOnly: true
          title: Ενημερώθηκε στις
        uuid:
          type: string
          format: uuid
          readOnly: true
        totalPriceItems:
          type: number
          format: double
          maximum: 1000000000
          minimum: -1000000000
          exclusiveMaximum: true
          exclusiveMinimum: true
          readOnly: true
        totalPriceExtra:
          type: number
          format: double
          maximum: 1000000000
          minimum: -1000000000
          exclusiveMaximum: true
          exclusiveMinimum: true
          readOnly: true
        fullAddress:
          type: string
          readOnly: true
        paymentId:
          type: string
          nullable: true
          title: ID πληρωμής
          maxLength: 255
        paymentStatus:
          title: Κατάσταση πληρωμής
          oneOf:
          - $ref: '#/components/schemas/PaymentStatusEnum'
          - $ref: '#/components/schemas/BlankEnum'
        paymentStatusDisplay:
          type: string
          readOnly: true
          description: Localised label for ``payment_status`` (mirrors ``status_display``).
            Frontend renders this rather than the raw enum value so Greek/English/German
            locales all work without per-locale string maps in the UI.
        paymentMethod:
          type: string
          title: Μέθοδος πληρωμής
          maxLength: 50
        isOnlinePayment:
          type: boolean
          readOnly: true
          description: True when the order's PayWay charges the shopper online (Stripe,
            Viva); false for cash-on-delivery / bank transfer. Surfaced on both list
            + detail so both views can suppress misleading 'outstanding amount' warnings
            for COD orders where the shopper intentionally paid €0 at checkout.
        canBeCanceled:
          type: boolean
          readOnly: true
        isPaid:
          type: boolean
          readOnly: true
        orderTimeline:
          type: array
          items:
            type: object
            properties:
              changeType:
                type: string
              timestamp:
                type: string
              description:
                type: string
              user:
                type: string
                nullable: true
              previousValue:
                type: object
                nullable: true
              newValue:
                type: object
                nullable: true
          readOnly: true
          description: Order status timeline and history
        pricingBreakdown:
          type: object
          properties:
            itemsSubtotal:
              type: number
            shippingCost:
              type: number
            paymentMethodFee:
              type: number
            extrasTotal:
              type: number
            grandTotal:
              type: number
            currency:
              type: string
            paidAmount:
              type: number
            remainingAmount:
              type: number
          readOnly: true
          description: Detailed pricing breakdown
        trackingDetails:
          type: object
          nullable: true
          properties:
            trackingNumber:
              type: string
              nullable: true
            shippingCarrier:
              type: string
              nullable: true
            hasTracking:
              type: boolean
            estimatedDelivery:
              type: string
              nullable: true
            trackingUrl:
              type: string
              nullable: true
          readOnly: true
          description: Tracking and shipping details
        hasInvoice:
          type: boolean
          readOnly: true
          description: True when a PDF invoice has been generated — the frontend can
            show the download CTA without issuing a separate request to the invoice
            endpoint to find out.
        boxnowShipment:
          allOf:
          - $ref: '#/components/schemas/BoxNowShipmentDetail'
          nullable: true
          readOnly: true
          description: BoxNow shipment details when shipping_provider.code is 'boxnow',
            else null.
        acsShipment:
          allOf:
          - $ref: '#/components/schemas/AcsShipmentDetail'
          nullable: true
          readOnly: true
          description: ACS shipment details when the order's shipping provider is
            ACS, else null.
        shipment:
          type: object
          nullable: true
          additionalProperties: true
          description: Provider-agnostic shipment payload — frontends can read this
            single field instead of branching on boxnow_shipment / acs_shipment.  Returns
            the active provider's detail serializer dict (shape depends on the provider)
            or null when no shipment exists.
          readOnly: true
        shipmentProviderCode:
          type: string
          nullable: true
          readOnly: true
          description: Identifier of the carrier handling this order — 'acs', 'boxnow',
            or null when no provider is attached.  Lets frontends switch on a stable
            code instead of inspecting the shipment shape.
        cancellation:
          type: object
          nullable: true
          properties:
            reason:
              type: string
            canceledAt:
              type: string
              format: date-time
            previousStatus:
              type: string
            shipmentCancel:
              type: object
              nullable: true
              properties:
                attempted:
                  type: boolean
                dispatched:
                  type: boolean
                error:
                  type: string
                  nullable: true
          readOnly: true
          description: Cancellation context for CANCELED orders — exposes the operator-supplied
            reason, timestamp, and shipment-cancel outcome from ``order.metadata['cancellation']``.
            Returns null when the order was not canceled. Internal flags from the
            metadata bag (webhook idempotency markers, mint tickets) are intentionally
            not surfaced.
        trackingNumber:
          type: string
          title: Αριθμός Παρακολούθησης
          maxLength: 255
        shippingCarrier:
          type: string
          title: Εταιρεία μεταφοράς
          maxLength: 255
        customerFullName:
          type: string
          readOnly: true
        isCompleted:
          type: boolean
          readOnly: true
        isCanceled:
          type: boolean
          readOnly: true
        metaEventIds:
          type: object
          additionalProperties:
            type: string
          description: Meta Pixel ``eventID`` values the browser must reuse when firing
            the matching pixel call on the success page so Meta dedups the browser
            event against the server-side Conversions API event. Only the keys minted
            at order creation are surfaced (purchase, initiate_checkout, add_payment_info).
            Empty dict when the customer declined marketing cookies — in that case
            the browser should not fire the matching pixel either.
          readOnly: true
        currency:
          type: string
          example: EUR
          readOnly: true
          description: ISO 4217 currency code for every monetary field on the order
            (paidAmount, shippingPrice, totalPriceItems, …). Surfaced as a top-level
            field because djmoney serialises money fields as bare numbers — without
            this, the frontend has no way to know whether ``59.98`` is EUR or USD,
            which breaks ad-pixel attribution and cart totals in multi-currency reports.
      required:
      - acsShipment
      - boxnowShipment
      - canBeCanceled
      - cancellation
      - city
      - country
      - createdAt
      - currency
      - customerFullName
      - email
      - firstName
      - fullAddress
      - hasInvoice
      - id
      - isCanceled
      - isCompleted
      - isOnlinePayment
      - isPaid
      - items
      - lastName
      - metaEventIds
      - orderTimeline
      - paidAmount
      - payWay
      - paymentMethodFee
      - paymentStatusDisplay
      - phone
      - pricingBreakdown
      - region
      - shipment
      - shipmentProviderCode
      - shippingPrice
      - statusDisplay
      - statusUpdatedAt
      - street
      - streetNumber
      - totalPriceExtra
      - totalPriceItems
      - trackingDetails
      - updatedAt
      - uuid
      - zipcode
