            pattern: ^-?\d+$
          - type: integer
        description: Αριθμός αποτελεσμάτων ανά σελίδα
      - in: query
        name: pagination
        schema:
          type: string
          enum:
          - 'false'
          - 'true'
          default: 'true'
        description: Ενεργοποίηση/απενεργοποίηση σελιδοποίησης
      - in: query
        name: paginationType
        schema:
          type: string
          enum:
          - cursor
          - limitOffset
          - pageNumber
          default: pageNumber
        description: Τύπος στρατηγικής σελιδοποίησης
      - in: query
        name: providerCode
        schema:
          type: string
        description: Φίλτρο ανά κωδικό παρόχου (μερική αντιστοίχιση)
      - in: query
