  /api/v1/cart/list:
    get:
      operationId: listCart
      description: Λήψη καλαθιού. Για επισκέπτες, συμπεριλάβετε την κεφαλίδα X-Cart-Id
        για διατήρηση της συνεδρίας καλαθιού.
      summary: Λήψη καλαθιού
      parameters:
      - in: header
        name: X-Cart-Id
        schema:
          type: string
          format: uuid
        description: Guest cart UUID. Used to identify and maintain guest cart sessions.
      - in: query
        name: cartType
        schema:
          type: string
          enum:
          - anonymous
          - guest
          - user
        description: |-
          Φίλτρο ανά τύπο καλαθιού

          * `user` - User Cart
          * `guest` - Guest Cart
          * `anonymous` - Anonymous Cart
      - in: query
        name: createdAfter
        schema:
          type: string
          format: date-time
        description: Filter items created after this date
      - in: query
        name: createdAt_Date
        schema:
          type: string
          format: date
      - in: query
        name: createdAt_Gte
        schema:
          type: string
          format: date-time
      - in: query
        name: createdAt_Lte
        schema:
          type: string
          format: date-time
      - in: query
        name: createdBefore
        schema:
          type: string
          format: date-time
        description: Filter items created before this date
      - in: query
        name: cursor
        schema:
          type: string
        description: Δείκτης (cursor) για σελιδοποίηση
      - in: query
        name: daysInactive
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
        description: Φίλτρο καλαθιών αδρανών για τουλάχιστον X ημέρες
      - in: query
        name: hasDiscounts
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο καλαθιών με/χωρίς είδη σε έκπτωση
      - in: query
        name: hasItems
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο καλαθιών με/χωρίς είδη
      - in: query
        name: id
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+$
          - type: integer
      - in: query
        name: id_In
        schema:
          oneOf:
          - type: string
            description: Τιμές διαχωρισμένες με κόμμα
          - type: array
            items:
              type: integer
        description: Οι πολλαπλές τιμές πρέπει να διαχωρίζονται με κόμμα.
        explode: false
        style: form
      - in: query
        name: isAbandoned
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο εγκαταλελειμμένων καλαθιών (αδρανή για 30+ ημέρες)
      - in: query
        name: isActive
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο ενεργών/εγκαταλελειμμένων καλαθιών (βάσει 30 ημερών αδράνειας)
      - in: query
        name: isGuest
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο καλαθιών επισκεπτών (True) ή καλαθιών χρηστών (False)
      - in: query
        name: languageCode
        schema:
          type: string
          enum:
          - de
          - el
          - en
          default: el
        description: Κωδικός γλώσσας για μεταφράσεις (el, en, de)
      - in: query
        name: lastActivity
        schema:
          type: string
          format: date-time
        description: Φίλτρο ανά ακριβή ημερομηνία τελευταίας δραστηριότητας
      - in: query
        name: lastActivity_Date
        schema:
          type: string
          format: date
      - in: query
        name: lastActivity_Gte
        schema:
          type: string
          format: date-time
      - in: query
        name: lastActivity_Lte
        schema:
          type: string
          format: date-time
      - in: query
        name: lastActivityAfter
        schema:
          type: string
          format: date-time
        description: Φίλτρο καλαθιών με τελευταία δραστηριότητα μετά από αυτή την
          ημερομηνία
      - in: query
        name: lastActivityBefore
        schema:
          type: string
          format: date-time
        description: Φίλτρο καλαθιών με τελευταία δραστηριότητα πριν από αυτή την
          ημερομηνία
      - in: query
        name: maxItems
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
        description: Φίλτρο καλαθιών με έως X συνολικά είδη (ποσότητα)
      - in: query
        name: maxTotalValue
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
        description: Φίλτρο καλαθιών με συνολική αξία έως X
      - in: query
        name: maxUniqueItems
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
        description: Φίλτρο καλαθιών με έως X μοναδικά είδη
      - in: query
        name: minItems
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
        description: Φίλτρο καλαθιών με τουλάχιστον X συνολικά είδη (ποσότητα)
      - in: query
        name: minTotalValue
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
        description: Φίλτρο καλαθιών με συνολική αξία τουλάχιστον X
      - in: query
        name: minUniqueItems
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
        description: Φίλτρο καλαθιών με τουλάχιστον X μοναδικά είδη
      - name: ordering
        in: query
        required: false
        description: 'Which field(s) to use when ordering the results. Multiple fields
          can be combined with commas (e.g. ``-isMain,-createdAt``). Available fields:
          id, -id, user, -user, createdAt, -createdAt, updatedAt, -updatedAt, lastActivity,
          -lastActivity'
        schema:
          type: string
          pattern: ^(?:id|\-id|user|\-user|createdAt|\-createdAt|updatedAt|\-updatedAt|lastActivity|\-lastActivity)(?:,(?:id|\-id|user|\-user|createdAt|\-createdAt|updatedAt|\-updatedAt|lastActivity|\-lastActivity))*$
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+$
          - type: integer
      - in: query
        name: pageSize
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+$
          - type: integer
        description: Αριθμός αποτελεσμάτων ανά σελίδα
      - in: query
        name: pagination
        schema:
          type: string
          enum:
          - 'false'
          - 'true'
          default: 'true'
        description: Ενεργοποίηση/απενεργοποίηση σελιδοποίησης
      - in: query
        name: paginationType
        schema:
          type: string
          enum:
          - cursor
          - limitOffset
          - pageNumber
          default: pageNumber
        description: Τύπος στρατηγικής σελιδοποίησης
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: updatedAfter
        schema:
          type: string
          format: date-time
        description: Filter items updated after this date
      - in: query
        name: updatedAt_Date
        schema:
          type: string
          format: date
      - in: query
        name: updatedAt_Gte
        schema:
          type: string
          format: date-time
      - in: query
        name: updatedAt_Lte
        schema:
          type: string
          format: date-time
      - in: query
        name: updatedBefore
        schema:
          type: string
          format: date-time
        description: Filter items updated before this date
      - in: query
        name: user
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+$
          - type: integer
        description: Φίλτρο ανά ID χρήστη
      - in: query
        name: user_IsActive
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο ανά ενεργούς χρήστες
      - in: query
        name: user_Isnull
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο καλαθιών με/χωρίς χρήστες
      - in: query
        name: userEmail
        schema:
          type: string
        description: Φίλτρο ανά email χρήστη (μερική αντιστοίχιση)
      - in: query
        name: userName
        schema:
          type: string
        description: Φίλτρο ανά πλήρες όνομα χρήστη (όνομα ή επώνυμο)
      - in: query
        name: uuid
        schema:
          type: string
          format: uuid
