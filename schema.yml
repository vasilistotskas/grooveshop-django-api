          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
    post:
      operationId: unsubscribeFromAllOneClick
      description: Καλείται από προγράμματα email που τηρούν το List-Unsubscribe-Post=One-Click.
        Επιστρέφει 200 OK ανεξάρτητα από την εγκυρότητα του token (σιωπηλά, κατά RFC
        8058).
      summary: Διαγραφή με ένα κλικ από όλα τα θέματα κατά RFC 8058
      parameters:
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - User Subscriptions
      responses:
        '200':
          description: No response body
