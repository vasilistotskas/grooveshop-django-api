          maxLength: 150
      required:
      - username
    UsernameUpdateResponse:
      type: object
      properties:
        detail:
          type: string
          description: Μήνυμα επιτυχίας για ενημέρωση ονόματος χρήστη
      required:
      - detail
    VariantAxis:
      type: object
      description: |-
        A variant axis (an ``Attribute`` flagged ``is_variant``) plus the
        distinct values present across the group, both ordered by ``sort_order``.
      properties:
        id:
          type: integer
        name:
          type: string
        values:
          type: array
          items:
            $ref: '#/components/schemas/VariantAxisValue'
      required:
      - id
      - name
      - values
    VariantAxisValue:
      type: object
      description: One selectable value on a variant axis (an ``AttributeValue``).
      properties:
        id:
          type: integer
        value:
          type: string
      required:
      - id
      - value
    VivaReturnLookupResponse:
      type: object
      description: Minimal, PII-free payload for the Viva post-payment redirect hop.
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        status:
          type: string
        paymentStatus:
          type: string
      required:
      - id
      - paymentStatus
      - status
      - uuid
    WebSocketTicketResponse:
      type: object
      properties:
        ticket:
          type: string
        expiresIn:
          type: integer
      required:
      - expiresIn
      - ticket
    ZeroResultQuery:
      type: object
      description: Serializer for zero-result query analytics.
      properties:
        query:
          type: string
          description: The search query text that returned no results
        count:
          type: integer
          description: Number of times this query returned zero results
        languageCode:
          type: string
          description: Language code for the query
      required:
      - count
      - languageCode
      - query
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
