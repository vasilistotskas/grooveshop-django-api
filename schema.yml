  /api/v1/order/viva_return:
    get:
      operationId: vivaReturnLookup
      description: Το Smart Checkout του Viva ανακατευθύνει σε ένα στατικό URL επιτυχίας
        που έχει διαμορφωθεί στο merchant portal και προσθέτει ``?t=<transaction_id>&s=<order_code>&lang=..&eventId=<int>&eci=..``
        (βλ. ενσωμάτωση Smart Checkout στο developer.viva.com). Αυτό το endpoint μετατρέπει
        αυτές τις παραμέτρους στο UUID της παραγγελίας ώστε το κατάστημα να μπορεί
        να προωθήσει τον πελάτη στη διαδρομή ``/checkout/success/{uuid}``. Το ``t``
        επιλύεται μέσω του ``payment_id`` (ορίζεται από το webhook, ενδέχεται να καθυστερεί
        σε σχέση με την ανακατεύθυνση)· το ``s`` επιλύεται μέσω του ``viva_order_code``
        που αποθηκεύεται κατά τη δημιουργία της συνεδρίας, οπότε λειτουργεί και κατά
        τη διάρκεια της κούρσας με το webhook. Η πρόσβαση είναι ανοιχτή επειδή και
        τα δύο κλειδιά είναι μη μαντέψιμα αναγνωριστικά που παράγει το Viva και η
        απόκριση δεν φέρει προσωπικά δεδομένα — μόνο το UUID, το δημόσιο id, την κατάσταση
        και το payment_status της παραγγελίας.
      summary: Αναζήτηση παραγγελίας από τις παραμέτρους ανακατεύθυνσης μετά την πληρωμή
        του Viva Wallet
      parameters:
      - in: query
        name: s
        schema:
          type: string
        description: Viva order code (16-digit id of the payment order).
      - in: query
        name: t
        schema:
          type: string
        description: Viva transaction_id (UUID).
      tags:
      - Orders
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VivaReturnLookupResponse'
          description: ''
        '400':
          description: No response body
        '404':
          description: No response body
  /api/v1/pay_way:
    get:
      operationId: listPayWay
      description: 'Ανάκτηση λίστας Τρόποι πληρωμής με δυνατότητες φιλτραρίσματος
        και αναζήτησης. Υποστηρίζει πολλαπλές στρατηγικές σελιδοποίησης: pageNumber
        (προεπιλογή), cursor και limitOffset.'
      summary: Λίστα Τρόποι πληρωμής
      parameters:
      - in: query
        name: active
        schema:
          oneOf:
          - type: string
            enum:
            - 'true'
            - 'false'
            - '1'
            - '0'
          - type: boolean
        description: Φίλτρο ανά κατάσταση ενεργοποίησης
      - in: query
        name: cost_Gte
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
      - in: query
        name: cost_Lte
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
      - in: query
        name: costMax
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+(\.\d+)?$
          - type: number
        description: Φίλτρο ανά μέγιστο κόστος
      - in: query
