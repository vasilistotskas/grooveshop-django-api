        schema:
          type: string
        description: ID κατηγοριών διαχωρισμένα με κόμμα (category IN [ids])
      - in: query
        name: facets
        schema:
          type: string
        description: Πεδία facet διαχωρισμένα με κόμμα για πλήθη και στατιστικά
      - in: query
        name: languageCode
        schema:
          type: string
        description: Κωδικός γλώσσας για φιλτράρισμα αποτελεσμάτων (π.χ. 'en', 'el',
          'de'). Αν δεν δοθεί, αναζητά σε όλες τις γλώσσες.
      - in: query
        name: likesMin
        schema:
          oneOf:
          - type: string
            pattern: ^-?\d+$
