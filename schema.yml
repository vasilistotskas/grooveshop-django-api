    CartCreatePaymentIntentRequestRequest:
      type: object
      description: |-
        Request body for ``POST /api/v1/cart/create-payment-intent``.

        ``shipping_kind`` is required so the view's shipping calculation
        follows the same code path the order-create verification runs.
        ``shipping_provider_code`` is required for ``pickup_point`` (the
        carrier identity drives the locker quote + per-carrier threshold)
        but **omitted for ``home_delivery``** — home delivery is
        provider-agnostic in checkout per the frontend's
        ``shared/shipping/index.ts::carrierForMethod`` contract, and the
        backend resolves the active home-delivery provider at order
        creation. Sending whatever the frontend has guarantees both calc
        paths agree.
      properties:
        payWayId:
          type: integer
          minimum: 1
          description: ID της επιλεγμένης μεθόδου πληρωμής (πρέπει να είναι online
            Stripe).
        shippingKind:
          allOf:
          - $ref: '#/components/schemas/CartCreatePaymentIntentRequestShippingKindEnum'
          description: |-
            Τύπος εκπλήρωσης για τον μεταφορέα (home_delivery ή pickup_point). Απαιτείται ώστε να τηρούνται οι επιμέρους σημαίες λειτουργίας (π.χ. ACS_SMARTPOINT_ENABLED) και ο έλεγχος PICKUP_POINT του BoxNow.

            * `home_delivery` - home_delivery
            * `pickup_point` - pickup_point
        shippingProviderCode:
          type: string
          description: Κωδικός μεταφορέα που αντιστοιχεί σε καταχωρημένο προσαρμογέα
            αποστολής (π.χ. 'acs', 'boxnow'). Απαιτείται για ``pickup_point``· παραλείψτε/αφήστε
            κενό για ``home_delivery`` (το backend χρησιμοποιεί τη γενική πάγια χρέωση,
            αντίστοιχη με αυτή που θα υπολογίσει η επαλήθευση δημιουργίας παραγγελίας
            για το ίδιο αίτημα).
          maxLength: 32
        countryId:
          type: string
          description: Προαιρετικός κωδικός χώρας ISO 3166-1 alpha-2 — καθορίζει τον
            συντελεστή αποστολής σε επίπεδο χώρας. Πρέπει να ταιριάζει με αυτόν που
            θα φέρει το αίτημα δημιουργίας παραγγελίας.
          maxLength: 2
        regionId:
          type: string
          description: Προαιρετικός κωδικός περιφέρειας — καθορίζει την προσαρμογή
            αποστολής σε επίπεδο περιφέρειας.
          maxLength: 16
      required:
      - payWayId
      - shippingKind
    CartCreatePaymentIntentRequestShippingKindEnum:
      enum:
      - home_delivery
      - pickup_point
      type: string
      description: |-
        * `home_delivery` - home_delivery
        * `pickup_point` - pickup_point
