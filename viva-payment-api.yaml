#-------------------TAM-601------------------------------------------------------------------------------------------------------------------------------------------

    '/api/transactions/{transaction_Id}':
        delete:
            security:
                - BasicAuth:
                  - 'See BasicAuth'
            description: |-
                [![Run in Postman](https://run.pstmn.io/button.svg)](https://app.getpostman.com/run-collection/19692059-a2392bf8-7115-4cef-9a44-653b99ec5396?action=collection%2Ffork&collection-url=entityId%3D19692059-a2392bf8-7115-4cef-9a44-653b99ec5396%26entityType%3Dcollection%26workspaceId%3D71008394-7296-44d9-ad1c-ae1f239b5574)



                **Original Credit Transaction (OCT):**

                Pays directly an amount to a card. It is a refund transaction which allows you to return money
                to a card, irrespective of the original payment amount.<br><br>Example: DELETE `/api/transactions/a93da583-2959-491f-94ce-645e1e673ddc/?amount=200&ServiceId=6&sourceCode=4855&merchantTrns=Merchantdescription&customerTrns=Customerdescription`

                <strong>Please Note:</strong><br>
                * OCT is available only within the 'Betting' trading category (7995). If your business is eligible, please request access by emailing <support@vivapayments.com><br>
                * OCT transactions will fail (`PaymentsInsufficientFundsForReversal`) if the transaction is for an amount higher than the available wallet balance<br>
                * OCT is *only* supported by the Visa & Mastercard schemes<br>
                * OCT can *only* be used for Card-not-Present (e-commerce) payments made via cards and Digital Wallets (such as Apple Pay, Google Pay, etc.) - it *cannot* be used for Card-Present (POS) payments or other Alternative Payment Methods<br><br>

                **Pay Out [**DEPRECATED**]:**

                <em><strong>Please Note: Pay Out is now deprecated. Please contact your Sales representative for more information</strong></em>

                Pays directly an amount to a card. It is a refund transaction which allows you to return money
                to a card, irrespectively of the original payment amount.<br><br>Example: DELETE `/api/transactions/a93da583-2959-491f-94ce-645e1e673ddc/?amount=200&ServiceId=14&sourceCode=4855&merchantTrns=Merchantdescription&customerTrns=Customerdescription`

            produces:
                - application/json
            tags:
                - Transactions
            parameters:
                -
                    name: amount
                    description: >-
                        The amount that will be refunded in the currency's smallest denomination (e.g amount
                        in pounds / euros x 100). <br><br>For example, if you want to refund a payment of £100.37, you need to pass the value
                        `10037`.

                        >***Please note:*** OCT and Pay Out transactions will fail (`PaymentsInsufficientFundsForReversal`) if the transaction is for an amount higher than the available wallet balance.<br>

                    in: query
                    required: true
                    type: integer
                -
                    name: serviceId
                    description: The value `6` is necessary in order to perform an OCT, the value `14` is necessary in order to perform a Pay Out
                    in: query
                    required: true
                    type: number
                -
                    name: idempotencyKey
                    description: Specify a key in order for the call have idempotent behaviour for all calls with the same key
                    in: query
                    required: true
                    type: string
                -
                    name: sourceCode
                    description: >-
                        The source from which the funds will be withdrawn. Each source is linked to a wallet.
                        If no `sourceCode` parameter is set then the funds will be withdrawn from the primary
                        wallet.
                    in: query
                    required: false
                    type: number
                -
                    name: merchantTrns
                    description: >-
                        An ID or a short description that helps you uniquely identify the transaction. For
                        example, this can be your customer order reference number.
                    in: query
                    required: false
                    type: string
                -
                    name: customerTrns
                    description: >-
                        A friendly description that you want to display to the customer. This description appears on the receipt the customer receives.
                    in: query
                    required: false
                    type: string
                -
                    name: currencyCode
                    description: >-
                        The numeric code of the transaction's currency as defined in [ISO 4712](https://en.wikipedia.org/wiki/ISO_4217). <br><br>Merchants can create a transaction in different currencies than the currency of the country to which they are registered. The currency code specified in this parameter indicates the currency in which the customer's payment will be made. <br><br>Please see [this page](/smart-checkout/multicurrency/) for more details and restrictions about multicurrency functionality.
                    in: query
                    required: false
                    type: string
                                  

            x-code-samples:
              - lang: cURL
                source: |
                  curl --location -g --request DELETE 'https://demo.vivapayments.com/api/transactions/{id}?amount={amount}&serviceId={serviceId}' \
                  --header 'Authorization: Basic TWVyY2hhbnRfSUQ6QVBJX0tleQ=='
              - lang: PHP
                source: |
                  <?php

                  $curl = curl_init();

                  curl_setopt_array($curl, array(
                    CURLOPT_URL => 'https://demo.vivapayments.com/api/transactions/%7Bid%7D?amount=%7Bamount%7D&serviceId=%7BserviceId%7D',
                    CURLOPT_RETURNTRANSFER => true,
                    CURLOPT_ENCODING => '',
                    CURLOPT_MAXREDIRS => 10,
                    CURLOPT_TIMEOUT => 0,
                    CURLOPT_FOLLOWLOCATION => true,
                    CURLOPT_HTTP_VERSION => CURL_HTTP_VERSION_1_1,
                    CURLOPT_CUSTOMREQUEST => 'DELETE',
                    CURLOPT_HTTPHEADER => array(
                      'Authorization: Basic TWVyY2hhbnRfSUQ6QVBJX0tleQ=='
                    ),
                  ));

                  $response = curl_exec($curl);

                  curl_close($curl);
                  echo $response;

              - lang: NodeJs
                source: |
                  var request = require('request');
                  var options = {
                    'method': 'DELETE',
                    'url': 'https://demo.vivapayments.com/api/transactions/{id}?amount={amount}&serviceId={serviceId}',
                    'headers': {
                      'Authorization': 'Basic TWVyY2hhbnRfSUQ6QVBJX0tleQ=='
                    }
                  };
                  request(options, function (error, response) {
                    if (error) throw new Error(error);
                    console.log(response.body);
                  });

              - lang: Java
                source: |
                  OkHttpClient client = new OkHttpClient().newBuilder()
                    .build();
                  MediaType mediaType = MediaType.parse("text/plain");
                  RequestBody body = RequestBody.create(mediaType, "");
                  Request request = new Request.Builder()
                    .url("https://demo.vivapayments.com/api/transactions/{id}?amount={amount}&serviceId={serviceId}")
                    .method("DELETE", body)
                    .addHeader("Authorization", "Basic TWVyY2hhbnRfSUQ6QVBJX0tleQ==")
                    .build();
                  Response response = client.newCall(request).execute();

            responses:
                '200':
                    description: Success
                    schema:
                        $ref: '#/definitions/delete_transaction'
                '400':
                    description: Request is invalid <em>-or-</em> Payment amount not valid for cancellation
                    schema:
