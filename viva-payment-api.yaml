            bankId:
              type: string
              description:
                  The ID of the card scheme.
            amount:
                type: number
                description:
                    The amount in the merchant's original currency that corresponds to this transaction ID.
            switching:
                type: boolean
                description:
                    Whether or not this is a switching transaction.
            orderCode:
                type: integer
                description:
                    The order's unique code.
            SourceCode:
                description: The code of the source related to the transaction.
                type: string
            #test:
                #$ref: '#/definitions/Transaction%20Details'
            statusId:
                #format: int32
                description: >-
                     Enum: `"F"` `"A"`  `"C"` `"E"` `"M"` `"R"` `"X"` `"MA"` `"MI"` `"ML"` `"MS"` `"MW"`<br><br>
                            F = Finished<br>
                            A = Active<br>
                            C = Captured<br>
                            E = Error<br>
                            R = Refunded<br>
                            X = Cancelled<br>
                            M = Claimed<br>
                            MA = Claim Awaiting Response<br>
                            MI = Claim In Progress<br>
                            ML = Claim Lost<br>
                            MS = Suspected Claimed<br>
                            MW = Claim Won<br>
                type: string
            fullName:
                description: The full name of the customer.
                type: string
            insDate:
                format: date-time
                description: The date & time of the transaction.
                type: string
            cardNumber:
                description: The customer's card number.
                type: string
            currencyCode:
                type: string
                description: The numeric code of the currency as defined in <a href="https://en.wikipedia.org/wiki/ISO_4217">ISO 4712</a>.
            customerTrns:
                description: The friendly description associated to this transactions, which displayed to the customer on the payment form.
                type: string
            merchantTrns:
                description: The merchant's short description associated to this transaction.
                type: string
            transactionTypeId:
                description: The transaction type. You may find all the possible values [here](/integration-reference/response-codes/#transactiontypeid-parameter).
                type: integer
            recurringSupport:
                description: Specify if the transaction created can be further used to initiate new transactions. Applies mainly to orders fulfilled with cards.
                type: boolean
            totalInstallments:
                description: The number of installments that the customer can choose for this transaction.
                type: integer
            cardCountryCode:
                description: The card's origin country in [ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-2).
                type: string
                example: GR
            cardIssuingBank:
                description: The bank of the card.
                type: string
            currentInstallment:
                description: The current number of the instalment.
                type: integer
            originalAmount:
                description: The final amount in the selected currency, reflecting the total charge from the customer.
                type: number
            conversionRate:
                description: The conversion rate applied to the OriginalAmount to calculate the actual amount in the merchant's currency.
                type: number
            cardUniqueReference:
                description: A unique reference associated with the number of the card that was used to pay (different cards will have a different cardUniqueReference). This field is empty if a) the customer paid with a payment method other than a card, or b) the customer paid with a digital wallet (Apple Pay, Google Pay, Samsung Pay).
                type: string
            originalCurrencyCode:
                description: The selected currency code for the payment, as defined in [ISO 4712](https://en.wikipedia.org/wiki/ISO_4217).
                type: string
            eventId:
                description: If the call is unsuccessful, an [event id](/integration-reference/response-codes/#event-id-codes) specifying the error reason is generated.
                type: integer
            cardExpirationDate:
              type: string
              description: The expiration date of the card                
            cardTypeId:
                description: >-
                      The card type.<br><br>
                      Possible Values: `"0"` `"1"`  `"2"` `"3"` `"4"` `"5"` `"6"` `"7"` `"8"` <br><br>
                            0 = Visa<br>
                            1 = Mastercard<br>
                            2 = Diners<br>
                            3 = Amex<br>
                            4 = Invalid<br>
                            5 = Unknown<br>
                            6 = Maestro<br>
                            7 = Discover<br>
                            8 = JCB<br>
                type: integer
            digitalWalletId:
                description: >-
                      This parameter indicates whether the card payment was made via a simple card (`"null"`) or via a digital wallet.<br><br>
                      Possible Values: `"2"` `"3"` `"4"`<br><br>
                            2 = Apple Pay<br>
                            3 = Google Pay <strong>*</strong><br>
                            4 = Samsung Pay<br>
                            6 = MobilePay Online<br><br>
                      ><strong>*</strong> The digitalWalletId value is `"3"` only when the card has been added to the Google Wallet app and payment is made with an android device. If not, this value will be `"null"`.
                type: integer
            loyaltyTransactions:
                $ref: '#/definitions/LoyaltyTransactions2'
