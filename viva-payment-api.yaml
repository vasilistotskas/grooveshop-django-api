                - File Request API
            responses:
                '200':
                    description: Success
                    schema:
                        $ref: '#/definitions/filerequests_webhook_request'
            parameters:
                -
                    name: User-Agent
                    in: header
                    default: “Viva-Hookshot/1.0”
                    description: Constant value
                    schema:
                        type: string

                -
                    name: Viva-Signature
                    in: header
                    description: Contains the HMAC hex digest of the request body, and is generated using the SHA-1 hash function and the secret (provided when [adding](/apis-for-payments/payment-api/#tag/Webhooks-API/paths/~1dataservices~1v1~1webhooks~1subscriptions/post) or [updating](/apis-for-payments/payment-api/#tag/Webhooks-API/paths/~1dataservices~1v1~1webhooks~1subscriptions~1{SubscriptionId}/put) a subscription) as the HMAC key.
                    schema:
                        type: string


                -
                    name: Viva-Signature-256
                    in: header
                    description: Contains the HMAC hex digest of the request body, and is generated using the SHA-256 hash function and the secret (provided when [adding](/apis-for-payments/payment-api/#tag/Webhooks-API/paths/~1dataservices~1v1~1webhooks~1subscriptions/post) or [updating](/apis-for-payments/payment-api/#tag/Webhooks-API/paths/~1dataservices~1v1~1webhooks~1subscriptions~1{SubscriptionId}/put) a subscription) as the HMAC key.
                    schema:
                        type: string

                -
                    name: Viva-Delivery-Id
                    in: header
                    format: uuid
                    description: A webhook unique value to identify the delivery. On sale transactions file requests, this is equal to the request identifier.
                    schema:
                        type: string

                -
                    name: Viva-Event
                    in: header
                    description: Name of the event that triggered the delivery (i.e. SaleTransactionsFileGenerated).
                    schema:
                        type: string

            summary: WebHook SaleTransactions
            description: >-
                Once a file generation request is received and the file is ready, a webhook is sent sent via POST request to the provided URL of the subscription.

