            Upon successful creation of the order, a unique code is created and returned via this object. In
            case of an error, details are available for troubleshooting.
        type: object
        properties:
            orderCode:
                format: int64
                description: The order's unique code.
                type: integer
#-------------------------------------------------------------------------------------------------------------------------------------------------------------
    Create_payment_order_old:
        description: >-
            Upon successful creation of the order, a unique code is created and returned via this object. In
            case of an error, details are available for troubleshooting.
        type: object
        properties:
            OrderCode:
                format: int64
                description: The order's unique code.
                type: integer
            ErrorCode:
                format: int32
                description: |-
                    If the call is unsuccessful, an error code is generated.
                    For successful calls, `0` is returned.
                type: integer
            ErrorText:
                description: 'If the ErrorCode is other than `0`, a descriptive error message is returned.'
                type: string
            TimeStamp:
                format: date-time
                description: The server date and time (in ISO 8601 format) that the Order was created.
                type: string
            CorrelationId:
                description: Unique identifier logged by Viva for auditing purposes.
                type: string
            EventId:
                format: int32
                description: |-
                    If the call is unsuccessful, an event ID is generated.
                    For successful calls, `0` is returned.
                type: integer
            Success:
                description: Indicates whether or not the payment order creation was successful.
                type: boolean
#-------------------------------------------------------------------------------------------------------------------------------------------------------------
    create_payment_order_v1:
        description: All the properties of the order that will be created are passed to this object.
        required:
            - amount
        type: object
        properties:
            amount:
                format: int64
                description: >-
                    The amount associated with this payment order. The amount will be in the currency of your merchant account using the currency's smallest unit of measurement (e.g. cents of a euro). It must always be greater than 30 (which is the minimum amount you can charge with Viva).


                    >For example, if you want to create a payment for €100.37, you need to pass the value
                    `10037`.
                minimum: 30
                type: integer
            email:
                description: >-
                    The customer's e-mail address, used on the payment form.


                    >Although optional, it is highly recommended to provide the email of the customer, as the customer will be asked to provide it if not specified by you during the generation of the payment order; asking the customer to provide their email, which they may have provided earlier, may cause them to abandon the checkout; this affects significantly the conversion rate of your online store.


                    >This is a required parameter if combined with the `serviceId` parameter below set to a
                    value of `4` (i.e. when creating a payment notification).
                type: string
                maximum: 50
                minimum: 1

            fullName:
                description: >-
                    The customer's full name, used on the payment form.


                    >Although optional, it is highly recommended to provide the full name of the customer, as
                    the customer will be asked to provide it if not specified by you during the generation of the
                    payment order; asking the customer to provide their full name, which they may have provided
                    earlier, may cause them to abandon the checkout; this affects significantly the conversion
                    rate of your online store.
                type: string
                maximum: 100
                minimum: 1
            customerTrns:
                description: >-
                    This optional parameter adds a friendly description to the payment order that you want to
                    display to the customer on the payment form. It should be a short description of the items/services being purchased.


                    >Although optional, it is highly recommended to provide a description for the customer, so
                    that the customer knows what he is being asked to pay for; this affects significantly the
                    conversion rate of your online store.
                #maxLength: 255
                type: string
                maximum: 2048
                minimum: 1
            phone:
                description: >-
                    The customer's telephone number for inclusion in the sales transaction details in the
                    [viva banking app](https://members.vivawallet.com/en/signin). After logging in, go to **Sales >
                    Sales Transactions** and find the transaction. Click on the **Info** button against the
                    item to display the *Transaction Details* dialog box. Click on the **Customer** tab. The
                    contents of the `phone` field will be displayed on the line below the customer's name.
                type: string
                maximum: 30
                minimum: 1
            requestLang:
                description: >-
                    >
                    For all possible values, please see the 'Allowed Values' list below

                     The language in which the payment form is displayed. Consists of two-letter [ISO 639-1
                    language code](https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes) combined with
                    two-letter [ISO 3166-1 alpha-2 country
                    code](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2).

                    Allowed Values:<br><br>
                    Bulgarian > `bg-BG`<br>Croatian > `hr-HR`<br>Czech (Czechia) > `cs-CZ`<br>Danish > `da-DK`<br/>Dutch (Netherlands) > `nl-NL`<br>Dutch (Belgium)> `nl-BE`<br>English (United Kingdom) > `en-GB`<br>English (United States) > `en-US`<br>Finnish > `fi-FI`<br>French (Belgium)> `fr-BE`<br/>French (France) > `fr-FR`<br/>German > `de-DE`<br>Greek > `el-GR`<br>Hungarian > `hu-HU`<br>Italian > `it-IT`<br/>Polish > `pl-PL`<br>Portuguese > `pt-PT`<br>Romanian > `ro-RO`<br>Russian > `ru-RU`<br>Spanish > `es-ES`<br>Swedish > `sv-SE`
                type: string
                default: en-GB
            sourceCode:
                description: >-
                    This is the code of the [payment
                    source](/getting-started/create-a-payment-source/) you
                    created to link with your online store. If you have defined multiple [payment
                    sources](/getting-started/view-the-payment-source-list/)
                    in your account, you need to define the `sourceCode` parameter when creating the payment
                    order, so that the system selects the appropriate payment source.


                    >sourceCode is case-sensitive. If left blank, `Default` is used.
                type: string
            disableExactAmount:
                description: >-
                    If this parameter is set to true, then any amount specified in the payment order is ignored (although still mandatory), and the customer is asked to indicate the amount they will pay. Note that if set to true, there will not be the option to pay with certain [payment methods](/payment-methods). <br><br><strong>Please note:</strong> If `disableExactAmount` is set to true, the request must not include `cardTokens`.
                default: false
                type: boolean
            disableCash:
                description: >-
                    If this parameter is set to `true`, the customer will not have the option to pay in cash
                    at a Viva Spot, and the checkout page will not display the Cash and E-Banking/Phone
                    banking options.


                    >Available only to merchants set up in Greece.
                default: false
                type: boolean
            disableWallet:
                description: >-
                    If this parameter is set to `true`, the customer will not have the option to pay using their Viva personal account (wallet), and the checkout page will not display the Viva Wallet option.


                    >Available only to merchants set up in Greece, Malta and Cyprus.
                default: false
                type: boolean
            allowRecurring:
                description: >-
                    If this parameter is set to `true`, recurring payments are enabled so that the initial
                    transaction ID can be used for subsequent payments. For details of
                    how to create a recurring payment, view our [Create a recurring
                    payment](/tutorials/create-a-recurring-payment) tutorial. For an example of recurring payments
                    in action, see our [PHP code
                    sample](/tutorials/full-length-php-code-samples/create-recurring-payment). The payment method needs to have [support for recurring payments](/payment-methods/#recurring-payments). Keep in mind it is your responsibility to have the customer's consent to perform recurring payments (using this parameter constitutes your confirmation that you have such consent)!


                    >Recurring payments are not available with [pre-authorizations](/tutorials-for-payments/handle-pre-authorizations) or [instalments](/smart-checkout/functional-overview/#pay-by-instalments-option).
                default: false
                type: boolean
            isPreAuth:
                description: >-
                    If set to `true`, a pre-auth transaction will be performed. This will hold the selected
                    amount as unavailable (without the customer being charged) for a period of time. No email receipt is sent out from us in this case as it is not a charge. To cancel
                    a pre-auth, use the [Cancel
                    transaction](/apis-for-payments/payment-api/#tag/Transactions-(Deprecated)/paths/~1api~1transactions~1{id}/delete)
                    API call in the same way that you would to reverse a payment. To capture a pre-auth, use the [Create transaction](/apis-for-payments/payment-api/#tag/Transactions/paths/~1api~1transactions~1{transaction_id}/post) API call in the same way that you would to create a payment. For further details, see our [Handle pre-authorizations](/tutorials-for-payments/handle-pre-authorizations/) tutorial. The payment method needs to have [support for pre-auth transactions](/payment-methods/#pre-authorizations).


                    >Pre-authorizations are not available with [recurring payments](/tutorials-for-payments/create-a-recurring-payment) or [instalments](/smart-checkout/functional-overview/#pay-by-instalments-option). Additionally, When creating a payment order for a pre-authorization (with `isPreAuth` = `true`), tipAmount should only be set when capturing the pre-authorization, and not when creating the initial payment order
                default: false
                type: boolean
            saleToAcquirerData:
                type: string
                example: ewogICAgImFwcGxpY2F0aW9uSW5mbyI6IHsKICAgICAgICAiZXh0ZXJuYWxQbGF0Zm9ybSI6IHsKICAgICAgICAgICAgIm5hbWUiOiAidml2YS5jb218VGVybWluYWwiLAogICAgICAgICAgICAidmVyc2lvbiI6ICJjb20udml2YXdhbGxldC5zcG9jLnBheWFwcCB2NS4xOS43ICgxMDgxNSkiLAogICAgICAgICAgICAiaW50ZWdyYXRvciI6ICJWaXZhIgogICAgICAgIH0KICAgIH0KfQ==
                description: |
                  <strong>JSON converted to base64 string containing additional metadata information.</strong><br>
                  > **Please note that this parameter applies to Hospitality, Car Rentals & Dropshipping industries.**  

                  Please <strong><a href="/helpers/saleToAcquirerData.html" target="_blank">visit this link</a></strong> to view a sample of the JSON and generate the encoded data.                                
            maxInstallments:
                format: int32
                description: >-
                    The maximum number of installments that the customer can choose for this transaction. If this parameter is omitted, the customer will not see an option for paying with installments. The payment method needs to have [support for installments](/payment-methods/#installments).
                    Installments are available only to merchants set up in Greece and are **not** available with [recurring payments](/tutorials-for-payments/create-a-recurring-payment) or [pre-authorizations](/tutorials-for-payments/handle-pre-authorizations).

                    >**Please note:** If offering installments, the value provided by the merchant is *not* the number of installments the customer will select, and it is *not* mandatory for the customer to select installments at all. The process is as follows:<br><br>
                    1. The merchant indicates the **maximum** number of installments they wish to offer to the customer<br>
                    2. It is then **up to the customer** whether they pay with or without installments<br>
                    3. If the customer decides to pay with installments, they are able to select the **number** of installments (*up to the maximum specified by the merchant*)<br>
                maximum: 36
                minimum: 1
                type: integer
            tipAmount:
                format: int64
                description: >-
                        The tip value, if applicable for the customer's purchase, which is already included in the `amount` of the payment order. Should be in the currency of your merchant account using the currency's smallest unit of measurement (e.g. cents of a euro).

                        >When creating a payment order for a pre-authorization (with `isPreAuth` = `true`), tipAmount should only be set when capturing the pre-authorization, and not when creating the initial payment order
                type: integer
                default: 0
            paymentTimeout:
                format: int32
                description: >-
                    By default, the time given to the customer to complete an online payment is 1800 seconds
                    (30 minutes). If the customer does not complete the payment within this time frame, the
                    Payment Order is automatically cancelled. By using this parameter, you can define a
                    different life span for your Payment Order. Note that if the *ExpirationDate* parameter is
                    given a value, then the *ExpirationDate* overrides the *paymentTimeout* option.


                    >Value is in seconds and can be either smaller or greater than 1800 secs. Use value 65535
                    if you want your Payment Order to never expire.
                default: 1800
                type: integer
            expirationDate:
                format: date-time
                description: >-
                    Same as *paymentTimeout* but expressed in absolute datetime in ISO 8601 format. Note that
                    if the *ExpirationDate* parameter is given a value, then the *ExpirationDate* overrides
                    the *paymentTimeout* option. Example: `2021-12-01T08:00:00+00:00`. This denotes the year
                    (2021), month (December), date (1st), time (8.00am and zero seconds) and time zone
                    (+00:00, which is Greenwich Mean Time).
                type: string
            serviceId:
                format: int32
                description: >-
                    If you wish to create a payment order, and then send out an email to the customer to request payment, rather than immediately redirect the customer to the payment page to pay now, use the value `4` (*EmailCheckoutOut*), and the system will automatically send your customer an email notification. This is equivalent to sending a [payment
                    notification](/payment-tools/payment-notifications/) from the viva banking app. The default value is `0` (*WebCheckOut*) and does not send an email notification to request payment.
                default: 0
                type: integer
            merchantTrns:
                description: >-
                    This can be either an ID or a short description that helps you uniquely identify the
                    transaction in the [viva banking app](https://members.vivawallet.com/en/signin). For example,
                    this can be your customer order reference number. After logging in, go to **Sales > Sales
                    Transactions** and find the transaction. Click on the **Info** button against the item to
                    display the *Transaction Details* dialog box. The contents of the `merchantTrns` field
                    will be displayed on the line below the timestamp information.
                #maxLength: 50
                maximum: 2048
                minimum: 1
                type: string
            isCardVerification:
                description: >-
                      This parameter should be set to `true` to trigger a verification using [Card Verification functionality](/tutorials/payments/card-verification/) (and the `amount` parameter should be set to '0').<br><br>

                      ><strong>Please note:</strong><br><ul><li>This is currently only available for card payments via Visa, Mastercard, Maestro, Diners Club & Discover (digital wallets are *not* supported)</li>
                      <li>Recurring payments *are* supported</li>
                      <li>The following parameters are also *not* compatible with Card Verification: `preauth`, `maxInstallments`/`forceMaxInstallments`, `disableExactAmount`, `tipAmount`, `cardTokens`</li>
                default: false
                type: boolean
            tags:
                description: >-
                    You can add several tags to a transaction that will help in grouping and filtering in the
                    [viva banking app](https://members.vivawallet.com/en/signin). After logging in, go to **Sales >
                    Sales Transactions** and expand the **Advanced search** feature. In the **Tags** field,
                    enter the tag(s) you want to search with, then click on the **Search** button.
                type: array
                items:
                    type: string
        example:
            amount: 200
            email: customer@example.com
            fullName: Customer full name
            customerTrns: Short description of items/services purchased to display to your customer
            phone: '7967813180'
            requestLang: en-GB
            sourceCode: '3891'
            disableExactAmount: 'false'
            disableCash: 'false'
            disableWallet: 'false'
            allowRecurring: 'false'
            isPreAuth: 'false'
            maxInstallments: 1
            saleToAcquirerData: ewogICAgImFwcGxpY2F0aW9uSW5mbyI6IHsKICAgICAgICAiZXh0ZXJuYWxQbGF0Zm9ybSI6IHsKICAgICAgICAgICAgIm5hbWUiOiAidml2YS5jb218VGVybWluYWwiLAogICAgICAgICAgICAidmVyc2lvbiI6ICJjb20udml2YXdhbGxldC5zcG9jLnBheWFwcCB2NS4xOS43ICgxMDgxNSkiLAogICAgICAgICAgICAiaW50ZWdyYXRvciI6ICJWaXZhIgogICAgICAgIH0KICAgIH0KfQ==
            tipAmount: 0.00
            paymentTimeout: 1800
            expirationDate: '2021-12-01T08:00:00+00:00'
            serviceId: 0
            merchantTrns: Short description of items/services purchased by customer
            isCardVerification: false
            tags:
                - sample string 1
                - sample string 2
                - sample string 3
