                  });

              - lang: Java
                source: |
                  OkHttpClient client = new OkHttpClient().newBuilder()
                  .build();
                  MediaType mediaType = MediaType.parse("application/json");
                  RequestBody body = RequestBody.create(mediaType, "{\n\"transactionId\": \"string\",\n\"groupId\": \"string\",\n\"cardTokenType\": 0\n}");
