definitions:

#---------------------DATASERVICES API DEFINITIONS START------------------------------------------------------------------------------------------------------
 


    data_services_retrieve_transactions_response:
        description: >-
            This contains the object with the details of the transaction.
        type: object
        properties:
            currentPage:
                description: Indicator of the current page in the results.
                type: integer
                example: 1
            pageSize:
                description: Number of results displayed per page.
                type: integer
                example: 10
            totalPages:
                description: This parameter is deprecated and will be removed soon. Please disregard it.
                type: integer
                example: 0
            totalDataCount:
                description: This parameter is deprecated and will be removed soon. Please disregard it.
                type: integer
                example: -1
            data:
                description: Array of transactions returned in the results.
                type: array
                items:
                  type: object
                  properties:
                      TransactionId:
                          description: The transaction’s unique ID.
                          type: string
                          example: e4c37c00-76ad-4730-93c2-004091ae9de1
                      TransactionTypeId:
                          description: The unique ID of the transaction type.
                          type: number
                          example: 5
                      MerchantId:
                          description: The merchant's unique ID.
                          type: string
                          example: 21859cf1-d7af-47b7-bfad-86b4b3bcc867
                      OrderCode:
                          description: The order’s unique code.
                          type: number
                          format: int64
                          example: 4173124907236419
                      Email:
                          description: The customer’s email address.
                          type: string
                          example: null
                      Phone:
                          description: The customer’s phone number.
                          type: string
                          example: null
                      ResellerId:
                          description: The reseller's unique ID (if one exists).
                          type: string
                          example: null
                      ResellerSourceCode:
                          description: The reseller's source (if it exists).
                          type: string
                          example: null
                      MerchantTrns:
                          description: An ID or a short description that helps you uniquely identify the transaction.
                          type: string
                          example: null
                      CustomerTrns:
                          description: A friendly description that is displayed to the customer. This description appears on
                                      the receipt the customer receives.
                          type: string
                          example: null
                      ReferenceNumber:
                          description: The reference number of the transaction.
                          type: number
                          example: 635297
                      InsDate:
                          description: The date and time that the transaction took place.
                          type: string
                          format: date-time
                          example: '2024-06-21T12:37:35.577+03:00'
                      SourceCode:
                          description: The source that was declared for the specific transaction.
                          type: string
                          example: Default
                      FullName:
                          description: The customer’s full name.
                          type: string
                          example: null
                      CardNumber:
                          description: The number of the card that was used.
                          type: string
                          example: 454793XXXXXX3518
                      AcquirerApproved:
                          description: Applies to offline POS using SAF (Store And Forward) and approved locally. When back online, POS sends list of transactions to Viva with this parameter being used to record approved status.
                          type: boolean
                          example: false
                      CardTypeId:
                          description: The ID of the type of the card.
                          type: number
                          example: 0
                      CardCountryCode:
                          description: The card's origin country in [ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-2).
                          type: string
                          example: GR
                      CardIssuingBank:
                          description: A descriptive name of the bank that issued the card.
                          type: string
                          example: REVOLUT LIMITED
                      EventId:
                          description: The event ID associated with the transaction.
                          type: string
                          example: null
                      CurrencyCode:
                          description: The 3-digit currency code of the transaction as defined in [ISO 4712](https://en.wikipedia.org/wiki/ISO_4217)
                          type: integer
                          example: 978
                      Amount:
                          description: The net amount of the transaction.
                          type: number
                          example: 0.27
                      OriginalAmount:
                          description: The final amount in the selected currency, reflecting the total charge from the customer.
                          type: number
                      ConversionRate:
                          description: The conversion rate applied to the OriginalAmount to calculate the actual amount in the merchant's currency.
                          type: number
                      OriginalCurrencyCode:
                          description: The selected currency code for the payment, as defined in [ISO 4712](https://en.wikipedia.org/wiki/ISO_4217).
                          type: string
                      CurrentInstallment:
                          description: The instalment number (position) within total number of instalments of the payment.
                          type: number
                          example: 0
                      TotalInstallments:
                          description: The number of installments that were offered for the overall payment (if applicable).
                          type: number
                          format: byte
                          example: 0
                      ChannelId:
                          description: A unique ID identifying Viva point of entry of payment. For example, Web Redirect, Web POS, Public API, Native Checkout v2.
                          type: string
                          example: 09913a34-c7d2-4e99-a3a7-550f2063d3b1
                      StatusId:
                          description: >-
                            The transaction’s current status:
                              - F – the transaction has been completed successfully (PAYMENT SUCCESSFUL).
                              - E – the transaction was not completed because of an error (PAYMENT UNSUCCESSFUL).
                              - A – the transaction is in progress (PAYMENT PENDING).
                              - R – the transaction has been fully or partially refunded.
                              - X – the transaction was cancelled by the merchant.
                              - M – the customer has disputed the transaction with the issuing bank.
                              - MA – dispute awaiting response.
                              - MI – dispute in progress.
                              - ML – a disputed transaction has been refunded (dispute lost).
                              - MW – dispute won.
                              - MS – suspected dispute.
                          type: string
                          example: F
                      OrderTags:
                          description: List of tags used for internal tracking and report purposes.
                          type: array
                          items:
                              type: string
                          example: []
                      ClearanceDate:
                          description: The date that the transaction was cleared.
                          type: string
                          format: date-time
                          example: null
                      InterchangeFee:
                          description: The interchange fee for the transaction.
                          type: number
                          format: float
                          example: 0.00
                      SchemeFee:
                          description: The scheme fee for the transaction.
                          type: number
                          format: float
                          example: 0.00
                      TotalCommission:
                          description: The total fee for the specific transaction (Interchange++ fee).
                          type: number
                          format: float
                          example: 0.02
                      SourceTerminalId:
                          description: ID of POS card terminal where payment was made (if applicable).
                          type: integer
                          example: 16236419
                      PanEntryMode:
                          description: Indicates the method used for PAN entry to initiate a transaction. You may find all the POS Entry Modes [here](https://developer.vivawallet.com/integration-reference/response-codes/#pos-entry-mode-enumeration)
                          type: string
                          example: 01
                      ParentId:
                          description: >-
                              In case the transaction is considered to be consequent of another (e.g. in case of an
                              installment or a refund), this is the unique ID of the originating transaction.
                          type: string
                          example: null
                      TipAmount:
                          description: The tip amount of the transaction (if applicable).
                          type: number
                          format: float
                          example: 0.00
                      BankId:
                          description: Short name of issuing bank.
                          type: string
                          example: NET_VISA
                      AuthorizationId:
                          description: Unique authorization number for the transaction provided by issuer.
                          type: number
                          example: null
                      RetrievalReferenceNumber:
                          description: Unique number for the transaction provided by acquirer.
                          type: string
                          example: 417309634081
                      OrderServiceId:
                          description: The unique ID of the order service.
                          type: number
                          example: 0
                      ApplicationIdentifierTerminal:
                          description: The application identifier of the card.
                          type: string
                          example: A0000000031010
                      MerchantIsvFeeAmount:
                          description: The ISV fee amount for the merchant.
                          type: number
                          format: float
                          example: 0.009728
            link:
                description: Array of pagination links.
                type: array
                items:
                  type: object
                  properties:
                      self:
                          description: URL for the current page in the paginated results.
                          type: string
                          example: "/api/Transaction/Search?PageSize=1&Page=4&OrderBy=Descending"
                      next:
                          description: URL for the next page of results.
                          type: string
