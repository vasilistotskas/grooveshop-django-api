            description: |-
                [![Run in Postman](https://run.pstmn.io/button.svg)](https://app.getpostman.com/run-collection/19692059-9f1ae7d5-bb58-4a2d-b2b8-5685e0f10548?action=collection%2Ffork&source=rip_markdown&collection-url=entityId%3D19692059-9f1ae7d5-bb58-4a2d-b2b8-5685e0f10548%26entityType%3Dcollection%26workspaceId%3D71008394-7296-44d9-ad1c-ae1f239b5574)

                This call allows merchants to perform 'rebates', tied to an initial `transactionId`. This is most commonly related to cardholder rewards or loyalty.<br><br>
                A Rebate can be cancelled using the [Cancel Rebate / Fast Refund](/apis-for-payments/payment-api/#tag/Transactions/paths/~1acquiring~1v1~1transactions~1{transaction_Id}/delete) API call.<br>

                <strong>Please Note:</strong><br>
                * Rebates are *not* available for betting merchants<br>
                * Only Visa and Mastercard support this functionality. Therefore, only a `transactionId` made with Visa or Mastercard (including Maestro) can be used <em>(where supported by the customer’s bank)</em><br>
                * The Rebate API call can *only* be used for Card-not-Present (e-commerce) payments made via cards and Digital Wallets (such as Apple Pay, Google Pay, etc.) - it *cannot* be used for Card-Present (POS) payments or other Alternative Payment Methods<br>
                * For Rebates, the [Transaction Reversal Created](/webhooks-for-payments/transaction-reversal-created/) webhook is triggered with `ServiceId = 18`<br>
                * Rebate functionality is *not* enabled by default, and is subject to approval. Please contact your sales representative or reach out via our Live Chat feature to enquire<br>

