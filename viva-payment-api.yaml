    mp_sendfunds_request:
        description: >-
            Send funds to a connected account
        type: object
        required:
            - amount
            - connectedAccountId
        properties:
            amount:
                description: >
                    Amount to be sent.<br> Must be a positive, non-zero number. <br>The amount will be in the currency of the merchant account using the currency's smallest unit of measurement (e.g. cents of a euro).
                example: null
                type: integer
            connectedAccountId:
                description: >
                    ID of the connected account
                example: ac03972a-5ca5-43c5-b96f-c519ac843b7a
                type: string
            description:
                description: >
                    A decription that can be set, as identification key, by the platform marketplace during sending funds to a connected account id.
                example: This is a description for sending funds to a connected account
                type: string
                maximum: 1024
                default: Amount Settlement from Platform
            transactionId:
                description: >
                    Denotes the transaction (i.e. customer payment) associated with this transfer.<br><br>If left empty <em>or</em> if the transaction is already settled, an instant balance transfer will be made and the `executed` parameter in the response will have a value (the account must have enough balance to complete the transfer).<br><br>
                    If the transaction is <em>not</em> yet settled, the transfer will be handled during settlement and the `executed` parameter in the response will <em>not</em> have a value.
                example: null
                type: string
                default: null

    mp_sendfunds_response:
        description: >-
            Send funds to a connected account
        type: object
        properties:
            transferId:
                description: >
                    The ID of the transfer
                example: fa176a3b-a7e8-4f3d-abe6-5e65626f5994
                type: string
            executed:
                description: >
                    The date that the transfer was executed. If the transaction is not settled this value is empty, otherwise the transfer is executed instantly with funds from the account's available balance
                example: 2019-08-24T14:15:22Z
                type: string

    mp_createtransfer_request:
        description: >-
            Create a transfer reversal
        type: object
        properties:
            amount:
                description: >
                    Amount to be reversed. Set as `null` to reverse the full amount.<br> Must be a positive, non-zero number. <br>The amount will be in the currency of the merchant account using the currency's smallest unit of measurement (e.g. cents of a euro).
                example: null
                type: integer
                default: null

    mp_createtransfer_response:
        description: >-
            Create a transfer reversal
        type: object
        properties:
