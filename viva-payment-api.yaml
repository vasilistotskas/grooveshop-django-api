            description: >-
                [![Run in Postman](https://run.pstmn.io/button.svg)](https://app.getpostman.com/run-collection/19692059-908f4675-92ef-406e-9db1-20b99be9d8d3?action=collection%2Ffork&collection-url=entityId%3D19692059-908f4675-92ef-406e-9db1-20b99be9d8d3%26entityType%3Dcollection%26workspaceId%3D71008394-7296-44d9-ad1c-ae1f239b5574)


                Create a payment order to accept a payment from an end customer.<br>

                ><strong>Important note:</strong> if you are using the `transfer` parameter, this call will <em>fail</em> in the following circumstances:<br><ul>
                <li>The connected account is not verified (you can use the <a href="/apis-for-payments/payment-api/#tag/Marketplace-Sellers/paths/~1platforms~1v1~1accounts~1{accountId}/get">Retrieve information about a connected account</a> API call to check that the `verified` flag of the seller is `true`)<br>
                <li>The order is a Preauth (`preauth` = `true`)<br>
                <li>The order utilises Installments (`maxInstallments` =/= `0`)<br>
                <li>The order is Recurring (`allowRecurring` = `true`)<br>
                <li>The order has an open amount (enacted via the `disableExactAmount` parameter)<br>
                <li>The order has a disabled paid state (enacted via the `disablePaidState` parameter of the <a href="/apis-for-payments/payment-api/#tag/Payments/paths/~1api~1orders~1{orderCode}/patch">Update an order</a> API call)<br>
                <li>The order is a card verification (`isCardVerification` = `true`)<br></ul>


