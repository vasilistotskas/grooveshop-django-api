            summary: Create a transfer reversal

            description: >-
                [![Run in Postman](https://run.pstmn.io/button.svg)](https://app.getpostman.com/run-collection/19692059-53fa734f-8b95-43e1-ae7c-467fd7b0a352?action=collection%2Ffork&collection-url=entityId%3D19692059-53fa734f-8b95-43e1-ae7c-467fd7b0a352%26entityType%3Dcollection%26workspaceId%3D71008394-7296-44d9-ad1c-ae1f239b5574)


                Reverse a transfer made to a connected account.<br>

                ><strong>Note:</strong> if the referenced transfer *has not* yet been executed, the reversal will wait for this to be executed first. Otherwise, the reversal will be instant


                ><strong>Note:</strong> if the referenced transfer has already been executed, and the seller has insufficient funds to complete the reversal, the reversal will fail instantly with Status Code 452


