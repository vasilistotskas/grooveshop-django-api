    /dataservices/v1/webhooks/subscriptions:
        post:
            security:
                - OAuth2:
                  - "urn:viva:payments:biservices:datafileapi"
            servers:
                - url: https://api.vivapayments.com
                  description: Live environment
            consumes:
                - application/json
            produces:
                - application/json
            tags:
                - Webhooks API
            summary: Add subscription
            description: >-
                [![Run in Postman](https://run.pstmn.io/button.svg)](https://app.getpostman.com/run-collection/18763635-f0b4093d-dddb-4fdf-9a33-d7f328ee66d2?action=collection%2Ffork&collection-url=entityId%3D18763635-f0b4093d-dddb-4fdf-9a33-d7f328ee66d2%26entityType%3Dcollection%26workspaceId%3D71008394-7296-44d9-ad1c-ae1f239b5574)
                <br><br>The Webhooks API provides all the necessary tools to register on the webhooks service using event filters.
                <br><br>Register to webhooks by adding a new subscription. Limitations apply (one subscription per URL and event, limited total subscriptions).<br><br>

                ><strong>Please note:</strong><br><li>Webhook Subscriptions can currently <strong>only</strong> be made for the <strong>'SaleTransactionsFileGenerated'</strong> event - see [the Sale transactions File Request API](/apis-for-payments/payment-api/#tag/File-Request-API/paths/~1dataservices~1v1~1transactions~1exports/post)<br><br><li>The Data Services API <strong>requires specific access credentials</strong>. To request access, please speak to your sales representative
            parameters:
                -
                    name: Content-Type
                    in: header
                    #description: "The language you prefer for messages. Supported values are en-AU, en-CA, en-GB, en-US"
                    #example: en-US
                    required: true
                    schema:
                        type: string
                        default: application/json
                -
                    name: Authorization
                    in: header
                    description: The required identity Bearer token needed to access the resource.
                    required: true
                    schema:
                        type: string
                -
                    name: body
                    schema:
                        $ref: '#/definitions/webhooks_add_subscription_request'
                    in: body
                    required: true

            x-code-samples:
              - lang: cURL
                source: |
                  curl --location 'https://api.vivapayments.com/dataservices/v1/webhooks/subscriptions' \
                  --header 'Authorization: Bearer {Bearer_Token}' \
                  --header 'Content-Type: application/json' \
                  --data '{
                      "url": "https://www.merchantwebsite.com/webhooks/receive",
                      "secret": "TestSecretKeyForHMAC",
                      "events": [
                          "SaleTransactionsFileGenerated"
                      ]
                  }'
              - lang: PHP
                source: |
                  <?php

                  $curl = curl_init();

                  curl_setopt_array($curl, array(
                    CURLOPT_URL => 'https://api.vivapayments.com/dataservices/v1/webhooks/subscriptions',
                    CURLOPT_RETURNTRANSFER => true,
                    CURLOPT_ENCODING => '',
                    CURLOPT_MAXREDIRS => 10,
                    CURLOPT_TIMEOUT => 0,
                    CURLOPT_FOLLOWLOCATION => true,
                    CURLOPT_HTTP_VERSION => CURL_HTTP_VERSION_1_1,
                    CURLOPT_CUSTOMREQUEST => 'POST',
                    CURLOPT_POSTFIELDS =>'{
                      "url": "https://www.merchantwebsite.com/webhooks/receive",
                      "secret": "TestSecretKeyForHMAC",
                      "events": [
                          "SaleTransactionsFileGenerated"
                      ]
                  }',
                    CURLOPT_HTTPHEADER => array(
                      'Authorization: Bearer {Bearer_Token}',
                      'Content-Type: application/json'
                    ),
                  ));

                  $response = curl_exec($curl);

                  curl_close($curl);
                  echo $response;

              - lang: NodeJs
                source: |
                  var request = require('request');
                  var options = {
                    'method': 'POST',
                    'url': 'https://api.vivapayments.com/dataservices/v1/webhooks/subscriptions',
                    'headers': {
                      'Authorization': 'Bearer {Bearer_Token}',
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      "url": "https://www.merchantwebsite.com/webhooks/receive",
                      "secret": "TestSecretKeyForHMAC",
                      "events": [
                        "SaleTransactionsFileGenerated"
                      ]
                    })

                  };
                  request(options, function (error, response) {
                    if (error) throw new Error(error);
                    console.log(response.body);
                  });

              - lang: Java
                source: |
                  OkHttpClient client = new OkHttpClient().newBuilder()
                    .build();
                  MediaType mediaType = MediaType.parse("application/json");
                  RequestBody body = RequestBody.create(mediaType, "{\n    \"url\": \"https://www.merchantwebsite.com/webhooks/receive\",\n    \"secret\": \"TestSecretKeyForHMAC\",\n    \"events\": [\n        \"SaleTransactionsFileGenerated\"\n    ]\n}");
                  Request request = new Request.Builder()
                    .url("https://api.vivapayments.com/dataservices/v1/webhooks/subscriptions")
                    .method("POST", body)
                    .addHeader("Authorization", "Bearer {Bearer_Token}")
                    .addHeader("Content-Type", "application/json")
                    .build();
                  Response response = client.newCall(request).execute();

            responses:
                '200':
