    /web2/checkout/v2/paymentsessions:
        post:
            servers:
                - url: https://demo.vivapayments.com
                  description: Sandbox environment
                - url: https://www.vivapayments.com
                  description: Live environment
            consumes:
                - application/json
            produces:
                - application/json
            tags:
                - RF Code Payments
            summary: Generare RF Codes
            description: >-
                [![Run in Postman](https://run.pstmn.io/button.svg)](https://www.postman.com/viva-com/workspace/developer-portal/request/17199201-231d3d57-d919-4336-90a6-3c9f37459bd5?action=share&creator=17199201&ctx=documentation)
                <br><br>This API allows you to generate RF Codes in order to get paid.<br>

                ><strong>Please note:</strong> The RF Code generation API Call does not require any authentication. <br><br><strong>The RF codes are applicable only in Greece for Greek merchants.
            parameters:
                -
                    name: body
                    schema:
                        $ref: '#/definitions/rf_code'
                    in: body
                    required: true

            x-code-samples:
              - lang: cURL
                source: |
                  curl --location 'https://demo.vivapayments.com/web2/checkout/v2/paymentsessions' \
                  --header 'Content-Type: application/json'
                  --data '{
                      "orderCode": 3097103021072605
                  }'
              - lang: PHP
                source: |
                  <?php

                  $curl = curl_init();

                  curl_setopt_array($curl, array(
                    CURLOPT_URL => 'https://demo.vivapayments.com/web2/checkout/v2/paymentsessions',
                    CURLOPT_RETURNTRANSFER => true,
                    CURLOPT_ENCODING => '',
                    CURLOPT_MAXREDIRS => 10,
                    CURLOPT_TIMEOUT => 0,
                    CURLOPT_FOLLOWLOCATION => true,
                    CURLOPT_HTTP_VERSION => CURL_HTTP_VERSION_1_1,
                    CURLOPT_CUSTOMREQUEST => 'POST',
                    CURLOPT_POSTFIELDS =>'{
                      "orderCode": 3097103021072605
                  }',
                    CURLOPT_HTTPHEADER => array(
                      'Content-Type: application/json'
                    ),
                  ));

                  $response = curl_exec($curl);

                  curl_close($curl);
                  echo $response;


              - lang: NodeJs
                source: |
                  var request = require('request');
                  var options = {
                    'method': 'POST',
                    'url': 'https://www.vivapayments.com/web2/checkout/v2/paymentsessions',
                    'headers': {
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      "orderCode": 3097103021072605
                    })

                  };
                  request(options, function (error, response) {
                    if (error) throw new Error(error);
                    console.log(response.body);
                  });


              - lang: Java
                source: |
                  OkHttpClient client = new OkHttpClient().newBuilder()
                  OkHttpClient client = new OkHttpClient().newBuilder()
                    .build();
                  MediaType mediaType = MediaType.parse("application/json");
                  RequestBody body = RequestBody.create(mediaType, "{\r\n    \"orderCode\": 3097103021072605\r\n}");
                  Request request = new Request.Builder()
                    .url("https://www.vivapayments.com/web2/checkout/v2/paymentsessions")
                    .method("POST", body)
                    .addHeader("Content-Type", "application/json")
                    .build();
                  Response response = client.newCall(request).execute();

            responses:
                '200':
                    description: Success
                    examples:
                        application/json:
                          "200 No Content"
                '400':
                    description: Bad Request
                    schema:
                        $ref: '#/definitions/rfcode_error_response_400'
                    examples:
                        application/json:
                            status: 400
                            message: "Null options"
                            eventId: "0"
                '404':
                    description: Not found
                    schema:
                        $ref: '#/definitions/rfcode_error_response_404'
                    examples:
                        application/json:
                            status: 404
                            message: "OrdersOrderCodeNotFound: Order with code XXXXXX was not found"
                            eventId: "5501"
                '5xx':
                    description:  Error (incorrect/missing ReportDate or incorrect authorisation token)
                    examples:
                        application/json:
                            "500 Internal Server Error"


