    /acquiring/v1/cards/tokens:
        post:
            security:
                - OAuth2:
                  - "urn:viva:payments:core:api:acquiring, urn:viva:payments:core:api:acquiring:cardtokenization"

            summary: Create card token
            description: >-

                [![Run in Postman](https://run.pstmn.io/button.svg)](https://app.getpostman.com/run-collection/18763635-920bd737-6e18-486b-9c56-e5beeefbd211?action=collection%2Ffork&collection-url=entityId%3D18763635-920bd737-6e18-486b-9c56-e5beeefbd211%26entityType%3Dcollection%26workspaceId%3D71008394-7296-44d9-ad1c-ae1f239b5574) <br><br>Obtain the card token associated with the card used for the specific transaction. The API call <strong>returns an error</strong> if a) the customer paid with a payment method <strong>other than a card</strong>, or b) the customer paid with <strong>a digital wallet</strong> (Apple Pay, Google Pay, Samsung Pay).
                <br><br>
                Keep in mind it is your responsibility to have the customer's consent to store the card token on your backend (using this API constitutes your confirmation that you have such consent)!
                <br><br>
                Kindly note that different transactions that were paid with the same card will return different card tokens, so before saving a card token on your backend for a specific customer you first need to make sure that the 'card unique reference' of the transaction is different than the ones already saved for past transactions. For details, view our Handle Card Tokens tutorial.

                <br><br>

                >This feature is available only upon request. Please contact your sales representative or use our Live Chat to request this feature.

            servers:
                - url: https://demo-api.vivapayments.com
                  description: Sandbox environment
                - url: https://api.vivapayments.com
                  description: Live environment

            produces:
                - application/json
            tags:
                - Transactions
            parameters:
                -
                    name: Content-Type
                    in: header
                    #description: "The language you prefer for messages. Supported values are en-AU, en-CA, en-GB, en-US"
                    #example: en-US
                    required: true
                    schema:
                        type: string
                        default: application/json
                -
                    name: body
                    schema:
                        $ref: '#/definitions/Create_token_1'
                    in: body
                    required: true

            x-code-samples:
              - lang: cURL
                source: |
                  <?php

                  $curl = curl_init();

                  curl_setopt_array($curl, array(
                    CURLOPT_URL => 'https://demo-api.vivapayments.com/acquiring/v1/cards/tokens',
                    CURLOPT_RETURNTRANSFER => true,
                    CURLOPT_ENCODING => '',
                    CURLOPT_MAXREDIRS => 10,
                    CURLOPT_TIMEOUT => 0,
                    CURLOPT_FOLLOWLOCATION => true,
                    CURLOPT_HTTP_VERSION => CURL_HTTP_VERSION_1_1,
                    CURLOPT_CUSTOMREQUEST => 'POST',
                    CURLOPT_POSTFIELDS =>'{
                  "transactionId": "string",
                  "groupId": "string",
                  "cardTokenType": 0
                  }',
                    CURLOPT_HTTPHEADER => array(
                      'Content-Type: application/json',
                      'Authorization: Bearer [Bearer_Token]'
                    ),
                  ));

                  $response = curl_exec($curl);

                  curl_close($curl);
                  echo $response;


              - lang: NodeJs
                source: |
