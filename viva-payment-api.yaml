              description: Indicates if the outgoing bank transfer will be instant or not.
              type: boolean
              #maximum: 30
              #minimum: 1
              default: false
              #format: uuid
          instructionType:
                description: >-
                  Indicates the instruction type for this bank transfer. You may find below all the possible values.<br><br>
                  Enum: `"1"` `"2"` <br><br>
                        **1 = Shared**<br>
                        **2 = Ours**<br>

                  > The **OUR** instruction means you pay all transfer charges.<br>
                  **SHA** (shared) means you only pay your bank's outgoing transfer charge.
                #maxLength: 255
                type: Array of integers (bankTransferInstructionTypeId)
