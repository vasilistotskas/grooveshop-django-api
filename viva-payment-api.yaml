    post_transaction:
        description: The object with the details of the recurring transaction.
        required:
            - amount
        type: object
        properties:
            amount:
                format: int64
                description: >-
                    The amount requested in the currency's smallest unit of measurement. For capturing
                    authorized transactions, this amount should not exceed the amount entered in the initial
                    transaction.


                    >For example. if you want to create a payment for €100.37, you need to pass the value
                    *10037*.
                type: integer
            installments:
                format: int32
                description: |-
                    The maximum number of installments that the customer can choose for this transaction. If this parameter is omitted, the customer will not see an option for paying with installments.

                    >Available only to merchants set up in Greece.
                maximum: 36
                minimum: 1
                type: integer
            customerTrns:
                description: >-
                    A friendly description that you want to display to the customer. This description appears on the receipt the customer receives.
                type: string
            merchantTrns:
                description: >-
                    An ID or a short description that helps you uniquely identify the transaction. For
                    example, this can be your customer order reference number.
                type: string
            sourceCode:
                description: A unique code that is exchanged between your application and the API. **Note that if you leave this parameter empty, it would take the Default value.**
                type: string
            tipAmount:
                format: int64
                description: >-
                        The tip value (if applicable for the customer's purchase) which is already included in the `amount` of the payment order and marked as tip. It is in the currency of the merchant account using the currency's smallest unit of measurement (e.g. cents of a euro).

                        >**Please note**: when creating a payment order for a pre-authorization (with `isPreAuth` = `true`), `tipAmount` should only be set when **capturing** the pre-authorization, and not when creating the initial payment order.
                type: 	integer
                default: 0
            currencyCode:
                description: >-
                    The numeric code of the transaction's currency as defined in [ISO 4712](https://en.wikipedia.org/wiki/ISO_4217). <br><br>Merchants can create a transaction in different currencies than the currency of the country to which they are registered. The currency code specified in this parameter indicates the currency in which the customer's payment will be made. <br><br>Please see [this page](/smart-checkout/multicurrency/) for more details and restrictions about multicurrency functionality.<br><br>Please note, when **capturing** the amount for `pre-authorized` transactions involving **[DCC](/smart-checkout/edcc/)**, it is a must to specify the `currencyCode` using the **DCC currency code**, not the original transaction currency.
                type: string
        example:
                amount: 100
                installments: 1
                customerTrns: A description of products / services that is displayed to the customer
                merchantTrns: Your merchant reference
                sourceCode: 6054
                tipAmount: 0.00
                currencyCode: 978

