    Create_New_Payment_Order_v2_schema.1:
        description: All the properties of the order that will be created are passed to this object.
        required:
            - amount
        type: object
        properties:

            amount:
                format: int64
                description: >-
                    The amount associated with this payment order. Must be a positive, non-zero number. <br>The amount will be in the currency of the merchant account using the currency's smallest unit of measurement (e.g. cents of a euro).

                    >For example, if you want to create a payment for €100.37, you need to pass the value `10037`.
                #default: 0
                minimum: 30
                type: integer

            customerTrns:
                default: null
                description: >-
                    This optional parameter adds a friendly description to the payment order that you want to display to the customer on the payment form. It should be a short description of the items/services being purchased.


                    >Although optional, it is **highly recommended** to provide a description for the customer, so that the customer knows what he is being asked to pay for; this affects significantly the conversion rate of your online store.
                #maxLength: 255
                type: string
                maximum: 2048
                minimum: 1

            customer:
              description: Information about the customer
              #type: Array of strings
              properties:
                email:
                  type: string
                  description: >-
                       The customer's e-mail address, used on the payment form.

                       >Although optional, it is **highly recommended** to provide the email of the customer, as the customer will be asked to provide it if not specified by you during the generation of the payment order; asking the customer to provide their email, which they may have provided earlier, may cause them to abandon the checkout; this affects significantly the conversion rate of your online store.


                       >This is a required parameter if combined with the `paymentNotification` parameter below set to a value of `true` (i.e. when creating a payment notification).
                  default: null
                  maximum: 50
                  minimum: 1

                fullName:
                  type: string
                  description: >-
                      The customer's full name, used on the payment form.

                      >Although optional, it is highly recommended to provide the full name of the customer, as the customer will be asked to provide it if not specified by you during the generation of the payment order; asking the customer to provide their full name, which they may have provided earlier, may cause them to abandon the checkout; this affects significantly the conversion rate of your online store.
                  default: null
                  maximum: 100
                  minimum: 1


                phone:
                  type: string
                  description: >-
                      The customer's telephone number for inclusion in the sales transaction details in the [viva banking app](https://members.vivawallet.com/en/signin). After logging in, go to **Sales > Sales Transactions** and find the transaction. Click on the **Info** button against the item to display the *Transaction Details* dialog box. Click on the **Customer** tab. The contents of the `phone` field will be displayed on the line below the customer's name.
                  default: null
                  maximum: 30
                  minimum: 1


                countryCode:
                  type: string
                  description: >-
                      The country code of the customer.<br> If left unspecified it is filled with the country code of the merchant.<br><br>

                      Consists of two-letter [ISO 3166-1 alpha-2 country code](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2).

                      >This is especially important to be specified as it affects the payment methods that will be offered to the customer; keep in mind that certain payment methods are available only to customers that live in specific countries, e.g. IRIS to Greek customers, EPS to Austrian customers, iDEAL to Dutch customers, MULTIBANCO to Portuguese customers, BLIK to Polish customers, and so on.
                  #default: country code of the merchant.
                requestLang:
                  type: string
                  description: >-
                    The language (culture info) of the order, which determines the language that Smart Checkout will appear in, and so on.<br>

                    >
                    If the `requestLang` parameter is empty, the language will be based on the `countryCode` of the merchant. For all possible values, please see the 'Allowed Values' list below

                     Consists of two-letter [ISO 639-1
                    language code](https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes) combined with
                    two-letter [ISO 3166-1 alpha-2 country
                    code](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2).<br><br>
                    Allowed Values:<br><br>
                    Bulgarian > `bg-BG`<br>Croatian > `hr-HR`<br>Czech (Czechia) > `cs-CZ`<br>Danish > `da-DK`<br/>Dutch (Netherlands) > `nl-NL`<br>Dutch (Belgium)> `nl-BE`<br>English (United Kingdom) > `en-GB`<br>English (United States) > `en-US`<br>Finnish > `fi-FI`<br>French (Belgium)> `fr-BE`<br/>French (France) > `fr-FR`<br/>German > `de-DE`<br>Greek > `el-GR`<br>Hungarian > `hu-HU`<br>Italian > `it-IT`<br/>Polish > `pl-PL`<br>Portuguese > `pt-PT`<br>Romanian > `ro-RO`<br>Russian > `ru-RU`<br>Spanish > `es-ES`<br>Swedish > `sv-SE`

                  #default: filled based on the countryCode property
            dynamicDescriptor:
                #default: Default
                description: >-
                    A descriptor tailored to the transaction, ensuring clarity and recognition for the buyer on their bank statement and 3DS verification page. This parameter generates a dynamic descriptor for bank statements when processing a payment through smart checkout.  The descriptor is limited to no more than 13 characters, can contain only `Latin characters`, `numbers`, and `space`. Special characters are replaced by spaces to meet banking standards. <br><br>
                    When specified, the buyer will see the first 8 characters of the merchant's trade name, followed by a space, and up to 13 characters of the dynamic descriptor. For example: `MerchantX Descriptor`. If not specified, the merchant's trade name will be shown up to 22 charachters.<br><br>
                    The `dynamicDescriptor` is included in the following webhooks with the `Descriptor` parameter.<br>
                    - <a href="/webhooks-for-payments/transaction-payment-created/">Transaction Payment Created</a><br>
                    - <a href="/webhooks-for-payments/transaction-failed/">Transaction Failed</a><br>
                    - <a href="/webhooks-for-payments/transaction-reversal-created/">Transaction Reversal Created</a>
                type: string
                example: Descriptor
                maximum: 13
            paymentTimeout:
                #format: int32
                description: >-
                    The time given to the customer to complete the payment. If the customer does not complete the payment within this time frame, the Payment Order is automatically cancelled. By using this parameter, you can define a different life span for the Payment Order.

                    >Value is in seconds and can be either smaller or greater than 1800 secs. Use value 65535 if you want the Payment Order to never expire.
                default: 1800
                type: integer
            currencyCode:
                format: int32
                description: >-
                  The numeric code of the order's currency as defined in [ISO 4712](https://en.wikipedia.org/wiki/ISO_4217). <br><br>Merchants can create order codes in different currencies than the currency of the country to which they are registered. The currency code specified in this parameter indicates the currency in which the customer's payment will be made. <br><br>Please see [this page](/smart-checkout/multicurrency/) for more details and restrictions about multicurrency functionality.
                default: Gets the merchant currency
                type: string
            preauth:
                description: >-
                    This will hold the selected
                    amount as unavailable (without the customer being charged) for a period of time. No email receipt is sent out from us in this case as it is not a charge. To cancel
                    a pre-auth, use the [Cancel
                    transaction](/apis-for-payments/payment-api/#tag/Transactions/paths/~1api~1transactions~1{transaction_id}/delete)
                    API call in the same way that you would to reverse a payment. To capture a pre-auth, use the [Create transaction](/apis-for-payments/payment-api/#tag/Transactions/paths/~1api~1transactions~1{transaction_id}/post) API call in the same way that you would to create a payment. For further details, see our [Handle pre-authorizations](/tutorials-for-payments/handle-pre-authorizations/) tutorial. The payment method needs to have [support for pre-auth transactions](/payment-methods/#pre-authorizations).<br> <br>If set to `true`, a pre-auth transaction will be performed.


                    >Pre-authorizations are not available with [recurring payments](/tutorials-for-payments/create-a-recurring-payment) or [instalments](/smart-checkout/functional-overview/#pay-by-instalments-option). Additionally, when creating a payment order for a pre-authorization (with `preauth` = `true`), tipAmount should only be set when [**capturing**](/apis-for-payments/payment-api/#tag/Transactions-(Deprecated)/paths/~1api~1transactions~1{transaction_id}/post) the pre-authorization, and not when creating the initial payment order
                default: false
                type: boolean

            allowRecurring:
                description: >-
                    If this parameter is set to `true`, recurring payments are enabled so that the initial transaction ID can be used for subsequent payments. For details of how to create a recurring payment, view our [Create a recurring payment](/tutorials/create-a-recurring-payment) tutorial. For an example of recurring payments in action, see our [PHP code sample](/tutorials/full-length-php-code-samples/create-recurring-payment). The payment method needs to have [support for recurring payments](/payment-methods/#recurring-payments). Keep in mind it is your responsibility to have the customer's consent to perform recurring payments (using this parameter constitutes your confirmation that you have such consent)!

                    >Recurring payments are **not** available with [pre-authorizations](/tutorials-for-payments/handle-pre-authorizations) or [instalments](/smart-checkout/functional-overview/#pay-by-instalments-option).
                default: false
                type: boolean
            saleToAcquirerData:
                type: string
                example: ewogICAgImFwcGxpY2F0aW9uSW5mbyI6IHsKICAgICAgICAiZXh0ZXJuYWxQbGF0Zm9ybSI6IHsKICAgICAgICAgICAgIm5hbWUiOiAidml2YS5jb218VGVybWluYWwiLAogICAgICAgICAgICAidmVyc2lvbiI6ICJjb20udml2YXdhbGxldC5zcG9jLnBheWFwcCB2NS4xOS43ICgxMDgxNSkiLAogICAgICAgICAgICAiaW50ZWdyYXRvciI6ICJWaXZhIgogICAgICAgIH0KICAgIH0KfQ==
                description: |
                  <strong>JSON converted to base64 string containing additional metadata information.</strong><br>
                  > **Please note that this parameter applies to Hospitality, Car Rentals & Dropshipping industries.**  

                  Please <strong><a href="/helpers/saleToAcquirerData.html" target="_blank">visit this link</a></strong> to view a sample of the JSON and generate the encoded data.                                
            maxInstallments:
                format: int32
                description: >-
                    The maximum number of installments that the customer can choose for this transaction. If this parameter is omitted, the customer will not see an option for paying with installments. The payment method needs to have [support for installments](/payment-methods/#installments).
                    Installments are available only to merchants set up in Greece and are **not** available with [recurring payments](/tutorials-for-payments/create-a-recurring-payment) or [pre-authorizations](/tutorials-for-payments/handle-pre-authorizations).

                    >**Please note:** If offering installments, the value provided by the merchant is *not* the number of installments the customer will select, and it is *not* mandatory for the customer to select installments at all. The process is as follows:<br><br>
                    1. The merchant indicates the **maximum** number of installments they wish to offer to the customer<br>
                    2. It is then **up to the customer** whether they pay with or without installments<br>
                    3. If the customer decides to pay with installments, they are able to select the **number** of installments (*up to the maximum specified by the merchant*)<br>
                maximum: 36
                minimum: 1
                type: integer
                default: 0

            forceMaxInstallments:
                description: >-
                    If this parameter is set to `true`, the customer will be forced to pay with installments and with the specific number indicated in `maxInstallments` parameter.<br><br>For details of how to create a payment with installments, view our [Handle payments with card installments](/tutorials/payments/handle-payments-with-card-installments/) tutorial.<br>

                    >**Please note:**<br>1. Only cards supporting installments can be used for the payment<br>2. The `maxInstallments` value indicates the number of installments that will be forced to the customer. It should be **>**`0`, otherwise the call will return an error
                default: false
                type: boolean

            paymentNotification:
                description: >-
                  If you wish to create a payment order, and then send out an email to the customer to request payment, rather than immediately redirect the customer to the payment page to pay now, set the value to `true`, and the system will automatically send the customer an email notification. This is equivalent to sending a payment notification from the viva banking app.
                default: false
                type: boolean

            tipAmount:
                format: int64
                description: >-
                        The tip value (if applicable for the customer's purchase) which is already included in the `amount` of the payment order and marked as tip. It is in the currency of the merchant account using the currency's smallest unit of measurement (e.g. cents of a euro).

                        >When creating a payment order for a pre-authorization (with `preauth` = `true`), tipAmount should only be set when [**capturing**](/apis-for-payments/payment-api/#tag/Transactions-(Deprecated)/paths/~1api~1transactions~1{transaction_id}/post) the pre-authorization, and not when creating the initial payment order
                type: 	integer
                default: 0

            disableExactAmount:
                description: >-
                    If this parameter is set to `true`, then any amount specified in the payment order is ignored (although still mandatory), and the customer is asked to indicate the amount they will pay. Note that if set to true, there will not be the option to pay with certain [payment methods](/payment-methods). <br><br><strong>Please note:</strong> If `disableExactAmount` is set to true, the request must not include `cardTokens`.
                default: false
                type: boolean

            disableCash:
                #format: int64
                description: >-
                        If this parameter is set to `true`, the customer will not have the option to pay in cash at a Viva Spot, and the checkout page will not display the Cash (Viva Spot) and e-banking (ΔΙΑΣ) options.

                        >Available only to merchants set up in Greece.
                default: false
                #minimum: 30
                type: boolean

            disableWallet:
                #format: int64
                description: >-
                        If this parameter is set to `true`, the customer will not have the option to pay using their Viva personal account (wallet), and the checkout page will not display the Viva Wallet option.

                        > Available only to merchants set up in Greece, Malta and Cyprus.
                default: false
                #minimum: 30
                type: boolean

            #disableCard:
                #format: int64
                #description: >-
                        #If this parameter is set to `true`, the customer will not have the option to pay using credit/debit card. <br>**We Strongly recommend to don't set it to** `true` **value to ensure high convertion rates.**
                #default: false
                #minimum: 30
                #type: boolean

            #isvAmount:
                #format: int64
                #type: 	integer or null
                #description: >-
                    #The amount which will be paid out to the ISV partner.

                    #>This value is **NOT** added to the amount, but it is considered as included in the amount parameter. Thus, the merchant will be paid amount-isvAmount.
                #minimum: 30
                #default: null

            sourceCode:
                #default: Default
                description: >-
                    This is the code of the [payment source](/getting-started/create-a-payment-source/) associated with the merchant. If the merchant has defined multiple [payment sources](/getting-started/view-the-payment-source-list/) in their account, you need to define the `sourceCode` parameter when creating the payment order, so that the system selects the appropriate payment source.


                    >sourceCode is case-sensitive. If left unspecified, `Default` source code is used.
                type: string

            merchantTrns:
                default: null
                description: >-
                    This can be either an ID or a short description that helps you uniquely identify the transaction in the [viva banking app](https://members.vivawallet.com/en/signin). For example,
                    this can be the customer order reference number. After logging in, go to **Sales > Sales Transactions** and find the transaction. Click on the **Info** button against the item to
                    display the *Transaction Details* dialog box. The contents of the `merchantTrns` field will be displayed on the line below the timestamp information.
                #maxLength: 50
                #minLength: 0
                type: string
                maximum: 2048
                minimum: 1
            stateId:
                description: >-
                   The `stateId` parameter is used to indicate the status of an order, when handling redirect behavior according to order status. It must be used in conjunction with the `urlFail` parameter, if one is provided, the other must be as well.  At present, the only supported value for stateId is:  `1` (Expired). It indicates that if the order expires, make a redirection to the given address in `urlFail` parameter. <br><br>`0` (Pending), <br>`1` (Expired), <br>`2` (Canceled), <br> `3` (Paid) <br><br>Although other statuses such as 0, 2, 3 are part of the broader order statuses, **only `1` ** is currently valid for use with this parameter in this context.
                type: string

            urlFail:
                description: >-
                   The `urlFail` parameter specifies the URL to redirect the user to in case of a failure based on the order stateId. It is used in conjunction with the stateId parameter to determine the failure scenario.  If urlFail is present in the request, the stateId parameter must also be provided to indicate the specific failure status.
                type: string

            tags:
                #format: int64
                description: >-
                      You can add several tags to a transaction that will help in grouping and filtering in the [viva banking app](https://members.vivawallet.com/en/signin). After logging in, go to **Sales > Sales Transactions** and expand the **Advanced search** feature. In the **Tags** field, enter the tag(s) you want to search with, then click on the **Search** button.
                default: null
                #minimum: 30
                type: Array of strings

            cardTokens:
                #format: int64
                description: >-
                      You can provide the card tokens you have saved on your backend for this customer. The card tokens will then be presented to the customer on Smart Checkout to pay with. For details, view our Handle Card Tokens tutorial.<br>
                      The API call <strong>returns an error</strong> if a) you provide more than <strong>10 card tokens</strong>, or b) if you provide <strong>invalid card tokens</strong>.


                      >You cannot send card tokens if the payment order is for an [open amount](/smart-checkout/smart-checkout-faqs/#can-i-allow-customers-to-enter-their-desired-amount-to-pay), i.e. if `disableExactAmount` is true
                default: null
                type: Array of strings

            paymentMethodFees:
                #format: int64
                description: >-
                      Applies an additional 'Service fee' to be added on top of the order amount if the customer chooses to pay with specific payment methods.<br><br> The amount will be in the currency of the merchant account using the currency's smallest unit of measurement (e.g. cents of a euro).

                      ><em>Currently</em> only applicable for payment method ‘Pay on Delivery’. <br><br>Example of usage for Pay On Delivery:<br>`"paymentMethodFees": [{"paymentMethodId":"35", "fee": 250}]`
                default: null
                type: Array of objects

            isCardVerification:
                description: >-
                      This parameter should be set to `true` to trigger a verification using [Card Verification functionality](/tutorials/payments/card-verification/) (and the `amount` parameter should be set to '0').<br><br>

                      ><strong>Please note:</strong><br><ul><li>This is currently only available for card payments via Visa, Mastercard, Maestro, Diners Club & Discover (digital wallets are *not* supported)</li>
                      <li>Recurring payments *are* supported</li>
                      <li>The following parameters are also *not* compatible with Card Verification: `preauth`, `maxInstallments`/`forceMaxInstallments`, `disableExactAmount`, `tipAmount`, `cardTokens`</li>
                default: false
                type: boolean


            klarnaOrderOptions:
              description: These parameters are <strong>required</strong> when Klarna is being offered as a payment method.
              format: array of objects
              required:
                  - orderLines
              properties:
                attachment:
                  description: Not applicable for all merchants (mandatory only for Marketplaces). Client must agree with Klarna the content of the attachment.
                  required:
                      - body
                      - contentType
                  properties:
                      body:
                        type: string
                        description: The content of the extra merchant data should be presented as a string inside this property. The body should be an object containing any of the keys and sub-objects described below serialized to JSON. More information on that object can be found <strong><a href="https://docs.klarna.com/api/attachment-schema/">here</a></strong>.
                      contentType:
                        type: string
                        description: The content type of the body. It is usually represented as "application/vnd.klarna.internal.emd-v2+json".
                billingAddress:
                  description: Billing address information.
                  properties:
                      city:
                        type: string
                        description: Customer’s city.
                      email:
                        type: string
                        description: Customer’s email address.
                      phone:
                        type: string
                        description: Phone number. Preferably a mobile phone number.
                      title:
                        type: string
                        description: Customer’s Title. Allowed values per country = UK- 'Mr', 'Ms' | DE- 'Herr', 'Frau' | AT- 'Herr, 'Frau' | de-CH- 'Herr, 'Frau' | it-CH- 'Sig.', 'Sig.ra' | fr-CH- 'M', 'Mme' | BE- 'Dhr.', 'Mevr.' | NL- 'Dhr.', 'Mevr.'
                      region:
                        type: string
                        description: Customer’s region or state - Mandatory for US and AU market. Validations according to ISO 3166-2 format, e.g. OH, NJ, etc.
                      country:
                        type: string
                        description: Customer’s country. This value overrides the purchase country if they are different. Should follow the standard of ISO 3166 alpha-2. E.g. GB, US, DE, SE.
                      attention:
                        type: string
                        description: ‘Attn.’ (if applicable). Only applicable for B2B customers.
                      givenName:
                        type: string
                        description: Customer's given name in UTF-8 encoding. Cannot be only numbers, must be more than 1 character. More information can be found in <strong><a href="https://docs.klarna.com/klarna-payments/in-depth-knowledge/customer-data-requirements/#details-needed-per-market">this link</a></strong>.
                      familyName:
                        type: string
                        description: Customer's family name in UTF-8 encoding. Cannot be only numbers, must be more than 1 character. More information can be found in <strong><a href="https://docs.klarna.com/klarna-payments/in-depth-knowledge/customer-data-requirements/#details-needed-per-market">this link</a></strong>.
                      postalCode:
                        type: string
                        description: Customer’s postal code. Validation according to Universal Postal Union addressing systems. E.g. 12345, W1G OPW.
                      streetAddress:
                        type: string
                        description: Customer’s street address. Regional formatting is required, as follows (UK/US/FR- 33 Cavendish Square | Rest of EU- De Ruijterkade 7)
                      streetAddress2:
                        type: string
                        description: Customer’s street address. Second Line.
                      organizationName:
                        type: string
                        description: Organization name (if applicable). Only applicable for B2B customers.
                shippingAddress:
                  description: Shipping address information.
                  properties:
                      city:
                        type: string
                        description: Customer’s city.
                      email:
                        type: string
                        description: Customer’s email address.
                      phone:
                        type: string
                        description: Phone number. Preferably a mobile phone number.
                      title:
                        type: string
                        description: Customer’s Title. Allowed values per country = UK- 'Mr', 'Ms' | DE- 'Herr', 'Frau' | AT- 'Herr, 'Frau' | de-CH- 'Herr, 'Frau' | it-CH- 'Sig.', 'Sig.ra' | fr-CH- 'M', 'Mme' | BE- 'Dhr.', 'Mevr.' | NL- 'Dhr.', 'Mevr.'
                      region:
                        type: string
                        description: Customer’s region or state - Mandatory for US and AU market. Validations according to ISO 3166-2 format, e.g. OH, NJ, etc.
                      country:
                        type: string
                        description: Customer’s country. This value overrides the purchase country if they are different. Should follow the standard of ISO 3166 alpha-2. E.g. GB, US, DE, SE.
                      attention:
                        type: string
                        description: ‘Attn.’ (if applicable). Only applicable for B2B customers.
                      givenName:
                        type: string
                        description: Customer's given name in UTF-8 encoding. Cannot be only numbers, must be more than 1 character. More information can be found in <strong><a href="https://docs.klarna.com/klarna-payments/in-depth-knowledge/customer-data-requirements/#details-needed-per-market">this link</a></strong>.
                      familyName:
                        type: string
                        description: Customer's family name in UTF-8 encoding. Cannot be only numbers, must be more than 1 character. More information can be found in <strong><a href="https://docs.klarna.com/klarna-payments/in-depth-knowledge/customer-data-requirements/#details-needed-per-market">this link</a></strong>.
                      postalCode:
                        type: string
                        description: Customer’s postal code. Validation according to Universal Postal Union addressing systems. E.g. 12345, W1G OPW.
                      streetAddress:
                        type: string
                        description: Customer’s street address. Regional formatting is required, as follows (UK/US/FR- 33 Cavendish Square | Rest of EU- De Ruijterkade 7)
                      streetAddress2:
                        type: string
                        description: Customer’s street address. Second Line.
                      organizationName:
                        type: string
                        description: Organization name (if applicable). Only applicable for B2B customers.
                orderLines:
                  description: The array containing list of line items that are part of this order. Maximum of 1000 line items could be processed in a single order.
                  format: array of objects
                  required:
                      - name
                      - quantity
                      - totalAmount
                      - unitPrice
                      - subscription
                  properties:
                      name:
                        type: string
                        description: Descriptive name of the order line item.
                      type:
                        type: string
                        description: Type of the order line item. The possible values are - physical, discount, shipping_fee, sales_tax, digital, gift_card, store_credit, surcharge
                      taxRate:
                        type: integer
                        format: long
                        description: Tax rate of the order line. Non-negative value. The percentage value is represented with two implicit decimals. I.e 2000 = 20%.
                      quantity:
                        type: integer
                        format: long
                        description: Quantity of the order line item. Must be a non-negative number.
                      unitPrice:
                        type: integer
                        format: long
                        description: Price for a single unit of the order line. Must be defined as minor units. Includes tax, excludes discount. (max value = 200000000)
                      imageUrl:
                        type: string
                        description: URL to an image that can be later embedded in communications between Klarna and the customer. (max 1024 characters). A minimum of 250x250 px resolution is recommended for the image to look good in the Klarna app, and below 50x50 px won't even show. We recommend using a good sized image (650x650 px or more), however the file size must not exceed 12MB.
                      reference:
                        type: string
                        description: Client facing article number, SKU or similar. Max length is 256 characters.
                      totalAmount:
                        type: integer
                        format: long
                        description: Total amount of the order line. Must be defined as minor units. Includes tax and discount. E.g.- 2000=20 euros Value = (quantity x unit_price) - total_discount_amount. (max value= 200000000)
                      productUrl:
                        type: string
                        description: URL to the product in the merchant’s webshop that can be later used in communications between Klarna and the customer. (max 1024 characters)
                      merchantData:
                        type: string
                        description: Used for storing merchant's internal order number or other reference. Pass through field. (max 1024 characters)
                      quantityUnit:
                        type: string
                        description: Unit used to describe the quantity, e.g. kg, pcs, etc. If defined the value has to be 1-8 characters.
                      totalTaxAmount:
                        type: integer
                        format: long
                        description: Total tax amount of the order line. Must be within ±1 of total_amount - total_amount 10000 / (10000 + tax_rate). Negative when type is discount.
                      totalDiscountAmount:
                        type: integer
                        format: long
                        description: Non-negative minor units. Includes tax. E.g.- 500=5 euros
                      subscription:
                        description: Subscription information.
                        required:
                            - name
                            - interval
                            - intervalCount
                        properties:
                            name:
                              type: string
                              description: The name of the subscription product
                            interval:
                              type: string
                              description: The cadence unit for this ("DAY", "WEEK", "MONTH", "YEAR")
                            intervalCount:
                              type: integer
                              format: int32
                              description: The number of intervals (>=1)
                      productIdentifiers:
                        description: Product identifying information.
                        properties:
                            size:
                              type: string
                              description: Size to be shown to the end customer (max 64 characters).
                            brand:
                              type: string
                              description: The product's brand name as generally recognized by consumers. If no brand is available for a product, do not supply any value.
                            color:
                              type: string
                              description: Color to be shown to the end customer (max 64 characters).
                            categoryPath:
                              type: string
                              description: The product's category path as used in the merchant's webshop. Include the full and most detailed category and separate the segments with ' > '
                            globalTradeItemNumber:
                              type: string
                              description: The product's Global Trade Item Number (GTIN). Common types of GTIN are EAN, ISBN or UPC. Exclude dashes and spaces, where possible
                            manufacturerPartNumber:
                              type: string
                              description: The product's Manufacturer Part Number (MPN), which - together with the brand - uniquely identifies a product. Only submit MPNs assigned by a manufacturer and use the most specific MPN possible


            #resellerSourceCode:
                #description: >-
                    #This is the code of the [payment source](/getting-started/create-a-payment-source/) associated with the ISV. If the ISV has defined multiple [payment sources](/getting-started/view-the-payment-source-list/) in their account, you need to define the `sourceCode` parameter when creating the payment order, so that the system selects the appropriate payment source.

                    #>sourceCode is case-sensitive. If left unspecified, `Default` source code is used.
                #type: string

        summary: Create payment order
        example:
