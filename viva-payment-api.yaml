                description: >
                    The ID of the transfer
                example: fa176a3b-a7e8-4f3d-abe6-5e65626f5994
                type: string
            executed:
                description: >
                    The date that the transfer was executed. If the transaction is not settled this value is empty, otherwise the transfer is executed instantly with funds from the account's available balance
                example: 2019-08-24T14:15:22Z
                type: string

    mp_createorder_request:
        description: >-
            Create order
        type: object
        required:
            - amount
        properties:
            amount:
                description: >
                    The exact amount to be paid.<br> Must be a positive, non-zero number. <br>The amount will be in the currency of the merchant account using the currency's smallest unit of measurement (e.g. cents of a euro).
                example: 0
                type: integer
                default: 0
            preauth:
                description: >
                    Specify if the card sale will be a preauthorization. Applies only to payments with card
                example: false
                type: boolean
                default: false
            tipAmount:
                description: >
                    Specify how much of the `amount` is to be marked as a tip. This value is <strong>not</strong> added to the `amount`
                example: null
                type: integer
                default: null
            dynamicDescriptor:
                #default: Default
                description: >-
                    A descriptor tailored to the transaction, ensuring clarity and recognition for the buyer on their bank statement and 3DS verification page. This parameter generates a dynamic descriptor for bank statements when processing a payment through smart checkout.  The descriptor is limited to no more than 13 characters, can contain only `Latin characters`, `numbers`, and `space`. Special characters are replaced by spaces to meet banking standards. <br><br>
                    When specified, the buyer will see the first 8 characters of the merchant's trade name, followed by a space, and up to 13 characters of the dynamic descriptor. For example: `MerchantX Descriptor`. If not specified, the merchant's trade name will be shown up to 22 charachters.<br><br>
                    The `dynamicDescriptor` is included in the following webhooks with the `Descriptor` parameter.<br>
                    - <a href="/webhooks-for-payments/transaction-payment-created/">Transaction Payment Created</a><br>
                    - <a href="/webhooks-for-payments/transaction-failed/">Transaction Failed</a><br>
                    - <a href="/webhooks-for-payments/transaction-reversal-created/">Transaction Reversal Created</a>
                type: string
                example: Descriptor
                maximum: 13
            disableCash:
                description: >
                    Disable cash payment for this order
                example: false
                type: boolean
                default: false
#            disableCard:
#                description: >
#                    Disable card payment for this order
#                example: false
#                type: boolean
#                default: false
            tags:
                #format: int64
                description: >-
                      You can add several tags to a transaction that will help in grouping and filtering in the [viva banking app](https://members.vivawallet.com/en/signin). After logging in, go to **Sales > Sales Transactions** and expand the **Advanced search** feature. In the **Tags** field, enter the tag(s) you want to search with, then click on the **Search** button.
                default: null
                #minimum: 30
                type: Array of strings
            sourceCode:
                description: >
                    The payment source to be linked with the transaction on successful payment. If left unspecified then the Default payment source is used
                example: null
                type: string
                default: null
            disableWallet:
                description: >
                    Disable payment with wallet for this order
                example: false
                type: boolean
                default: false
            paymentTimeout:
                description: >
                    Defines the timespan in seconds that the created order can be fulfilled before it expires. The default value is 1800 seconds (30 minutes)
                example: 1800
                type: integer
                default: 1800
  #          currencyCode:
  #              description: >
  #                  Specify the currency code of the `amount`. If left unspecified the default currency of the merchant is used. This property accepts the numeric code of the currency as defined in <a href="https://en.wikipedia.org/wiki/ISO_4217" target="_blank">ISO 4712</a>
  #              example: 978
  #              type: string
  #              default: null
            customerTrns:
                description: >
                    This custom value will be displayed in the customer's platform
                example: null
                type: string
                default: null
            merchantTrns:
                description: >
                    This custom value can be used by the merchant as a reference
                example: null
                type: string
                default: null
            allowRecurring:
                description: >
                    Specify if the transaction created can be further used to initiate new transactions. Applies mainly to orders fulfilled with cards
                example: false
                type: boolean
                default: false
            saleToAcquirerData:
                type: string
                example: ewogICAgImFwcGxpY2F0aW9uSW5mbyI6IHsKICAgICAgICAiZXh0ZXJuYWxQbGF0Zm9ybSI6IHsKICAgICAgICAgICAgIm5hbWUiOiAidml2YS5jb218VGVybWluYWwiLAogICAgICAgICAgICAidmVyc2lvbiI6ICJjb20udml2YXdhbGxldC5zcG9jLnBheWFwcCB2NS4xOS43ICgxMDgxNSkiLAogICAgICAgICAgICAiaW50ZWdyYXRvciI6ICJWaXZhIgogICAgICAgIH0KICAgIH0KfQ==
                description: |
                  <strong>JSON converted to base64 string containing additional metadata information.</strong><br>
                  > **Please note that this parameter applies to Hospitality, Car Rentals & Dropshipping industries.**  

                  Please <strong><a href="/helpers/saleToAcquirerData.html" target="_blank">visit this link</a></strong> to view a sample of the JSON and generate the encoded data.                
            maxInstallments:
                description: >
                    Maximum number of installments to be allowed
                example: 0
                type: integer
                default: 0
            disableExactAmount:
                description: >
                    Specify if the amount to be paid can be changed (true) or remains fixed (default value).<br><br><strong>Please note:</strong> If `disableExactAmount` is set to true, the request must not include `cardTokens`.
                example: false
                type: boolean
                default: false
            paymentNotification:
                description: >
                    Dictates whether a payment notification should be sent
                example: false
                type: boolean
                default: false

            currencyCode:
                format: int32
                description: >-
                  The numeric code of the order's currency as defined in [ISO 4712](https://en.wikipedia.org/wiki/ISO_4217). <br><br>Merchants can create order codes in different currencies than the currency of the country to which they are registered. The currency code specified in this parameter indicates the currency in which the customer's payment will be made. <br><br>Please see [this page](/smart-checkout/multicurrency/) for more details and restrictions about multicurrency functionality.
                default: Merchant's currency
                type: string
            
            customer:
                description: >
                    Information about the customer
                type: object
                properties:
                  email:
                    type: string
                    description: The email address of the customer
                    example: example@example.com
                  phone:
                    type: string
                    description: The phone number of the customer
                    example: 01234567890
                  fullName:
                    type: string
                    description: The full name of the customer
                    example: John Doe
                  countryCode:
                    type: string
                    description: The country code of the customer, if left unspecified it is filled with the country code of the merchant
                    example: GB
                  requestLang:
                    type: string
                    description: The culture info of the order, specifies the languge of the UI, email notifications etc. If left unspecified then it is filled based on the `countryCode` property
                    example: null
#            forceMaxInstallments:
#                description: >
#                    Set this value to `true` for the payment with instalments in which the number of them can not be changed by the customer.
#                example: false
#                type: boolean
#                default: false
            cardTokens:
                description: >
                    You can provide the card tokens you have saved on your backend for this customer. The card tokens will then be presented to the customer on Smart Checkout to pay with
                example: ["ct_5d0a4e3a7e04469f82da228ca98fd661"]
                type: array of strings
                default: null
            isCardVerification:
                description: >-
                      This parameter should be set to `true` to trigger a verification using [Card Verification functionality](/tutorials/payments/card-verification/) (and the `amount` parameter should be set to '0').<br><br>

                      ><strong>Please note:</strong><br><ul><li>This is currently only available for card payments via Visa, Mastercard, Maestro, Diners Club & Discover (digital wallets are *not* supported)</li>
                      <li>Recurring payments *are* supported</li>
                      <li>The following parameters are also *not* compatible with Card Verification: `preauth`, `maxInstallments`/`forceMaxInstallments`, `disableExactAmount`, `tipAmount`, `cardTokens`</li>
                default: false
                type: boolean
            transfer:
                description: >
                    Denotes whether an automatic transfer will be performed upon settlement of the payment. <br><br><strong>If `amount` is used, the process will be as follows:</strong><br><br>**1.** Transaction funds (the amount of the payment order) settled to platform account<br>**2.** Funds transferred to seller account (the amount of the `amount` parameter)<br>**3.** Viva acquiring commission applied for the transaction and deducted from the platform account<br>**4.** Funds can be transferred to marketplace owner account as needed (manually via [Send funds to a connected account](/apis-for-payments/payment-api/#tag/Marketplace-Transfers/paths/~1platforms~1v1~1transfers/post) API)
                    <br><br><strong>If `platformFee` is used, the process will be as follows:</strong><br><br>**1.** Transaction funds (the amount of the payment order) settled to platform account<br>**2.** Funds transferred to seller account (the amount of the payment order)<br>**3.** Fees transferred from seller account back to platform account (the amount of the `platformFee` parameter)<br>**4.** Viva acquiring commission applied for the transaction and deducted from the platform account<br>**5.** Funds can be transferred to marketplace owner account as needed (manually via [Send funds to a connected account](/apis-for-payments/payment-api/#tag/Marketplace-Transfers/paths/~1platforms~1v1~1transfers/post) API)
                    <br><br><strong>If both `amount` and `platformFee` are used (for cases in which the marketplace is both a marketplace and a seller), the process will be as follows:</strong><br><br>**1.** Transaction funds (the amount of the payment order) settled to platform account<br>**2.** Funds transferred to seller 1 account (the amount of the payment order <em>minus</em> the Marketplace Owner's cut as specified by the `amount` parameter)<br>**3.** Fees transferred from seller 1 account back to platform account (the amount of the `platformFee` parameter)<br>**4.** Viva acquiring commission applied for the transaction and deducted from the platform account<br>**5.** Remaining funds transferred to seller 2 (Marketplace Owner) account
                type: object
                required:
                    - connectedAccountId
                properties:
                  amount:
                    type: integer
                    description: Amount to be automatically transferred to the connected account from the platform account.<br><br> Must be a positive, non-zero number. <br>The amount will be in the currency of the merchant account using the currency's smallest unit of measurement (e.g. cents of a euro).
                    example: 1000
                    default: null
                  platformFee:
                    type: integer
                    description: Amount to be automatically taken as the Marketplace Fee from the connected account towards the platform account.<br><br> Must be a positive, non-zero number. <br>The amount will be in the currency of the merchant account using the currency's smallest unit of measurement (e.g. cents of a euro).
                    example: null
                    default: null
                  connectedAccountId:
                    type: string
                    description: ID of the connected account
                    example: ac03972a-5ca5-43c5-b96f-c519ac843b7a

            klarnaOrderOptions:
              description: These parameters are <strong>required</strong> when Klarna is being offered as a payment method.
              format: array of objects
              required:
                  - orderLines
              properties:
                attachment:
                  description: Not applicable for all merchants (mandatory only for Marketplaces). Client must agree with Klarna the content of the attachment.
                  required:
                      - body
                      - contentType
                  properties:
                      body:
                        type: string
                        description: The content of the extra merchant data should be presented as a string inside this property. The body should be an object containing any of the keys and sub-objects described below serialized to JSON. More information on that object can be found <strong><a href="https://docs.klarna.com/api/attachment-schema/">here</a></strong>.
                      contentType:
                        type: string
                        description: The content type of the body. It is usually represented as "application/vnd.klarna.internal.emd-v2+json".
                billingAddress:
                  description: Billing address information.
                  properties:
                      city:
                        type: string
                        description: Customer’s city.
                      email:
                        type: string
                        description: Customer’s email address.
                      phone:
                        type: string
                        description: Phone number. Preferably a mobile phone number.
                      title:
                        type: string
                        description: Customer’s Title. Allowed values per country = UK- 'Mr', 'Ms' | DE- 'Herr', 'Frau' | AT- 'Herr, 'Frau' | de-CH- 'Herr, 'Frau' | it-CH- 'Sig.', 'Sig.ra' | fr-CH- 'M', 'Mme' | BE- 'Dhr.', 'Mevr.' | NL- 'Dhr.', 'Mevr.'
                      region:
                        type: string
                        description: Customer’s region or state - Mandatory for US and AU market. Validations according to ISO 3166-2 format, e.g. OH, NJ, etc.
                      country:
                        type: string
                        description: Customer’s country. This value overrides the purchase country if they are different. Should follow the standard of ISO 3166 alpha-2. E.g. GB, US, DE, SE.
                      attention:
                        type: string
                        description: ‘Attn.’ (if applicable). Only applicable for B2B customers.
                      givenName:
                        type: string
                        description: Customer's given name in UTF-8 encoding. Cannot be only numbers, must be more than 1 character. More information can be found in <strong><a href="https://docs.klarna.com/klarna-payments/in-depth-knowledge/customer-data-requirements/#details-needed-per-market">this link</a></strong>.
                      familyName:
                        type: string
                        description: Customer's family name in UTF-8 encoding. Cannot be only numbers, must be more than 1 character. More information can be found in <strong><a href="https://docs.klarna.com/klarna-payments/in-depth-knowledge/customer-data-requirements/#details-needed-per-market">this link</a></strong>.
                      postalCode:
                        type: string
                        description: Customer’s postal code. Validation according to Universal Postal Union addressing systems. E.g. 12345, W1G OPW.
                      streetAddress:
                        type: string
                        description: Customer’s street address. Regional formatting is required, as follows (UK/US/FR- 33 Cavendish Square | Rest of EU- De Ruijterkade 7)
                      streetAddress2:
                        type: string
                        description: Customer’s street address. Second Line.
                      organizationName:
                        type: string
                        description: Organization name (if applicable). Only applicable for B2B customers.
                shippingAddress:
                  description: Shipping address information.
                  properties:
                      city:
                        type: string
                        description: Customer’s city.
                      email:
                        type: string
                        description: Customer’s email address.
                      phone:
                        type: string
                        description: Phone number. Preferably a mobile phone number.
                      title:
                        type: string
                        description: Customer’s Title. Allowed values per country = UK- 'Mr', 'Ms' | DE- 'Herr', 'Frau' | AT- 'Herr, 'Frau' | de-CH- 'Herr, 'Frau' | it-CH- 'Sig.', 'Sig.ra' | fr-CH- 'M', 'Mme' | BE- 'Dhr.', 'Mevr.' | NL- 'Dhr.', 'Mevr.'
                      region:
                        type: string
                        description: Customer’s region or state - Mandatory for US and AU market. Validations according to ISO 3166-2 format, e.g. OH, NJ, etc.
                      country:
                        type: string
                        description: Customer’s country. This value overrides the purchase country if they are different. Should follow the standard of ISO 3166 alpha-2. E.g. GB, US, DE, SE.
                      attention:
                        type: string
                        description: ‘Attn.’ (if applicable). Only applicable for B2B customers.
                      givenName:
                        type: string
                        description: Customer's given name in UTF-8 encoding. Cannot be only numbers, must be more than 1 character. More information can be found in <strong><a href="https://docs.klarna.com/klarna-payments/in-depth-knowledge/customer-data-requirements/#details-needed-per-market">this link</a></strong>.
                      familyName:
                        type: string
                        description: Customer's family name in UTF-8 encoding. Cannot be only numbers, must be more than 1 character. More information can be found in <strong><a href="https://docs.klarna.com/klarna-payments/in-depth-knowledge/customer-data-requirements/#details-needed-per-market">this link</a></strong>.
                      postalCode:
                        type: string
                        description: Customer’s postal code. Validation according to Universal Postal Union addressing systems. E.g. 12345, W1G OPW.
                      streetAddress:
                        type: string
                        description: Customer’s street address. Regional formatting is required, as follows (UK/US/FR- 33 Cavendish Square | Rest of EU- De Ruijterkade 7)
                      streetAddress2:
                        type: string
                        description: Customer’s street address. Second Line.
                      organizationName:
                        type: string
                        description: Organization name (if applicable). Only applicable for B2B customers.
                orderLines:
                  description: The array containing list of line items that are part of this order. Maximum of 1000 line items could be processed in a single order.
                  format: array of objects
                  required:
                      - name
                      - quantity
                      - totalAmount
                      - unitPrice
                      - subscription
                  properties:
                      name:
                        type: string
                        description: Descriptive name of the order line item.
                      type:
                        type: string
                        description: Type of the order line item. The possible values are - physical, discount, shipping_fee, sales_tax, digital, gift_card, store_credit, surcharge
                      taxRate:
                        type: integer
                        format: long
                        description: Tax rate of the order line. Non-negative value. The percentage value is represented with two implicit decimals. I.e 2000 = 20%.
                      quantity:
                        type: integer
                        format: long
                        description: Quantity of the order line item. Must be a non-negative number.
                      unitPrice:
                        type: integer
                        format: long
                        description: Price for a single unit of the order line. Must be defined as minor units. Includes tax, excludes discount. (max value = 200000000)
                      imageUrl:
                        type: string
                        description: URL to an image that can be later embedded in communications between Klarna and the customer. (max 1024 characters). A minimum of 250x250 px resolution is recommended for the image to look good in the Klarna app, and below 50x50 px won't even show. We recommend using a good sized image (650x650 px or more), however the file size must not exceed 12MB.
                      reference:
                        type: string
                        description: Client facing article number, SKU or similar. Max length is 256 characters.
                      totalAmount:
                        type: integer
                        format: long
                        description: Total amount of the order line. Must be defined as minor units. Includes tax and discount. E.g.- 2000=20 euros Value = (quantity x unit_price) - total_discount_amount. (max value= 200000000)
                      productUrl:
                        type: string
                        description: URL to the product in the merchant’s webshop that can be later used in communications between Klarna and the customer. (max 1024 characters)
                      merchantData:
                        type: string
                        description: Used for storing merchant's internal order number or other reference. Pass through field. (max 1024 characters)
                      quantityUnit:
                        type: string
                        description: Unit used to describe the quantity, e.g. kg, pcs, etc. If defined the value has to be 1-8 characters.
                      totalTaxAmount:
                        type: integer
                        format: long
                        description: Total tax amount of the order line. Must be within ±1 of total_amount - total_amount 10000 / (10000 + tax_rate). Negative when type is discount.
                      totalDiscountAmount:
                        type: integer
                        format: long
                        description: Non-negative minor units. Includes tax. E.g.- 500=5 euros
                      subscription:
                        description: Subscription information.
                        required:
                            - name
                            - interval
                            - intervalCount
                        properties:
                            name:
                              type: string
                              description: The name of the subscription product
                            interval:
                              type: string
                              description: The cadence unit for this ("DAY", "WEEK", "MONTH", "YEAR")
                            intervalCount:
                              type: integer
                              format: int32
                              description: The number of intervals (>=1)
                      productIdentifiers:
                        description: Product identifying information.
                        properties:
                            size:
                              type: string
                              description: Size to be shown to the end customer (max 64 characters).
                            brand:
                              type: string
                              description: The product's brand name as generally recognized by consumers. If no brand is available for a product, do not supply any value.
                            color:
                              type: string
                              description: Color to be shown to the end customer (max 64 characters).
                            categoryPath:
                              type: string
                              description: The product's category path as used in the merchant's webshop. Include the full and most detailed category and separate the segments with ' > '
                            globalTradeItemNumber:
                              type: string
                              description: The product's Global Trade Item Number (GTIN). Common types of GTIN are EAN, ISBN or UPC. Exclude dashes and spaces, where possible
                            manufacturerPartNumber:
                              type: string
                              description: The product's Manufacturer Part Number (MPN), which - together with the brand - uniquely identifies a product. Only submit MPNs assigned by a manufacturer and use the most specific MPN possible


