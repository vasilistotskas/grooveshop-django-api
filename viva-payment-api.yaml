            summary: Send funds to a connected account

            description: >-
                [![Run in Postman](https://run.pstmn.io/button.svg)](https://app.getpostman.com/run-collection/19692059-53fa734f-8b95-43e1-ae7c-467fd7b0a352?action=collection%2Ffork&collection-url=entityId%3D19692059-53fa734f-8b95-43e1-ae7c-467fd7b0a352%26entityType%3Dcollection%26workspaceId%3D71008394-7296-44d9-ad1c-ae1f239b5574)


                Send funds to a connected account, with or without linking the transfer to an existing `transactionId`. If transferring to the marketplace owner, `transactionId` should be left empty.<br><br>

                ><strong>Note:</strong> this call will <em>fail</em> in the following circumstances:<br><ul>
                <li>The connected account is not verified (you can use the <a href="/apis-for-payments/payment-api/#tag/Marketplace-Sellers/paths/~1platforms~1v1~1accounts~1{accountId}/get">Retrieve information about a connected account</a> API call to check that the `verified` flag of the seller is `true`)<br>
                <li>The referenced transaction is a Preauth (`preauth` = `true`) - although Preauth <em>Capture</em> transactions are supported<br>
                <li>The referenced transaction utilises Installments (`maxInstallments` =/= `0`)<br>
                <li>The referenced transaction is marked as 'switching' (you can use our <a href="/webhooks-for-payments/transaction-payment-created/">Transaction Payment Created</a> webhook to check if the `Switching` parameter is true - if so, you could send funds <em>without</em> referencing the transaction)<br>
                <li>The referenced transaction is a refund<br>
                <li>The referenced transaction has been partially refunded (i.e. its `TransactionStatus` is 'R')<br></ul>


                This API call uses OAuth2 [authentication](/apis-for-payments/payment-api/#section/Authentication).

