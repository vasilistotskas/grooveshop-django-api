    /api/sources:
        post:
            security:
                - BasicAuth:
                  - 'See BasicAuth'
            description: >-
                [![Run in Postman](https://run.pstmn.io/button.svg)](https://app.getpostman.com/run-collection/17199201-5835b244-29a2-40cc-a7d1-a7e1ca013984?action=collection%2Ffork&collection-url=entityId%3D17199201-5835b244-29a2-40cc-a7d1-a7e1ca013984%26entityType%3Dcollection%26workspaceId%3D71008394-7296-44d9-ad1c-ae1f239b5574)


                This API call enables you to add a new payment source to your Viva account. Payment sources allow you to group your sales into meaningful groups. You can manage them through the Viva Banking app. <a href="https://members.vivawallet.com/en/signin" target="_blank">Sign in</a> and navigate to **Sales > Online Payments > Websites/Apps** for `e-commerce` transaction sources or **Sales > Physical Payments > Stores** for `card-present` (in-person) transaction sources.<br /><br />
                This API call uses Basic [authentication](/apis-for-payments/payment-api/#section/Authentication).
                <br /><br />

                >This API call can generate source codes for both e-commerce and in-person payments. Each source type can be created separately by providing the relevant parameters for either `e-commerce` or `in-person` payments.
                <br /><br />

                >If <strong>isPhysical</strong> parameter in the request is not set to true, the parameters  `domain`, `pathFail`, `pathSuccess` parameters become mandatory.
            consumes:
                - application/json
            tags:
                - Sources
            parameters:
                -
                    name: Content-Type
                    in: header
                    #description: "The language you prefer for messages. Supported values are en-AU, en-CA, en-GB, en-US"
                    #example: en-US
                    required: true
                    schema:
                        type: string
                        default: application/json
                -
                    name: body
                    schema:
                        $ref: '#/definitions/new_source'
                    in: body
                    required: true

            x-code-samples:
              - lang: cURL
                source: |
                  curl --location 'https://demo.vivapayments.com/api/sources' \
                  --header 'Authorization: Basic TWVyY2hhbnRfSUQ6QVBJX0tleQ==' \
                  --header 'Content-Type: application/json' \
                  --data '{
                  "domain": "www.example.com",
                  "isSecure": true,
                  "name": "API test",
                  "pathFail": "fail",
                  "pathSuccess": "success",
                  "sourceCode": 1234
                  }'
              - lang: PHP
                source: |
                  <?php

                  $curl = curl_init();

                  curl_setopt_array($curl, array(
                    CURLOPT_URL => 'https://demo.vivapayments.com/api/sources',
                    CURLOPT_RETURNTRANSFER => true,
                    CURLOPT_ENCODING => '',
                    CURLOPT_MAXREDIRS => 10,
                    CURLOPT_TIMEOUT => 0,
                    CURLOPT_FOLLOWLOCATION => true,
                    CURLOPT_HTTP_VERSION => CURL_HTTP_VERSION_1_1,
                    CURLOPT_CUSTOMREQUEST => 'POST',
                    CURLOPT_POSTFIELDS =>'{
                  "domain": "www.example.com",
                  "isSecure": true,
                  "name": "API test",
                  "pathFail": "fail",
                  "pathSuccess": "success",
                  "sourceCode": 1234
                  }',
                    CURLOPT_HTTPHEADER => array(
                      'Authorization: Basic TWVyY2hhbnRfSUQ6QVBJX0tleQ==',
                      'Content-Type: application/json'
                    ),
                  ));

                  $response = curl_exec($curl);

                  curl_close($curl);
                  echo $response;

              - lang: NodeJs
                source: |
                  var request = require('request');
                  var options = {
                    'method': 'POST',
                    'url': 'https://demo.vivapayments.com/api/sources',
                    'headers': {
                      'Authorization': 'Basic TWVyY2hhbnRfSUQ6QVBJX0tleQ==',
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      "domain": "www.example.com",
                      "isSecure": true,
                      "name": "API test",
                      "pathFail": "fail",
                      "pathSuccess": "success",
                      "sourceCode": 1234
                    })

                  };
                  request(options, function (error, response) {
                    if (error) throw new Error(error);
                    console.log(response.body);
                  });

              - lang: Java
                source: |
                  OkHttpClient client = new OkHttpClient().newBuilder()
                    .build();
                  MediaType mediaType = MediaType.parse("application/json");
                  RequestBody body = RequestBody.create(mediaType, "{\r\n\"domain\": \"www.example.com\",\r\n\"isSecure\": true,\r\n\"name\": \"API test\",\r\n\"pathFail\": \"fail\",\r\n\"pathSuccess\": \"success\",\r\n\"sourceCode\": 1234\r\n}");
                  Request request = new Request.Builder()
                    .url("https://demo.vivapayments.com/api/sources")
                    .method("POST", body)
                    .addHeader("Authorization", "Basic TWVyY2hhbnRfSUQ6QVBJX0tleQ==")
                    .addHeader("Content-Type", "application/json")
                    .build();
                  Response response = client.newCall(request).execute();

            responses:
                '200':
                    description: Success
                    examples:
                        application/json:
                          Message: Success - There is no response body. Only the response status denotes successful completion of the request.
                '400':
                    description: >
                        Fail - Bad syntax; domain may be formatted incorrectly
                '401':
                    description:  Unauthorized
                    examples:
                        application/json:
                           Message : "Unauthorized."
                '404':
                    description:  Not Found - Invalid Wallet ID
                    examples:
                        application/json:
                           Message : "Not Found - Invalid Wallet ID"                           
                '5xx':
                    description:  Internal Server Error
                    examples:
                        application/json:
                           Message : "Internal Server Error"
                '409':
                    description: >
                        Fail - Source already exists with this source code
            summary: Add a new source

