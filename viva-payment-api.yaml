            summary: Check eligibility for cash payments
            description: >-
                [![Run in Postman](https://run.pstmn.io/button.svg)](https://app.getpostman.com/run-collection/19692059-d797ad56-7c16-459c-859a-e8b9d63b21af?action=collection%2Ffork&collection-url=entityId%3D19692059-d797ad56-7c16-459c-859a-e8b9d63b21af%26entityType%3Dcollection%26workspaceId%3D71008394-7296-44d9-ad1c-ae1f239b5574)
                <br><br>
                Use this endpoint to check whether the customer is eligible to pay.<br><br>

                <strong>Cash deposit for merchant payment</strong><br>

                Viva customers can use the service without an amount limit. An OTP will be send to the mobile phone of the customer.
                Non-customers can use the service only for payments < 1.000€ in this case eventId '109101' will be in the response and
                '/resellers/v1/transactions/cashPayments' must be called with the the appropriate tags in the request body.<br><br>

                <strong>Cash deposit to customer account</strong><br>

                Only Viva customers can use the service. An OTP will be send to the mobile phone of the customer.
                otherwise he can only pay the Code via card.<br><br>

                <strong>Events</strong><br>
                <table>
                <tr>
                <td>Event</td>
                <td>ID</td>
                <td>Description</td>
                </tr>
                <tr>
