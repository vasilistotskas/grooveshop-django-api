                '401':
                    description:  Unauthorized
                    examples:
                        application/json:
                           Message : "Unauthorized."
                '452':
                    description:  Insufficient Funds
                    examples:
                        application/json:
                           Message : "PaymentsInsufficientFundsForReversal"                           
                '5xx':
                    description:  Internal Server Error
                    examples:
                        application/json:
                           Message : "Internal Server Error"
                '403':
                    description: Transaction already cancelled <em>-or-</em> Refund amount exceeds total amount
