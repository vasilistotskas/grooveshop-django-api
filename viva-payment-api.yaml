#--------------------- MOTO - TAM-1586 --------------------------------------------

    moto_request:
        description: MOTO Card Charge
        required:
            - moto
            - creditcard
            - orderCode
        type: object
        properties:
            moto:
                description: This should always be `true`
                type: boolean
            merchantTrns:
                description: Optional - an ID or a short description that helps you uniquely identify the transaction in the viva banking app
                type: string
            fullName:
                description: The customer's full name
                type: string
            email:
                description: The customer's email address (this is where the customer will receive their invoice)
                type: string
            phone:
                description: The customer's phone number
                type: string
            creditcard:
                description: Information about the card to be charged
                required:
                  - cvc
                  - number
                  - expirationDate
                properties:
                    cvc:
                      type: string
                      description: The CVC of the card
                    number:
                      type: string
                      description: The card number
                    expirationDate:
                      type: string
                      description: The expiration date of the card
            orderCode:
                description: The code of the payment order which is being charged
                type: long
            sourceCode:
                description: The code of the payment source to be used
                type: string
        summary: Make MOTO card charge
        example:
            {
            "moto": true,
            "merchantTrns": "Info for merchant",
            "fullName": "John Doe",
            "email": "john@example.com",
            "phone": "306900000000",
            "creditcard": {
              "cvc": "444",
              "number": "5199816266546408",
              "expirationDate": "2023-01"
                          },
            "orderCode": 7909823376998902,
            "sourceCode": "1234"
            }

    moto_response:
        description: MOTO Card Charge
        type: object
        properties:
            Emv:
                description: Smart chip card type. For e-commerce transactions the value will only ever be null.
                type: string
            Amount:
                format: decimal
                description: The amount of the transaction.
                type: number
            StatusId:
                description: >-
                  The transaction’s current status:
                    - E – the transaction was not completed because of an error (PAYMENT UNSUCCESSFUL).
                    - A – the transaction is in progress (PAYMENT PENDING).
                    - M – the customer has disputed the transaction with the issuing bank.
                    - MA – dispute awaiting response.
                    - MI – dispute in progress.
                    - ML – a disputed transaction has been refunded (dispute lost).
                    - MW – dispute won.
                    - MS – suspected dispute.
                    - X – the transaction was cancelled by the merchant.
                    - R – the transaction has been fully or partially refunded.
                    - F – the transaction has been completed successfully (PAYMENT SUCCESSFUL).
                type: string
            RedirectUrl:
                description: RedirectUrl
                type: string
            CurrencyCode:
                description: The 3-digit currency code of the transaction.
                type: string
            TransactionId:
                description: The transaction's unique ID.
                type: string
            ReferenceNumber:
                description: The transaction's unique reference number.
                type: integer
            IssuerMessage:
                description: IssuerMessage
                type: string
            AuthorizationId:
                format: guid
                description: The transaction's unique authorization ID.
                type: string
            TransactionTypeId:
                description: The transaction type. You may find all the possible values [here](/integration-reference/response-codes/#transactiontypeid-parameter).
                type: integer
            IssuerMessageControl:
                description: IssuerMessageControl
                type: any
            Ctap:
                description: Ctap
                type: any
            ServiceId:
                description: Service ID
                type: integer
            RetrievalReferenceNumber:
                description: Unique ID for transaction retrieval.
                type: string
            ApplePosInfo:
                description: ApplePosInfo
                properties:
                    PinToken:
                      type: any
                      description: PinToken
            Loyalty:
                description: Loyalty
                type: any
            CartesBancaires:
                description: CartesBancaires
                type: any
            ThreeDSecureStatusId:
                description: >-
                  The same as [Electronic Commerce Indicator](/integration-reference/response-codes/#electronic-commerce-indicator) (ECI), a code returned by the issuer relating to 3DS status. The following values are possible:

                    0 = `Unspecified`<br />
                    1 = `Authenticated`<br />
                    2 = `no 3DS`<br />
                    3 = `Attempt or not enrolled`

                format: int32
                type: integer
            ErrorCode:
                format: int32
                description: >-
                    If the call is unsuccessful, an error code is generated. For successful calls, `0` is
                    returned.
                type: integer
            ErrorText:
                description: 'If the ErrorCode is other than `0`, a descriptive error message is returned.'
                type: string
            TimeStamp:
                format: date-time
                description: The server date and time (in ISO 8601 format) that the transaction was cancelled.
                type: string
            CorrelationId:
                description: Unique identifier logged by Viva for auditing purposes.
                type: string
            EventId:
                format: int32
                description: |-
                    If the call is unsuccessful, an event ID is generated.
                    For successful calls, `0` is returned.
                type: integer
            Success:
                description: Indicates whether or not the payment order creation was successful.
                type: boolean
        summary: Make MOTO card charge
        example:
            {
                "Emv": null,
                "Amount": 17.50,
                "StatusId": "F",
                "RedirectUrl": null,
                "CurrencyCode": "826",
                "TransactionId": "ef7786f9-b705-462b-9cd2-0fea4434aea4",
                "ReferenceNumber": 337776,
                "IssuerMessage": null,
                "AuthorizationId": "399886",
                "TransactionTypeId": 5,
                "IssuerMessageControl": null,
                "Ctap": null,
                "ServiceId": null,
                "RetrievalReferenceNumber": "322009088586",
                "ApplePosInfo": {
                    "PinToken": null
                },
                "Loyalty": null,
                "CartesBancaires": null,
                "ThreeDSecureStatusId": 2,
                "ErrorCode": 0,
                "ErrorText": null,
                "TimeStamp": "2023-08-08T14:47:24.4493544+03:00",
                "CorrelationId": null,
                "EventId": 0,
                "Success": true
            }

