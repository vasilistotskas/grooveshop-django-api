    '/dataservices/v2/transactions/Search?PageSize={PageSize}&Page={PageNumber}&OrderBy={Descending}':
        post:
            security:
                - OAuth2:
                  - "urn:viva:payments:biservices:publicapi urn:viva:payments:core:api:isv urn:viva:payments:core:api:redirectcheckout"
            summary: Transactions from Data Service
            description: >-
                [![Run in Postman](https://run.pstmn.io/button.svg)](https://app.getpostman.com/run-collection/17199201-8c410511-a4d3-41c1-8f1f-76a6df96e6eb?action=collection%2Ffork&collection-url=entityId%3D17199201-8c410511-a4d3-41c1-8f1f-76a6df96e6eb%26entityType%3Dcollection%26workspaceId%3D71008394-7296-44d9-ad1c-ae1f239b5574)


                This API call provides comprehensive access to detailed information regarding historical transactions. It offers extensive filtering capabilities based on various criteria such as date, transaction type, amount, status, and more. By utilizing this endpoint, you can retrieve specific transaction details that meet your specified criteria. <strong>Please note</strong>, the time frame that the Transactions from Data Service API can fetch data from is <strong>240 days</strong><br /><br />GET `/dataservices/v2/transactions/Search?PageSize={PageSize}&Page={PageNumber}&OrderBy={Descending}`<br /><br><strong>Note:</strong> `MerchantIsvFeeAmount` and `TotalCommission` in the response <strong>will have values only if the transaction is cleared</strong>. To determine whether the clearance has taken place, you can check the ClearanceDate parameter.


                <br>


                >Find out about the possible [transaction
                feedback parameters](/integration-reference/response-codes/#transaction-feedback-parameters).

                <br><br>
                The Data Services APIs requires specific access credentials. To request access, please speak to your sales representative <br /><br />
            servers:
                - url: https://demo-api.vivapayments.com
                  description: Sandbox environment
                - url: https://api.vivapayments.com
                  description: Live environment

            produces:
                - application/json
            tags:
                - Transactions via Data Service
            parameters:
                -
                    name: PageSize
                    description: Specifies the number of items (records) to be included per page in the API response. It controls the amount of data returned per request, helping manage response size and optimize performance. If not specified, the default value is 10
                    in: query
                    required: false
                    type: integer
                    x-example: '100'

                -
                    name: Page
                    description: Determines which page of data to retrieve from the paginated API results. It indicates the specific subset of data within the overall dataset, based on the given pageSize. If not specified, the default value is 1.
                    in: query
                    required: false
                    type: integer
                    x-example: '1'

                -
                    name: OrderBy
                    description: Specifies the order in which the results should be sorted. Use OrderBy=Descending to sort the results in descending order based on the date creteria. Conversely, for ascending order, use OrderBy=Ascending.
                    in: query
                    required: false
                    type: string
                    x-example: 'Descending'

                -
                    name: body
                    schema:
                        $ref: '#/definitions/data_services_retrieve_transactions'
                    in: body
                    required: true


            x-code-samples:
              - lang: cURL
                source: |
                  curl --location 'https://api.vivapayments.com/dataservices/v2/transactions/Search?PageSize=100&Page=1&OrderBy=Descending' \
                  --header 'Content-Type: application/json' \
                  --header 'Authorization: Bearer {Bearer_Token}' \
                  --data '{
                    "insDateFrom": "2020-06-20T12:57:25.463+03:00",
                    "insDateTo": "2024-06-29T12:57:25.463+03:00"
                  }'
              - lang: PHP
                source: |
                  <?php

                  $curl = curl_init();

                  curl_setopt_array($curl, array(
                    CURLOPT_URL => 'https://api.vivapayments.com/dataservices/v2/transactions/Search?PageSize=100&Page=1&OrderBy=Descending',
                    CURLOPT_RETURNTRANSFER => true,
                    CURLOPT_ENCODING => '',
                    CURLOPT_MAXREDIRS => 10,
                    CURLOPT_TIMEOUT => 0,
                    CURLOPT_FOLLOWLOCATION => true,
                    CURLOPT_HTTP_VERSION => CURL_HTTP_VERSION_1_1,
                    CURLOPT_CUSTOMREQUEST => 'POST',
                    CURLOPT_POSTFIELDS =>'{
                    "insDateFrom": "2020-06-20T12:57:25.463+03:00",
                    "insDateTo": "2024-06-29T12:57:25.463+03:00"
                  }',
                    CURLOPT_HTTPHEADER => array(
                      'Content-Type: application/json',
                      'Authorization: Bearer {Bearer_Token}'
                    ),
                  ));

                  $response = curl_exec($curl);

                  curl_close($curl);
                  echo $response;

              - lang: NodeJs
                source: |
                  var request = require('request');
                  var options = {
                    'method': 'POST',
                    'url': 'https://api.vivapayments.com/dataservices/v2/transactions/Search?PageSize=100&Page=1&OrderBy=Descending',
                    'headers': {
                      'Content-Type': 'application/json',
                      'Authorization': 'Bearer {Bearer_Token}'
                    },
                    body: JSON.stringify({
                      "insDateFrom": "2020-06-20T12:57:25.463+03:00",
                      "insDateTo": "2024-06-29T12:57:25.463+03:00"
                    })

                  };
                  request(options, function (error, response) {
                    if (error) throw new Error(error);
                    console.log(response.body);
                  });

              - lang: Java
                source: |
                  OkHttpClient client = new OkHttpClient().newBuilder()
                    .build();
                  MediaType mediaType = MediaType.parse("application/json");
                  RequestBody body = RequestBody.create(mediaType, "{\r\n  \"insDateFrom\": \"2020-06-20T12:57:25.463+03:00\",\r\n  \"insDateTo\": \"2024-06-29T12:57:25.463+03:00\"}");
                  Request request = new Request.Builder()
                    .url("https://api.vivapayments.com/dataservices/v2/transactions/Search?PageSize=100&Page=1&OrderBy=Descending")
                    .method("POST", body)
                    .addHeader("Content-Type", "application/json")
                    .addHeader("Authorization", "Bearer {Bearer_Token}")
                    .build();
                  Response response = client.newCall(request).execute();

            responses:
                '200':
                    description: Success
                    schema:
                        $ref: '#/definitions/data_services_retrieve_transactions_response'
                '401':
                    description:  You were not authorized to execute this operation
                    examples:
                        application/json:
                           Message : "Authorization has been denied for this request content."





    /dataservices/v2/merchants/mt940:
        get:
            security:
                - OAuth2:
                  - "urn:viva:payments:biservices:datafileapi"
            servers:
                - url: https://api.vivapayments.com
                  description: Live environment
            consumes:
                - application/json
            produces:
                - application/json
            tags:
                - MT940 API
            summary: Retrieve MT940 Data
            description: >-
                [![Run in Postman](https://run.pstmn.io/button.svg)](https://app.getpostman.com/run-collection/18763635-f0b4093d-dddb-4fdf-9a33-d7f328ee66d2?action=collection%2Ffork&collection-url=entityId%3D18763635-f0b4093d-dddb-4fdf-9a33-d7f328ee66d2%26entityType%3Dcollection%26workspaceId%3D71008394-7296-44d9-ad1c-ae1f239b5574)
                <br><br>This API allows you to retrieve MT940 report data for a given <em>past</em> date (MT940 data cannot be generated for the <em>current</em> date, as it only applies to cleared transactions).<br>

                ><strong>Please note:</strong> The Data Services API requires<em> specific access credentials</em>. To request access, please speak to your sales representative
            parameters:
                -
                    name: Authorization
                    in: header
                    description: The required identity Bearer token needed to access the resource.
                    required: true
                    schema:
                        type: string

                -
                    name: ReportDate
                    in: query
                    description: Date for which MT940 data should be retrieved.
                    required: true
                    example: "2023-04-30"
                    schema:
                        type: string
                        format: date

            x-code-samples:
              - lang: cURL
                source: |
                  curl --location 'https://api.vivapayments.com/dataservices/v2/merchants/mt940?ReportDate=2023-04-30' \
                  --header 'Authorization: Bearer {Bearer_Token}'
              - lang: PHP
                source: |
                  <?php

                  $curl = curl_init();

                  curl_setopt_array($curl, array(
                    CURLOPT_URL => 'https://api.vivapayments.com/dataservices/v2/merchants/mt940?ReportDate=2023-04-30',
                    CURLOPT_RETURNTRANSFER => true,
                    CURLOPT_ENCODING => '',
                    CURLOPT_MAXREDIRS => 10,
                    CURLOPT_TIMEOUT => 0,
                    CURLOPT_FOLLOWLOCATION => true,
                    CURLOPT_HTTP_VERSION => CURL_HTTP_VERSION_1_1,
                    CURLOPT_CUSTOMREQUEST => 'GET',
                    CURLOPT_HTTPHEADER => array(
                      'Authorization: Bearer {Bearer_Token}'
                    ),
                  ));

                  $response = curl_exec($curl);

                  curl_close($curl);
                  echo $response;

              - lang: NodeJs
                source: |
                  var request = require('request');
                  var options = {
                    'method': 'GET',
                    'url': 'https://api.vivapayments.com/dataservices/v2/merchants/mt940?ReportDate=2023-04-30',
                    'headers': {
                      'Authorization': 'Bearer {Bearer_Token}'
                    }
                  };
                  request(options, function (error, response) {
                    if (error) throw new Error(error);
                    console.log(response.body);
                  });

              - lang: Java
                source: |
                  OkHttpClient client = new OkHttpClient().newBuilder()
                    .build();
                  MediaType mediaType = MediaType.parse("text/plain");
                  RequestBody body = RequestBody.create(mediaType, "");
                  Request request = new Request.Builder()
                    .url("https://api.vivapayments.com/dataservices/v2/merchants/mt940?ReportDate=2023-04-30")
                    .method("GET", body)
                    .addHeader("Authorization", "Bearer {Bearer_Token}")
                    .build();
                  Response response = client.newCall(request).execute();

            responses:
                '200':
                    description: Success
                    schema:
                        $ref: '#/definitions/mt490_success_response'
                    examples:
                        application/json:
                          "{1:F01VPAYGRAA9272641}{2:O9499821VPAYGRAA0989N741}{4: :20:276657 :25:FR7624933233327453370009887 :28C:74/1 :60F:C345315EUR5,99 :62F:C345315EUR5,99 -}"
                '204':
                    description:  No Content (content was not found for the specified date)
                    examples:
                        application/json:
                            "204 No Content"
                '5xx':
                    description:  Error (incorrect/missing ReportDate or incorrect authorisation token)
                    examples:
                        application/json:
                            "500 Internal Server Error"
                '500':
                    description:  Error (cannot generate data for the current date)
                    schema:
                        $ref: '#/definitions/mt490_error_response'
                    examples:
                        application/json:
                            status: 500
                            message: "Error getting data for MT940: Error validating transactions with balances"
                            eventId: "110005"

