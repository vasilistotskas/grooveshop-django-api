#-------------------------------------------------------------------------------------------------------------------------------------------------------------
    obligation_v1:
        description: >-
            Enables marketplace owner to place an obligation to a seller for payback in case of a customer refund.
        type: object
        required:
            - amount
            - personId
            - currencyCode
        properties:
            amount:
                #format: uuid
                description: >
                    In decimals rather than the smallest denomination of the currency (£0.6 instead of 60p).
                example : 0.6
                type: decimal
            personId:
                #format: uuid
                description: >
                    Seller merchant ID from which the refund payback is being requested.
                example : Seller merchant ID
                type: long
            walletId:
                #format: uuid
                description: >
                    Use 'null' unless there is a wallet other than the default primary one that’s being used by the seller for their transactions.
                example : Seller wallet ID
                type: integer
                format: int64
            description:
                format: uuid
                description: >
                    A string with extra information you want to show in the transaction once the obligation is captured.
                example : This is a short description
                type: string
            currencyCode:
                format: int32
                description: >
                    The 3-digit currency code of the transaction. Should be set to the same currency as the Viva accounts involved in the obligation call.
                type: integer
                example : 826
#-------------------------------------------------------------------------------------------------------------------------------------------------------------
    obligation_v2:
        description: >-
            Enables marketplace owner to place an obligation to a seller for payback in case of a customer refund.
        type: object
        required:
            - amount
        properties:
            CaptureId:
                format: uuid
                description: The Wallet Transaction Id which captured. This will be null in Create Obligation API Call.
                example : null
                type: string
            StatusId:
                format: uuid
                description: >-
                              Enum: `"A"` `"X"`  `"F"`<br><br>
                              A = Active<br>
                              X = Cancelled<br>
                type: string
            ObligationId:
                format: uuid
                description: The Id of the obligation.
                type: string
            CancellationId:
                format: uuid
                description: The Wallet Transaction Id which cancel this obligation. This will be null in Create Obligation API Call.
                type: string
            Created:
              #  format: uuid
                description: The datetime of the obligation.
                type: datetime
            Completed:
                 format: uuid
                 description: The dametime of the obligation capture or cancellation. This be null in Create Obligation API Call.
              #      A short description for the bank transfer.
                 type: string
            WalletTransactionSubTypeId:
                 format: int32
                 description: >
                              The Wallet Transaction type.<br>
                              Possible Values: `"157"` `"158"` `"159"`<br><br>
                              157 = WalletObligationReserve<br>
                              158 = WalletObligationUnreserve <br>
                              159 = WalletObligation<br>
              #      A short description for the bank transfer.
                 type: integer
#-------------------------------------------------------------------------------------------------------------------------------------------------------------
    fees_v1:
        properties:
            Fee:
                #format: decimal
                #description: The Wallet Transaction Id which captured. This will be null in Create Obligation API Call.
                example : 0.0
                type: decimal
            BillFee:
              #  format: uuid
                #description: >-
              #                Enum: `"A"` `"X"`  `"F"`<br><br>
              #                A = Active<br>
              #                X = Cancelled<br>
