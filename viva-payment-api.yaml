    '/api/transactions/{transaction_id}':
        post:
            security:
                - BasicAuth:
                  - 'See BasicAuth'
            description: >-
                [![Run in Postman](https://run.pstmn.io/button.svg)](https://app.getpostman.com/run-collection/17199201-e9af1961-8ee5-489e-b1bf-cd664b53f501?action=collection%2Ffork&collection-url=entityId%3D17199201-e9af1961-8ee5-489e-b1bf-cd664b53f501%26entityType%3Dcollection%26workspaceId%3D71008394-7296-44d9-ad1c-ae1f239b5574)


                This API call covers the following use cases:


                #### Use Case 1: Make a recurring payment


                Recurring payments are permitted only if the following
                conditions are met:


                * The payment method has [support for recurring payments](/payment-methods/#recurring-payments).

                * The customer has already been charged successfully in the past

                * The customer has agreed to allow recurring payments using the initial payment method.


                You should use the same ID for every subsequent recurring transaction. For each recurring payment, the following parameters are re-used from the initial transaction:
                <br />

                >Please note that you need to set the sourceCode to be the same with the initial transaction, if you want to charge the payments in the same source. Otherwise, if you do not set this parameter, the recurring payment will be charged on the default source.


                * `fullName`

                * `email`

                * `phone`

                * `sourceCode`

                * `tags`


                A situation where you would need to set up recurring payments is if you're a merchant offering
                a subscription-based product to customers.



                For details of how to create a recurring payment, view our [Create a recurring payment](/tutorials-for-payments/create-a-recurring-payment) tutorial.


                We also have a [recurring payment
                PHP code sample](/tutorials/full-length-php-code-samples/create-recurring-payment) available.


                #### Use Case 2: Make a new payment by committing an already authorized transaction


                Keep in mind that you need to have previously completed successfully a payment whose payment order had `isPreAuth` = true.


                **Please note**: When creating a payment order for a pre-authorization (with `isPreAuth` = `true`), `tipAmount` should only be set when **capturing** the pre-authorization, and not when creating the initial payment order.
                <br><br>
                **For Marketplace integrations, please note**: capturing a pre-authorization must be done using the [Merchant ID & API Key](/getting-started/find-your-account-credentials/merchant-id-and-api-key/#find-your-merchant-id-and-api-key) of your ***Platform account***.
                <br><br>
                **Please note**: When **capturing** the amount for `pre-authorized` transactions involving **[DCC](/smart-checkout/edcc/)**, it is a must to specify the `currencyCode` using the **DCC currency code**, not the original transaction currency.
                <br><br>

                For each captured payment, the following three parameters are re-used from the initial pre-auth:


                * `fullName`

                * `email`

                * `requestLang`


                If you do not set the following parameters when capturing the transaction, `customerTrns` and `merchantTrns` will be **null** and the captured payment will be transferred to the **default source**.


                * `customerTrns`

                * `merchantTrns`

                * `sourceCode`



                For further details, see our [Handle pre-authorizations](/tutorials-for-payments/handle-pre-authorizations) tutorial.<br /><br />
                This API call uses Basic [authentication](/apis-for-payments/payment-api/#section/Authentication).

