info:
    title: Viva Documentation
    version: ''
    description: >-
        Explore our guides and examples to integrate with Viva.

        # Open Demo Account

        Get started with Viva by creating for free an account in the demo environment.<br><br>

        Your account in demo allows you to:

        - Request and send money

        - See your account details (Account ID, IBAN)

        - Get your account credentials for the integration

        - Check your balance

        - See the Sales transactions

        <br><br>
        <button><strong><a href="https://demo.vivapayments.com/en/signup" target="_blank">Open a demo account</a></strong></button>
        &nbsp;&nbsp;
        <button><strong><a href="/getting-started/account-registration-sign-in/">How to open a demo account</a></strong></button>

        # Authentication
 
        To submit payments with Viva, you will be making API requests that are authenticated using your account credentials.<br><br>

        If you don’t include them when making an API request, or use incorrect credentials, you will get an error.


        Your account credentials are always available in the Self Card Dashboard.

        - Find your [account credentials for Basic Auth](/getting-started/find-your-merchant-id-and-api-key/).

        - Find your [account credentials for OAuth2](/getting-started/find-your-client-credentials/).


        Viva use the below authentication methods for user authentication:

        - [OAuth2](/integration-reference/oauth2-authentication/)

        - [Basic Auth](/integration-reference/basic-auth)

        <securitySchemes/>
        <br><br>


        You may find below a Postman example for <a href="/integration-reference/oauth2-authentication/">OAuth2</a> user authentication method.


        [![Run in Postman](https://run.pstmn.io/button.svg)](https://app.getpostman.com/run-collection/17199201-019c6dec-32f1-4ca2-980b-5fe1f7852e41?action=collection%2Ffork&collection-url=entityId%3D17199201-019c6dec-32f1-4ca2-980b-5fe1f7852e41%26entityType%3Dcollection%26workspaceId%3D71008394-7296-44d9-ad1c-ae1f239b5574)
        <br>

          *****

         **<center>🔐 You may find in every API Call the required authentication method</center>**

          *****

        # SandBox

        The sandbox can be used for all your development / demo requirements. No actual payments can be made
        within this environment (you cannot use a real card).
        <br><br>
        To simulate a successful payment in the demo environment, use one of our [test
        cards](/getting-started/test-cards) to mimic a payment of 30¢/30p or more.


        # Live environment

        Actual transactions are executed in the live environment. The minimum transaction amount is the same as for the demo environment.


        # Glossary

        <table style="width:100%">
          <tr>
            <th>Term</th>
            <th>Description</th>
          </tr>
          <tr>
            <td>Customer</td>
            <td>The customer is the user who wants to pay for the product(s) and service(s).</td>
          </tr>
          <tr>
            <td>Merchant</td>
            <td>The merchant is the company that wants to receive payments product(s) and service(s) from the customer(s).</td>
          </tr>
          <tr>
            <td>Payment</td>
            <td>A payment request from the merchant.</td>
          </tr>
        </table>


        # Get Support

        If you would like to integrate with Viva, or if you have any queries about our products and solutions, please see our [**Contact & Support**](/get-support) page to see how we can help!


