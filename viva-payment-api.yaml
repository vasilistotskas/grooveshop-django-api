            summary: Create a connected account

            description: >-
                [![Run in Postman](https://run.pstmn.io/button.svg)](https://app.getpostman.com/run-collection/19692059-b5325fd9-7f87-4495-b3cb-708bb2e11625?action=collection%2Ffork&collection-url=entityId%3D19692059-b5325fd9-7f87-4495-b3cb-708bb2e11625%26entityType%3Dcollection%26workspaceId%3D71008394-7296-44d9-ad1c-ae1f239b5574)


                Create a connected account.<br><br>

                By providing at least the email of the seller, the URL that the seller will be redirected to upon completing the onboarding process and the partner name & logo URL of the marketplace, you generate the account id of the seller along with the invitation url to send to the seller to initiate the onboarding process.<br><br>Optionally, you may provide additional details of the seller, such as business information of the seller (e.g. legal name), branding information to be displayed during the onboarding process of the seller (e.g. the color), and payout information (e.g. the bank account where the seller wishes to receive their payouts)<br>

                ><strong>Note:</strong> During the onboarding process, the seller has the ability to <em>change</em> the following details: `mobile`, `legalName`, `tradeName`, `taxNumber` & `address`. Therefore, they could potentially override the values provided during the creation of the invitation by the marketplace owner

                This API call uses OAuth2 [authentication](/apis-for-payments/payment-api/#section/Authentication).

