                          - "Person does not support currency = currency value of currencyCode parameter is not supported for this account."
                          - "The merchant with id Χ does not have a source with code Ζ assigned or the source is disabled."

            summary: Create payment order

            description: >-
                [![Run in Postman](https://run.pstmn.io/button.svg)](https://app.getpostman.com/run-collection/17199201-bb8cbae3-d205-4139-9630-914dcfe5e97b?action=collection%2Ffork&collection-url=entityId%3D17199201-bb8cbae3-d205-4139-9630-914dcfe5e97b%26entityType%3Dcollection%26workspaceId%3D71008394-7296-44d9-ad1c-ae1f239b5574)


                Every payment on the Viva platform needs an associated payment order. A payment order
                is represented by a unique numeric `orderCode`.

                <br><br><strong>Note:</strong> For <em>Marketplace</em> orders, please see our [Marketplace Create Payment Order API call](/apis-for-payments/payment-api/#tag/Marketplace-Payments/paths/~1checkout~1v2~1orders~1/post) which contains additional parameters.

                <br><br>As well as the below detailed information
                about this API call, we have a [PHP code
                sample](/tutorials/full-length-php-code-samples/create-payment-order) available.<br /><br />
                This API call uses OAuth2 [authentication](/apis-for-payments/payment-api/#section/Authentication).

                <br><br>


                >Each payment `orderCode` is used for one payment only.


