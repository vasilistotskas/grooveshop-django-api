                          **1 = Shared**<br>
                          **2 = Ours**<br>

                    > The **OUR** instruction means you pay all transfer charges.<br><br>
                    **SHA** (shared) means you only pay your bank's outgoing transfer charge.<br><br>
                    If **OUR** is specified but not supported, the transfers will be executed as **SHA**
                  #maxLength: 255
                  type: integer <int32>
                  default: 1
                  example: 1
                  #maximum: 2048
