                      previous:
                          description: URL for the previous page of results.
                          type: string
                          example: "/api/Transaction/Search?PageSize=1&Page=3&OrderBy=Descending"

    data_services_retrieve_transactions:
        description: >-
            This contains the object with the details of the transaction that has been created, as well as a
            description in case of an error during the operation.
        type: object
        properties:
              insDateFrom:
                  format: date-time
                  description: The start date and time for retrieving data, based on the transaction creation time. Data will be returned from this date and time onward. <br>This parameter includes the following components, <br>Date (YYYY-MM-DD)<br>Time (HH:MM:SS.SS)<br>Time zone offset(±HH:MM e.g., +00:00 for UTC)
                  type: string
                  example: "2024-06-20T12:57:25.463+03:00"
                  optional: true
              insDateTo:
                  format: date-time
                  description: The end date and time for retrieving data, based on the transaction creation time. Data will be returned up to this date and time. <br>This parameter includes the following components, <br>Date (YYYY-MM-DD)<br>Time (HH:MM:SS.SS)<br>Time zone offset(±HH:MM e.g., +00:00 for UTC)
                  type: string
                  example: "2024-06-21T12:57:25.463+03:00"
                  optional: true
              ClearanceDateFrom:
                  format: date-time
                  description: The start date and time for retrieving data, based on the transaction clerance time. Data will be returned from this date and time onward. <br>This parameter includes the following components, <br>Date (YYYY-MM-DD)<br>Time (HH:MM:SS.SS)<br>Time zone offset(±HH:MM e.g., +00:00 for UTC)
                  type: string
                  example: "2024-06-22T12:57:25.463+03:00"
                  optional: true
              ClearanceDateTo:
                  format: date-time
                  description: The end date and time for retrieving data, based on the transaction clerance time. Data will be returned up to this date and time. <br>This parameter includes the following components, <br>Date (YYYY-MM-DD)<br>Time (HH:MM:SS.SS)<br>Time zone offset(±HH:MM e.g., +00:00 for UTC)
                  type: string
                  example: "2024-06-23T12:57:25.463+03:00"
                  optional: true
              TransactionTypeIds:
                type: array
                items:
                  type: integer
                description: The transaction type to be filtered. If empty, all transaction types will be returned in the response. Please see <a href="https://developer.viva.com/integration-reference/response-codes/#transactiontypeid-parameter" target="_blank">this page</a> for more details about transaction types.
                example: [5, 7]
                optional: true
              StatusIds:
                type: array
                items:
                  type: string
                description: >-
                     The statuses of transactions to filter. If left empty, transactions with all statuses will be included in the response.<br>
                     Example: `"F"` `"A"`  `"C"` `"E"` `"M"` `"R"` `"X"` `"MA"` `"MI"` `"ML"` `"MS"` `"MW"`<br><br>
                            F = Finished<br>
                            A = Active<br>
                            C = Captured<br>
                            E = Error<br>
                            R = Refunded<br>
                            X = Cancelled<br>
                            M = Claimed<br>
                            MA = Claim Awaiting Response<br>
                            MI = Claim In Progress<br>
                            ML = Claim Lost<br>
                            MS = Suspected Claimed<br>
                            MW = Claim Won<br>
                example: ["f","x", "a"]
                optional: true
              TransactionIds:
                type: array
                items:
                  type: guid
                description: The transaction ids to be filtered. If empty, all transactions will be returned in the response.
                example: ["fa248e3b-7fdb-43bb-9441-d88812f8fce5","7bc23b6e-5207-48ed-8eb8-bd87a7fe5843", "1dca89ed-f436-4068-bb77-6d4aa7185628"]
                optional: true
              SourceTerminalId:
                  format: long
                  description: The terminal ID used to filter the transactions.
                  type: string
                  example: "1412555643"
                  optional: true
              OrderCode:
                  format: long
                  description: The order code used to filter the transaction.
                  type: string
                  example: "4054144410382502"
                  optional: true
              ResellerSourceCode:
                  format: string
                  description: The StoreCode of the reseller
                  type: string
                  example: "4054144410382502"
                  optional: true
              AmountFrom:
                  format: decimal
                  description: The minimum transaction amount to filter the results. Only transactions with an amount above this value will be included in the response.
                  type: decimal
                  example: 120.34
                  optional: true
              AmountTo:
                  description: The maximum transaction amount to filter the results. Only transactions with an amount below this value will be included in the response.
                  type: decimal
                  example: 300.26
                  optional: true
              CurrencyCode:
                  description: The numeric code of the order's currency as defined in [ISO 4712](https://en.wikipedia.org/wiki/ISO_4217). Only transactions with the specified currency will be included in the response. 
                  type: string
                  example: "978"
                  optional: true
              MerchantTrns:
                  description: The merchant reference number used during transaction creation. 
                  type: string
                  example: "123456"
                  optional: true





    webhooks_add_subscription_request:
        type: object
        required:
            - url
            - secret
            - events
        properties:
            url:
                description: >
                    URL that will receive the webhook POST requests.
                example : https://www.myapi.com/webhooks/receive
                type: string

            secret:
                #format: uuid
                description: >
                    This is a merchant-defined parameter, used to generate SHA-1 and SHA-256 signatures provided to webhook POST requests. The signatures (found within the header parameters of the resultant webhook) verify the sender (Viva) so webhook messages can be trusted.
                type: string
                #maximum: 255
                #default: null
                example: N$45g@e6urE%367pP39*3b3Vh7$bZ122fmY4R_8tS%
            events:
                #format: uuid
                description: >
                    WebHook subscription events (i.e. SaleTransactionsFileGenerated).
                type: List<string>
                example: [
        "SaleTransactionsFileGenerated"
    ]
#--------------------------------------------------------------------------Added by GM-----------------------------------------------------------------------------------

    rf_code:
        type: object
        required:
            - orderCode
        properties:
            orderCode:
                description: The 16-digit orderCode for which you wish to retrieve information.<br><br><strong>Please note:</strong> During payment order creation, the `disableExactAmount` parameter determines whether the <strong>Reference Number (RF)</strong> is restricted to a specific payment amount.<br><br>
                    - When `disableExactAmount` <strong>is set to</strong> `false`, the generated RF is locked to the payment order amount. The bank will accept <strong>only the exact specified amount</strong>, and any deviation will be rejected.<br>
                    - When `disableExactAmount` <strong>is set to</strong> `true`, the generated RF is <strong>not amount-restricted</strong>. The end customer may complete the payment using <strong>any amount of their choice</strong>, which will be accepted by the bank.
                example: 3097103021072605
                type: string

