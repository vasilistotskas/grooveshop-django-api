            summary: Retrieve transactions (OLD)
            description: >-
                [![Run in Postman](https://run.pstmn.io/button.svg)](https://app.getpostman.com/run-collection/19692059-88e83e55-8e9d-419c-b085-ec98e931e7d7?action=collection%2Ffork&collection-url=entityId%3D19692059-88e83e55-8e9d-419c-b085-ec98e931e7d7%26entityType%3Dcollection%26workspaceId%3D71008394-7296-44d9-ad1c-ae1f239b5574)


                Enables you to obtain detailed information about a past payment from its **transaction ID**, e.g.<br />GET `/api/transactions/b1a3067c-321b-4ec6-bc9d-1778aef2a19d`<br /><br />

                By appending alternative parameters to the endpoint you can also find out a list of transactions with further details for a given:<br />

                - **date**, e.g. GET `/api/transactions/?date=2018-08-27`<br />

                - **clearance date**, e.g. GET `/api/transactions/?clearancedate=2018-08-27`<br />

                - **order code**, e.g. GET `/api/transactions/?ordercode=175936509216`<br />

                - **source code** for a specific date, e.g. GET `/api/transactions/?sourceCode=Default&date=2018-08-27`


                >Find out about the possible [transaction
                feedback parameters](/integration-reference/response-codes/#transaction-feedback-parameters).

                As well as the below detailed information about this API call, we have a [PHP code
                sample](/tutorials/full-length-php-code-samples/retrieve-transaction) available.<br /><br />
                This API call uses Basic [authentication](/apis-for-payments/payment-api/#section/Authentication).

        delete:
            security:
                - BasicAuth:
                  - 'See BasicAuth'
            description: |-
                [![Run in Postman](https://run.pstmn.io/button.svg)](https://app.getpostman.com/run-collection/17199201-3c9aaf39-0c25-45bd-bc3b-903e6ed28e15?action=collection%2Ffork&collection-url=entityId%3D17199201-3c9aaf39-0c25-45bd-bc3b-903e6ed28e15%26entityType%3Dcollection%26workspaceId%3D71008394-7296-44d9-ad1c-ae1f239b5574)

                This method enables you to:<br>
                * <strong>Cancel / Reverse</strong> a payment - either <em>partially</em> or <em>fully</em> - which occurred within the same calendar day<br>
                * <strong>Refund / Void</strong> a successful payment - either <em>partially</em> or <em>fully</em> - which occurred on a previous calendar day<br>

                >The payment method used needs to have [support for refunds](/payment-methods/#refunds).<br>
                To avoid an error, ensure you have enabled refunds in your Viva account.

                <br>This API call uses Basic [authentication](/apis-for-payments/payment-api/#section/Authentication).<br><br>
                Example: DELETE `/api/transactions/5f2a02b0-e4d9-4ec8-99b5-a67c1dc57ac0/?amount=200&sourceCode=xxxx&currencyCode=978`
            produces:
                - application/json
            tags:
                - Transactions
            parameters:
                -
                    name: amount
                    description: >-
                        The amount that will be refunded in the currency's smallest denomination (e.g amount
                        in pounds / euros x 100). *It cannot exceed the amount of the original payment unless it is an OCT*.


                        >For example, if you want to refund a payment of £100.37, you need to pass the value
                        `10037`.
                    in: query
                    required: true
                    type: integer
                -
                    name: sourceCode
                    description: >-
                      The source which the refund should be applied to. For example, to refund to the Source with the code "HQ", add '&sourceCode=HQ'.
                    in: query
                    required: false
                    type: string
                -
                    name: merchantTrns
                    description: >-
                        An ID or a short description that helps you uniquely identify the transaction. For
                        example, this can be your customer order reference number.
                    in: query
                    required: false
                    type: string
                -
                    name: customerTrns
                    description: >-
                        A friendly description that you want to display to the customer. This description appears on the receipt the customer receives.
                    in: query
                    required: false
                    type: string
                -
                    name: currencyCode
                    description: >-
                        The numeric code of the refund's currency as defined in [ISO 4712](https://en.wikipedia.org/wiki/ISO_4217). <br><br>Merchants can refund in different currencies than the originally captured. The currency code specified in this parameter indicates the currency in which the customer's refund will be made, add `&currencyCode=XXX`. <br><br>Please see [this page](/smart-checkout/multicurrency/) for more details and restrictions about multicurrency functionality.
                    in: query
                    required: false
                    type: string <int32>

