                  number:
                    type: string
                    description: House, flat or building number
                    example: 221B
                  city:
                    type: string
                    description: City
                    example: London
                  postCode:
                    type: string
                    description: Postal Code
                    example: NW1
                  countryCode:
                    type: string
                    description: Country Code
                    example: GB
                  secondLine:
                    type: string
                    description: Second line address information (if relevant)
                    example: null
            branding:
                description: >
                    Branding information of the marketplace
                type: object
                required:
                  - partnerName
                  - logoUrl
                properties:
                  partnerName:
                    type: string
                    description: The name of the marketplace (for header and title)
                    example: Header/title summary
                  primaryColor:
                    type: string
                    description: The brand colour of the marketplace (as a hex code)
                    example: #fcba03
                  logoUrl:
                    type: string
                    description: The URL of the brand logo of the marketplace
                    example: https://example.com/company-logo
            payouts:
                description: >
                    To be used for sellers that wish to automatically receive their payouts to a 3rd party bank account outside Viva according to a defined interval (leave empty for manual handling of payouts)
                type: object
                required:
                  - interval
                  - bankAccount
                properties:
                  statementDescriptor:
                    type: string
                    description: Description to show on the statement
                    example: Weekly payouts #MP12385
                  dayOfWeek:
                    type: integer
                    description: >
                      Required when interval is "weekly"<br><br><strong>Possible values</strong>: "1 - sunday", "2 - monday", "3 - tuesday", "4 - wednesday", "5 - thursday", "6 - friday", "7 - saturday".
                    example: 1
                  dayOfMonth:
                    type: integer
                    description: Required when interval is "monthly"
                    example: null
                  interval:
                    type: integer
                    description: >
                      Possible values: "1 - daily", "2 - weekly", "3 - monthly"
                    example: 2
                  amountThreshold:
                    type: integer
                    description: Amount threshold defines the least amount of balance that is required to create an automated payout transfer. Must be non-zero positive number and enough to cover any bank transfer fees that may apply Default is `10 EUR` or equivalent
                    example: 1000
                  disable:
                    type: boolean
                    description: Set this property to `true` if you want to <strong>hold</strong> the automatic handling of payouts
                    example: false
                  bankAccount:
                    type: object
                    description: Either use `iban` <strong>- or -<strong> `accountNumber`, `branchCode` and `countryCode`
                    required:
                        - beneficiaryName
                    properties:
                      iban:
                        type: string
                        description: IBAN of the bank account <br><br><strong>Note:</strong> It is not allowed the IBAN, to be a Viva IBAN. So, it is strongly recommended - if it is specified during the API Call- to [validate](/apis-for-payments/payment-api/#tag/Bank-Account/paths/~1banktransfers~1v1~1bankaccounts/post) it firstly. If it is a Viva Iban, please leave it null. <br>
                        example: NL04RABO6360804956
                      friendlyName:
                        type: string
                        description: Friendly name
                        example: External account
                      beneficiaryName:
                        type: string
                        description: Beneficiary name
                        example: Sherlock Holmes
                      branchCode:
                        type: string
                        description: Branch code of the bank account
                        example: null
                      accountNumber:
                        type: string
                        description: Account number of the bank account
                        example: null
                      countryCode:
                        type: string
                        description: Country code
                        example: null

