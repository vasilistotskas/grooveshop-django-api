          isInstant: false
          instructionType: 1
#-------------------------------------------------------------------------------------------------------------------------------------------------------------
    create_fee_200:
        #description: All the properties of the order that will be created are passed to this object.
        #required:
            #- archive
        type: object
        properties:
            fee:
                description: The fee associated with the desired outgoing bank transfer.
                type: number
                #format: uuid
                #maximum: 100
                #minimum: 30
                format: double
            isInstant:
                description: Indicates if the outgoing bank transfer will be instant or not.
                #maxLength: 255
                type: boolean
                #maximum: 2048
                #minimum: 1
                #default: null
                #format: uuid
            bankCommandId:
                description: The id of the bank transfer fee command, which is associated with the specific fee, instruction type and instant flag.
                type: string
                #format: uuid
                #maximum: 100
                #minimum: 30
                format: uuid
            instructionType:
                description: Indicates the instruction type for this bank transfer.
                type: integer
                #format: uuid
                #maximum: 100
                #minimum: 30

        example:
            fee: 0.1
            isInstant: true
            bankCommandId: bd7e9099-6431-414f-800d-0f583aa556ba
            instructionType: 1
#-------------------------------------------------------------------------------------------------------------------------------------------------------------
    create_fee_500:
        #description: All the properties of the order that will be created are passed to this object.
        #required:
        #    - iban
        type: object
        properties:

            status:
                description: >-
                  The HTTP Status Code of the response.

                type: integer
                #format: uuid
                #maximum: 100
                #minimum: 30
            message:
                description: A friendly message explaining what went wrong.
                #maxLength: 255
                type: string
                #maximum: 2048
                #minimum: 1
                #default: null
                #format: uuid
            eventId:
                description: The eventId associated with the error that occured, copied from the headers.
                type: integer
                #maximum: 30
                #minimum: 1
                #default: null
                #format: uuid

        example:
            status: 500
            message: Unexpected Internal Server Error
            eventId: 20068
#-------------------------------------------------------------------------------------------------------------------------------------------------------------
    send_money:
      #description: All the properties of the order that will be created are passed to this object.
      required:
          - amount
          - walletId
      type: object
      properties:
          amount:
              description: >-
                The amount of the requested outgoing bank transfer.
              type: integer
              #format: uuid
              #maximum: 100
              #minimum: 30
              format: int64
          walletId:
              description: The wallet id from which the amount will be transferred.
              #maxLength: 255
              type: integer
              #maximum: 2048
              #minimum: 1
              #default: null
              #format: uuid
              format: int64
          description:
              description: Specify a description for this outgoing bank transfer.
              type: string
              #maximum: 30
              #minimum: 1
              #default: false
              #format: uuid
          bankCommandId:
                description: >-
                  Specify the id of the bank transfer fee command, which is associated with specific: fee, instruction type, and instant flag.

                  > If you don't specify the `bankCommandId` parameter value, then a new `bankCommandId` will be created internally with `instructionType = 1` (**Shared**) and `isInstant = false`.<br><br>
                #maxLength: 255
                type: string
                #maximum: 2048
                #minimum: 1
                #default: null
                format: uuid

      example:
          amount: 0
          walletId: 0
          description: Bank transfer to George Seferis
          bankCommandId: 39e6208c-a53d-4b7b-b085-2444178c0887
#-------------------------------------------------------------------------------------------------------------------------------------------------------------
    send_money_200:
        #description: All the properties of the order that will be created are passed to this object.
        #required:
            #- archive
        type: object
        properties:
            fee:
                description: The fee represents only the part of the fee that the requestor/sender (ie. the merchant) will be charged and NOT the beneficiary’s fee.
                type: number
                #format: uuid
                #maximum: 100
                #minimum: 30
                ##format: like decimal
            commandId:
                description: The command id for the outgoing **bank** transfer, if the linked bank account is not an IBAN within Viva.
                type: string
                #format: uuid
                #maximum: 100
                #minimum: 30
                format: uuid
            isInstant:
                description: Indicates if the outgoing bank transfer will be instant or not.
                #maxLength: 255
                type: boolean
                #maximum: 2048
                #minimum: 1
                #default: null
                ##ormat: uuid
            walletTransactionId:
                description: The transaction id associated with the outgoing **wallet** transfer, if the linked bank account is an IBAN within Viva.
                #maxLength: 255
                type: string
                #maximum: 2048
                #minimum: 1
                #default: null
                format: uuid
        example:
            fee: 0.8
            commandId: 9e2dd63c-3478-489f-86d3-8c292a65a0aa
            isInstant: true
            walletTransactionId: 1e1fa555-eb0d-4fa3-a623-57d49e0eb53b
#-------------------------------------------------------------------------------------------------------------------------------------------------------------

    not_authorized_401:
        #description: All the properties of the order that will be created are passed to this object.
        #required:
        #    - iban
        example:
            Message: Authorization has been denied for this request content
#-------------------------------------------------------------------------------------------------------------------------------------------------------------





#---------------NOT USED--------------------------------------------------------------------------------------------------------------------------------------

    (not_used)Transaction Details:
        description: The details of the specific transaction.
        type: object
        properties:
            Fee:
                format: float
                description: The fees that correspond to the specific transaction.
                type: number
                example: 1
            BankId:
                description: Short name of issuing bank.
                type: string
            ParentId:
                description: >-
                    In case the transaction is considered to be consequent of another (e.g. in case of an
                    installment or a refund), this is the unique ID of the originating transaction.
                type: string
                example: ce5de8be-bed6-494c-8988-f07841221ba8
            Switching:
                description: >-
                    `true` means transaction was forwarded to another acquirer for processing after Viva, e.g. [PayPal](/smart-checkout/paypal-integration) (e-commerce).


                    `false` means Viva was the acquirer for the transaction (e-commerce or POS).
                type: boolean
            Amount:
                format: float
                description: The net amount of the transaction (without fees).
                type: number
                example: 10
            StatusId:
                description: >-
                  The transaction’s current status:
                    - F – the transaction has been completed successfully (PAYMENT SUCCESSFUL).
                    - E – the transaction was not completed because of an error (PAYMENT UNSUCCESSFUL).
                    - A – the transaction is in progress (PAYMENT PENDING).
                    - R – the transaction has been fully or partially refunded.
                    - X – the transaction was cancelled by the merchant.
                    - M – the customer has disputed the transaction with the issuing bank.
                    - MA – dispute awaiting response.
                    - MI – dispute in progress.
                    - ML – a disputed transaction has been refunded (dispute lost).
                    - MW – dispute won.
                    - MS – suspected dispute.
                type: string
            ChannelId:
                description: A unique ID identifying Viva point of entry of payment. For example, Web Redirect, Web POS, Public API, Native Checkout v2.
                type: string
            MerchantId:
                description: The merchant's unique ID.
                type: string
                example: 21192b18-78cc-4643-b8ae-e796318dbb38
            ResellerId:
                description: The reseller's unique ID (if one exists).
                type: string
            InsDate:
                format: date-time
                description: The date and time that the transaction took place.
                type: string
                example: '2017-12-24T15:21:44.3243753+02:00'
            CreatedBy:
                description: The username that initiated the transaction.
                type: string
            TipAmount:
                format: float
                description: The tip amount of the transaction (if applicable).
                type: number
            SourceCode:
                description: The source that was declared for the specific transaction.
                type: string
                example: default
            TransactionId:
                description: The transaction’s unique ID.
                type: string
                example: b1a3067c-321b-4ec6-bc9d-1778aef2a19d
            Commission:
                format: float
                description: The commission for the specific transaction.
                type: number
                example: 2
            PanEntryMode:
                description: Permanent Account Number (PAN) entry mode.
                type: string
            MerchantTrns:
                description: >-
                    An ID or a short description that helps you uniquely identify the transaction. For
                    example, this can be your customer order reference number.
                type: string
            CustomerTrns:
                description: >-
                    A friendly description that is displayed to the customer. This description appears on
                    the receipt the customer receives.
                type: string
            IsManualRefund:
                description: Whether or not the transaction relates to a manual refund.
                type: boolean
            TargetPersonId:
                format: guid
                description: The target logged-in user of the transaction (e.g. for wallet payments, this is the wallet owner ID).
                type: string
            AcquirerApproved:
                description: Applies to offline POS using SAF (Store And Forward) and approved locally. When back online, POS sends list of transactions to Viva with this parameter being used to record approved status.
                type: boolean
            SourceTerminalId:
                description: ID of POS card terminal where payment was made (if applicable).
                type: integer
            RedeemedAmount:
                format: decimal
                description: Related to loyalty points. If applicable, redeemed amount is used to reduce payment amount (Greece only).
                type: number
            AuthorizationId:
                format: integer
                description: Unique authorization number for the transaction provided by issuer.
                type: number
            TotalInstallments:
                format: byte
                description: The number of installments that were offered for the overall payment (if applicable).
                type: number
            CurrentInstallment:
                format: byte
                description: The instalment number (position) within total number of instalments of the payment.
                type: number
            ClearanceDate:
                format: date-time
                description: The date that the transaction was cleared.
                type: string
                example: '2017-12-24T15:21:44.3243753+02:00'
            ResellerSourceCode:
                description: The reseller's source (if it exists).
                type: string
            RetrievalReferenceNumber:
                description: Unique number for the transaction provided by acquirer.
                type: string
            Order:
                $ref: '#/definitions/(not_used)Transaction_Order_details'
            Payment:
                $ref: '#/definitions/(not_used)Payment_details'
            TransactionType:
                $ref: '#/definitions/(not_used)Transaction_Type'
            CreditCard:
                $ref: '#/definitions/(not_used)Credit_Card_details'
#-------------------------------------------------------------------------------------------------------------------------------------------------------------
    (not_used)Transaction_Order_details:
        description: The details of the order that created the transaction.
        type: object
        properties:
            OrderCode:
                format: int64
                description: The order’s unique code.
                type: number
                example: 175936509216
            ChannelId:
                description: The unique channel ID.
                type: string
                example: 93b1a083-2594-4383-a0e2-7d391b746237
            ResellerId:
                description: The unique ID of the reseller that created the order (if applicable).
                type: string
            SourceCode:
                description: The source from which the order was initiated.
                type: string
                example: default
            Tags:
                description: List of tags used for internal tracking and report purposes.
                type: string
            RequestLang:
                description: >-
                    The [ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-2)-formatted request
                    language.
                type: string
                example: el-GR
            ResellerSourceCode:
                description: The code of the reseller's source that created the order (if applicable).
                type: string
#-------------------------------------------------------------------------------------------------------------------------------------------------------------
    (not_used)Payment_details:
        description: The details of the payment of the transaction.
        type: object
        properties:
            Email:
                description: The customer’s email address.
                type: string
                example: customer@domain.com
            Phone:
                description: The customer’s phone number.
                type: string
                example: '2131234567'
            ChannelId:
                description: The unique channel ID.
                type: string
                example: cdbc3eb0-7f51-49dc-b447-a6e38b68a438
            FullName:
                description: The customer’s full name.
                type: string
            Installments:
                description: Defines the number of installments for the payment.
                maximum: 36
                minimum: 1
                type: number
            RecurringSupport:
                description: Whether or not recurring payments are enabled for the payment.
                type: boolean
#-------------------------------------------------------------------------------------------------------------------------------------------------------------
    (not_used)Credit_Card_details:
        description: The details of the card used for the transaction.
        type: object
        properties:
            Token:
                description: A unique token relevant to the card.
                type: string
            Number:
                description: The number of the card that was used.
                type: string
                example: 123456XXXXXX1234
            CountryCode:
                description: >-
                    The card's origin country in [ISO 3166-1
                    alpha-2](https://en.wikipedia.org/wiki/ISO_3166-2).
                type: string
                example: GR
            IssuingBank:
                description: A descriptive name of the bank that issued the card.
                type: string
                example: EFG EUROBANK
            CardHolderName:
                description: The name of the card owner.
                type: string
            ExpirationDate:
                format: date-time
                description: The card expiry date.
                type: string
            CardType:
                $ref: '#/definitions/(not_used)Card_Type'
#-------------------------------------------------------------------------------------------------------------------------------------------------------------
    (not_used)Card_Type:
        description: The type of the card.
        type: object
        properties:
            Name:
                description: >-
                 The name of the type of the card:
                    - Visa
                    - Mastercard
                    - Diners
                    - Amex
                    - Invalid
                    - Unknown
                    - Maestro
                    - Discover
                    - JCB
                type: string
            CardTypeId:
                description: >-
                 The ID of the type of the card:
                    - `0`
                    - `1`
                    - `2`
                    - `3`
                    - `4`
                    - `5`
                    - `6`
                    - `7`
                    - `8`
                type: number
#-------------------------------------------------------------------------------------------------------------------------------------------------------------
    (not_used)Transaction_Type:
        description: Denotes the type of the transaction.
        type: object
        properties:
            Name:
                description: The transaction type name.
                type: string
                example: Charge
            TransactionTypeId:
                description: The unique ID of the transaction type.
                type: number
                example: 1
